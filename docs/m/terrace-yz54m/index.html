<style>
  :root {
    --ink: #1c1c1e; --muted: #6f6f74; --line: #e7e3db; --paper: #faf8f4;
    --card: #ffffff; --accent: #8a6d3b; --accent-soft: #f1eae0; --price: #2c2c2e;
    --maxw: 900px; --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang TC", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; overflow-wrap: break-word;
  }
  header.hero {
    text-align: center; padding: calc(40px + env(safe-area-inset-top, 0px)) 20px 26px;
    background: linear-gradient(180deg, #fff 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--line);
  }
  header.hero h1 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(36px, 9vw, 54px); letter-spacing: 1px; font-weight: 700; }
  header.hero .zh-title { color: var(--accent); font-size: clamp(18px, 4.6vw, 24px); margin-top: 6px; letter-spacing: 4px; }
  header.hero .sub { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .controls {
    position: sticky; top: 0; z-index: 30; background: rgba(250,248,244,.92);
    backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line); padding: 8px 0 6px;
  }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; padding: 0 14px; }
  .lang-toggle button {
    flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    padding: 7px 16px; min-height: 38px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -ms-overflow-style: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a { flex: 0 0 auto; text-decoration: none; font-size: 15px; color: var(--accent);
    background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 14px calc(80px + var(--safe-b)); }
  .filterbar { display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px 8px;
    scrollbar-width: none; -ms-overflow-style: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 6px 12px; min-height: 36px; cursor: pointer;
    white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  body.lang-zh .chip .cen { display: none; }
  body.lang-en .chip .czh { display: none; }

  section { margin-top: 38px; scroll-margin-top: 96px; }
  .sec-head { border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .sec-head h2 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px, 6.4vw, 32px); letter-spacing: .5px; }
  .sec-head .zh { color: var(--accent); font-size: clamp(17px, 4.6vw, 21px); letter-spacing: 2px; }
  .sec-note { color: var(--muted); font-size: 15px; margin: 0 0 12px; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }
  .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .name { font-weight: 700; font-size: 18px; }
  .item .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .item .tags { font-size: 15px; letter-spacing: 1px; }
  .dish { display: block; width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 8px; }
  .explain { font: inherit; font-size: 15px; line-height: 1; border: 1px solid var(--line);
    background: var(--card); border-radius: 999px; padding: 3px 7px; cursor: pointer; }
  .popover { position: absolute; z-index: 50; max-width: 300px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 15px;
    line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,.16); }
  .popover[hidden] { display: none; }
  .popover .pen { display: block; }
  .popover .pzh { display: block; color: #4a4a4f; margin-top: 6px; }
  body.lang-zh .popover .pen { display: none; }
  body.lang-en .popover .pzh { display: none; }
  .item .name-zh { color: var(--accent); font-weight: 500; font-size: 17px; margin-top: 1px; }
  .item .price { font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item .desc { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .item .desc-zh { color: #4a4a4f; font-size: 15px; margin-top: 3px; }

  .opts { margin-top: 8px; }
  .optg { margin-top: 8px; padding: 8px 10px; background: var(--accent-soft);
    border-left: 3px solid var(--accent); border-radius: 8px; }
  .optg:first-child { margin-top: 0; }
  .optg-label { font-weight: 700; font-size: 15px; }
  .opt-hint { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 6px; }
  .optg-choices { list-style: none; margin: 6px 0 0; padding: 0;
    display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .optg-choices li { font-size: 15px; }
  .opts .ozh { color: var(--accent); }
  .opts .oen, .opts .ozh { margin-right: 3px; }
  .opt-price { color: var(--price); font-variant-numeric: tabular-nums; margin-left: 3px; }
  body.lang-zh .opts .oen { display: none; }
  body.lang-en .opts .ozh { display: none; }

  body.lang-zh .name { display: none; }
  body.lang-zh .desc { display: none; }
  body.lang-zh .name-zh { font-size: 18px; font-weight: 700; color: var(--ink); }
  body.lang-en .name-zh { display: none; }
  body.lang-en .desc-zh { display: none; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);
    color: #fff; font-size: 20px; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  #toTop.show { opacity: .92; pointer-events: auto; }

  footer { text-align: center; color: var(--muted); font-size: 14.5px;
    padding: 28px 16px calc(40px + var(--safe-b)); border-top: 1px solid var(--line); }
</style>
</head>

<script>
const MENU = [{"en":"Appetisers","zh":"開胃菜","note":"All prices quoted are inclusive of prevailing taxes","items":[{"en":"Parmigiana Di Melanzane","zh":"帕瑪森茄子","p":"61","tags":["vegetarian","notable"],"xterm":"parmigiana-di-melanzane","options":[],"den":"sweet eggplant, tomato, mozzarella, parmesan","dzh":"甜茄子、番茄、莫札瑞拉起司、帕瑪森起司","explain":{"en":"A classic Southern Italian baked dish made of layered sliced aubergine (eggplant), tomato sauce, mozzarella, and Parmesan cheese. The layers are baked until golden and bubbling. It is served as a starter or a vegetarian main course.","zh":"這是一道經典的南義大利烤焗料理，以切片茄子、番茄醬、莫扎瑞拉芝士和帕爾馬芝士層層疊放，烤至金黃焦香。可作為前菜或素食主菜享用。"}},{"en":"Truffle Bruschetta","zh":"松露布切塔","p":"94","tags":["vegetarian","notable"],"xterm":"bruschetta","options":[],"den":"buffalo mozzarella, truffle paste, shaved parmesan","dzh":"水牛莫札瑞拉起司、松露醬、刨絲帕瑪森起司","explain":{"en":"An Italian appetiser of grilled or toasted bread rubbed with garlic and drizzled with olive oil, then topped with various ingredients. Classic toppings include fresh tomato and basil, though premium versions may feature truffle. The bread's charred, crisp surface is characteristic.","zh":"義大利常見的前菜，以烤脆的麵包片塗抹大蒜、淋上橄欖油，再加上各式配料。經典款以新鮮番茄和羅勒為餡，精緻版本則可能加入松露。其特點是麵包表面烤得香脆略帶焦香。"}},{"en":"Salmon Tartare","zh":"鮭魚韃靼","p":"90","tags":["gluten-free","signature","notable"],"xterm":"salmon-tartare","options":[],"den":"salmon roe, capers, gherkin, shallot, mustard cream","dzh":"鮭魚卵、酸豆、醃黃瓜、紅蔥頭、芥末鮮奶油","explain":{"en":"Tartare (tar-TAR) refers to raw, finely chopped or diced protein dressed with seasoning — no heat applied. The name comes from the Tartar peoples of Central Asia, associated historically with eating raw meat. Here, fresh salmon is the star, typically finished with capers, shallots, and citrus.","zh":"韃靼（tar-TAR）指將生鮮食材細切後以調味料拌勻、完全不經烹煮的料理方式，名稱源自中亞韃靼民族，歷史上與生食肉類相關聯。此菜以新鮮鮭魚為主角，通常以酸豆、紅蔥頭及柑橘調味。"}}],"id":"sec-0"},{"en":"Salads","zh":"沙拉","note":"All prices quoted are inclusive of prevailing taxes","items":[{"en":"Salade Nicoise","zh":"尼斯沙拉","p":"79","tags":["gluten-free","notable"],"xterm":"salade-nicoise","options":[],"den":"pan seared tuna, mixed lettuce, green bean, olive, cherry tomato, hard-boiled egg, capers dressing","dzh":"香煎鮪魚、綜合生菜、四季豆、橄欖、小番茄、水煮蛋、酸豆醬汁","explain":{"en":"A composed salad originating from Nice in southern France. Traditional ingredients include tuna, hard-boiled eggs, green beans, olives, anchovies, and tomatoes dressed with vinaigrette. It is hearty enough to serve as a main course.","zh":"源自法國南部城市尼斯的組合沙律。傳統食材包括吞拿魚、水煮蛋、四季豆、橄欖、鯷魚和番茄，以油醋汁調味。份量豐盛，可作主菜享用。"}},{"en":"The Terrace Caesar Salad","zh":"Terrace 凱薩沙拉","p":"79","tags":["vegetarian","gluten-free"],"xterm":"","options":[],"den":"young baby romaine lettuce, grilled chicken, speck crisp, grated parmesan, Caesar dressing","dzh":"嫩蘿蔓生菜、烤雞肉、酥脆義式煙燻火腿、磨碎帕瑪森起司、凱薩醬"},{"en":"Insalata Mista","zh":"綜合義式沙拉","p":"42","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-mista","options":[],"den":"seasonal green salad, olives, tomato, sundried tomato, artichoke, grilled vegetables","dzh":"當季綠色沙拉、橄欖、番茄、日曬番茄、朝鮮薊、烤時蔬","explain":{"en":"Meaning \"mixed salad\" in Italian, this is a simple side salad of assorted seasonal greens and raw vegetables dressed with olive oil and vinegar. The exact composition varies by restaurant and season. It is a common accompaniment to Italian meals.","zh":"義大利文意為「混合沙律」，是一款以各式時令生菜和蔬菜拌以橄欖油和醋調製的簡單配菜沙律。具體食材因餐廳和季節而異，是義大利餐桌上常見的配菜。"}},{"en":"Grilled Octopus Salad","zh":"烤章魚沙拉","p":"90","tags":["gluten-free"],"xterm":"","options":[],"den":"octopus, tomato confit, potato, lemon dressing","dzh":"章魚、油封番茄、馬鈴薯、檸檬醬汁"},{"en":"Insalata Caprese","zh":"卡布里沙拉","p":"108","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-caprese","options":[],"den":"tomato confit & balsamic caramel","dzh":"油封番茄與巴薩米克焦糖","explain":{"en":"A classic Italian salad from the island of Capri, made with alternating slices of fresh mozzarella, ripe tomatoes, and basil leaves. It is dressed simply with olive oil, salt, and sometimes balsamic glaze. The dish is celebrated for the quality of its few ingredients.","zh":"源自義大利卡布里島的經典沙律，以新鮮莫扎瑞拉芝士、熟透的番茄和羅勒葉交替排列而成。以橄欖油和鹽簡單調味，有時加入陳年黑醋汁。此菜的精髓在於食材本身的品質。"}},{"en":"Buffalo Mozzarella","zh":"水牛莫札瑞拉","p":"108","tags":["gluten-free","signature","notable"],"xterm":"buffalo-mozzarella","options":[],"den":"mango and bell pepper, beef speck","dzh":"芒果與甜椒、義式牛肉煙燻火腿","explain":{"en":"Mozzarella (mot-sah-REL-la) is a fresh, pulled-curd cheese from southern Italy. Buffalo Mozzarella — Mozzarella di Bufala — is made from water buffalo milk, giving it a richer, creamier flavour than cow's-milk versions. It carries DOP protected-origin status in Italy.","zh":"莫札瑞拉（mot-sah-REL-la）是義大利南部的新鮮拉絲乳酪。水牛莫札瑞拉（Mozzarella di Bufala）以水牛奶製成，風味比一般牛奶版本更濃郁細滑，在義大利享有DOP原產地保護認證。"}}],"id":"sec-1"},{"en":"Pasta and Risotto","zh":"義大利麵與燉飯","note":"All prices quoted are inclusive of prevailing taxes","items":[{"en":"Spaghetti Bolognese","zh":"波隆那肉醬義大利麵","p":"95","tags":["notable"],"xterm":"spaghetti-bolognese","options":[],"den":"long pasta in tomato braised beef ragout","dzh":"長麵條搭配番茄燉牛肉醬","explain":{"en":"Spaghetti (spah-GET-ee) are long, thin round pasta strands. Bolognese (boh-loh-NYEH-zeh) is a slow-cooked meat ragù originating from Bologna, Italy — traditionally served with tagliatelle in its home city, but globally paired with spaghetti. The sauce is built on minced meat, soffritto, wine, and tomato.","zh":"Spaghetti（spah-GET-ee）是細長的圓形義大利麵條。Bolognese（boh-loh-NYEH-zeh）是源自義大利波隆那的慢燉肉醬，在當地傳統上以寬麵（tagliatelle）搭配，但全球普遍配搭意粉。醬汁以碎肉、炒香蔬菜底、葡萄酒及番茄慢燉而成。"}},{"en":"Fettuccine Lamb Ragout","zh":"羊肉醬寬麵","p":"86","tags":["notable"],"xterm":"fettuccine-lamb-ragout","options":[],"den":"flat long pasta in braised minced lamb, thyme","dzh":"寬扁長麵條搭配燉碎羊肉與百里香","explain":{"en":"Fettuccine (fet-oo-CHEE-neh) are flat, ribbon-like egg pasta from central Italy — wider than linguine, narrower than pappardelle. Ragout (ra-GOO) is the French term for a slow-braised, seasoned meat stew; it is closely related to the Italian ragù. Here the technique is applied to lamb.","zh":"Fettuccine（fet-oo-CHEE-neh）是源自義大利中部的扁平帶狀雞蛋麵，寬度介於linguine與pappardelle之間。Ragout（ra-GOO）是法語，指慢燉調味的肉類燴菜，與義大利文ragù系出同源。此菜以羊肉為主角慢燉製成。"}},{"en":"Linguine Al Pesto","zh":"青醬義大利細扁麵","p":"64","tags":["vegetarian","gluten-free","contains-nuts","notable"],"xterm":"linguine-al-pesto","options":[],"den":"long pasta in basil and pine nut sauce","dzh":"長麵條搭配羅勒松子青醬","explain":{"en":"Linguine (lin-GWEE-neh) means \"little tongues\" in Italian — flat, narrow pasta slightly wider than spaghetti. Pesto (PES-toh) comes from the Ligurian word for \"pounded\" and refers to Genoa's famous uncooked sauce of basil, pine nuts, Parmesan, garlic, and olive oil.","zh":"Linguine（lin-GWEE-neh）義大利文意為「小舌頭」，是略寬於意粉的扁平細麵。Pesto（PES-toh）源自利古里亞語「搗碎」之意，指熱那亞著名的羅勒松子醬，以羅勒、松子、帕瑪森乳酪、大蒜及橄欖油冷製而成。"}},{"en":"Beetroot Gnocchi","zh":"甜菜根麵疙瘩","p":"78","tags":["vegetarian","notable"],"xterm":"beetroot-gnocchi","options":[],"den":"pan-seared beetroot and potato dumpling, taleggio cream and walnut","dzh":"香煎甜菜根馬鈴薯麵疙瘩、塔雷吉歐起司鮮奶油與核桃","explain":{"en":"Gnocchi (NYOH-kee) are soft Italian dumplings, classically made from potato and flour; the beetroot version adds colour and a subtle earthiness. The name comes from the Italian nocchio, meaning a knot in wood. They are typically boiled and then tossed in butter or sauce.","zh":"Gnocchi（NYOH-kee）是義大利軟糯的小麵糰，傳統以馬鈴薯和麵粉製成；加入甜菜根後顏色鮮豔並帶有淡淡的土壤香氣。名稱源自義大利語nocchio，意為木節。通常水煮後拌奶油或醬汁享用。"}},{"en":"Andaman Prawn Aglio Olio","zh":"安達曼蝦蒜香橄欖油義大利麵","p":"90","tags":["gluten-free","notable"],"xterm":"andaman-prawn-aglio-olio","options":[],"den":"pasta in garlic and olive oil, and Andaman prawn","dzh":"義大利麵佐大蒜橄欖油醬與安達曼海蝦","explain":{"en":"The Andaman Sea, between Thailand and the Andaman Islands, supplies large, sweet prawns prized in fine-dining. Aglio e Olio (AH-lyoh eh OH-lyoh) is Italian for \"garlic and oil\" — a Neapolitan pasta staple of just spaghetti, garlic, chilli, and good olive oil in a silky emulsion.","zh":"安達曼海位於泰國與安達曼群島之間，以出產肉質鮮甜的大蝦聞名。Aglio e Olio（AH-lyoh eh OH-lyoh）義大利文即「蒜與油」，是那不勒斯的經典素簡麵食，以意粉、大蒜、辣椒和優質橄欖油乳化成滑順醬汁。"}},{"en":"Truffle and Porcini Mushroom Risotto","zh":"松露牛肝菌燉飯","p":"72","tags":["vegetarian","gluten-free","notable"],"xterm":"truffle-and-porcini-mushroom-risotto","options":[],"den":"carnaroli rice, porcini mushroom stock, sautéed forest mushroom, truffle oil","dzh":"卡納羅利米、牛肝菌高湯、炒野菇、松露油","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian technique of slowly stirring short-grain rice (Arborio or Carnaroli) with warm stock until creamy. Porcini (por-CHEE-nee) means \"little pigs\" in Italian — these prized wild mushrooms have an intense, meaty flavour that pairs naturally with earthy truffle.","zh":"Risotto（ree-ZOT-toh）是義大利北部的烹調技法，將短粒米（如Arborio或Carnaroli）與熱高湯慢慢拌炒至濃稠滑順。Porcini（por-CHEE-nee）義大利文意為「小豬」，此珍貴野菇風味濃郁帶肉感，與土香松露天然相配。"}},{"en":"Cheese and Prawn Risotto","zh":"起司鮮蝦燉飯","p":"98","tags":[],"xterm":"","options":[],"den":"carnaroli rice in crustacean bisque, Andaman prawn, mozzarella cheese","dzh":"卡納羅利米搭配甲殼類濃湯底、安達曼海蝦、莫札瑞拉起司"}],"id":"sec-2"},{"en":"Pizza","zh":"披薩","note":"All prices quoted are inclusive of prevailing taxes","items":[{"en":"Bufalina","zh":"水牛起司披薩","p":"70","tags":["vegetarian","notable"],"xterm":"bufalina","options":[],"den":"tomato, mozzarella di bufala, basil","dzh":"番茄、水牛莫札瑞拉起司、羅勒","explain":{"en":"Bufalina (boo-fah-LEE-nah) is an Italian diminutive of bufala (water buffalo), referring to a pizza centred on Buffalo Mozzarella — Mozzarella di Bufala — the DOP-protected cheese made from water buffalo milk. It is richer and more milky than standard cow's-milk mozzarella.","zh":"Bufalina（boo-fah-LEE-nah）是義大利語bufala（水牛）的暱稱形式，指以水牛莫札瑞拉乳酪為主角的薄餅。水牛莫札瑞拉享有義大利DOP原產地保護認證，比一般牛奶乳酪更濃郁奶香。"}},{"en":"Latteria","zh":"六重起司披薩","p":"98","tags":["vegetarian","notable"],"xterm":"latteria","options":[],"den":"6 cheeses; parmesen, gorgonzola, shredded mozzarella, buffalo mozzarella, smoked provolone, taleggio","dzh":"六種起司：帕瑪森、戈根佐拉、絲狀莫札瑞拉、水牛莫札瑞拉、煙燻普羅沃隆、塔雷吉歐","explain":{"en":"Latteria (lat-teh-REE-ah) is Italian for \"dairy\" or \"cheese shop\" — a pizza named for its celebration of multiple cheeses. Restaurants use the term to signal a cheese-forward pizza, often layering varieties such as mozzarella, Parmesan, Gorgonzola, and others for complexity.","zh":"Latteria（lat-teh-REE-ah）義大利文意為「乳品店」或「芝士店」，以此命名的薄餅主打多種乳酪的豐富層次。通常疊放莫札瑞拉、帕瑪森、戈爾根佐拉等多款乳酪，滋味複雜濃郁。"}},{"en":"Botanica","zh":"蔬菜披薩","p":"80","tags":["vegetarian"],"xterm":"","options":[],"den":"mozzarella, grilled seasonal vegetables, fresh garden herbs","dzh":"莫札瑞拉起司、烤當季蔬菜、新鮮香草"},{"en":"Tartufina","zh":"松露披薩","p":"110","tags":["notable"],"xterm":"tartufina","options":[],"den":"beef speck, shredded mozzarella, buffalo mozzarella, black truffle paste, truffle oil","dzh":"義式牛肉煙燻火腿、絲狀莫札瑞拉、水牛莫札瑞拉、黑松露醬、松露油","explain":{"en":"Tartufina (tar-too-FEE-nah) is an Italian diminutive of tartufo (truffle), describing a truffle-themed pizza. Truffles are prized underground fungi — black or white — with an intensely earthy, aromatic flavour. The suffix -ina gives the name an affectionate, delicate quality matching the ingredient's luxurious subtlety.","zh":"Tartufina（tar-too-FEE-nah）是義大利語tartufo（松露）的暱稱形式，指以松露為主題的薄餅。松露是生長於地下的珍貴菌類，分黑松露與白松露，氣味濃郁獨特。字尾-ina帶有親暱輕柔之意，恰好呼應這款奢華食材的細緻風格。"}},{"en":"Rustica","zh":"田園鄉村披薩","p":"98","tags":["notable"],"xterm":"rustica","options":[],"den":"roasted potato, taleggio cheese, shredded mozzarella, lamb ragout","dzh":"烤馬鈴薯、塔雷吉歐起司、絲狀莫札瑞拉、燉羊肉醬","explain":{"en":"Rustica (ROOS-tee-kah) is the feminine form of the Italian adjective rustico, meaning \"rustic\" or \"country-style.\" Applied to pizza, it signals hearty, unpretentious toppings — often cured meats, roasted vegetables, or rough-textured ingredients evoking Italian farmhouse cooking.","zh":"Rustica（ROOS-tee-kah）是義大利形容詞rustico的陰性形式，意為「鄉村風格」或「質樸」。用於薄餅命名時，代表配料豐盛實在，常見醃製肉類、烤蔬菜等食材，喚起義大利農家料理的樸實風情。"}},{"en":"Frutti Di Mare","zh":"海鮮披薩","p":"130","tags":["signature","notable"],"xterm":"frutti-di-mare","options":[],"den":"Andaman catch of the sea: prawn, mussel, squid, crabmeat, scallops, clams, seabass, lobster, Mozzarella","dzh":"安達曼海鮮：蝦、淡菜、魷魚、蟹肉、干貝、蛤蜊、海鱸魚、龍蝦、莫札瑞拉起司","explain":{"en":"Italian for \"fruits of the sea,\" this term refers to a mix of seafood — typically including prawns, mussels, clams, squid, and scallops. It appears on menus as a topping for pizza or pasta, or as a standalone seafood platter. The exact selection varies by catch and season.","zh":"義大利文意為「海之果實」，泛指多種混合海鮮，通常包括明蝦、青口、蜆、魷魚和帶子等。可作為薄餅或意粉的配料，也可以作獨立的海鮮拼盤呈現。具體食材因時令漁獲而異。"}}],"id":"sec-3"},{"en":"Main Course","zh":"主菜","note":"All prices quoted are inclusive of prevailing taxes","items":[{"en":"Cacciucco – Seafood Stew","zh":"卡丘可海鮮燉湯","p":"188","tags":["signature","notable"],"xterm":"cacciucco","options":[],"den":"oven baked seafood soup with lobster, mussels, clams, scallops, squid","dzh":"焗烤海鮮湯，含龍蝦、淡菜、蛤蜊、干貝、魷魚","explain":{"en":"A rich, thick seafood stew originating from Livorno in Tuscany, Italy. It traditionally contains a wide variety of fish and shellfish cooked in a spiced tomato and red wine broth. It is typically served over slices of toasted garlic bread.","zh":"源自義大利托斯卡納利佛諾市的濃郁海鮮燉湯。傳統做法將多種魚類和貝類以加了香料的番茄紅酒湯底燉煮而成，通常搭配蒜味烤麵包片一同上桌。"}},{"en":"Zuppa di Cozze","zh":"義式淡菜湯","p":"79","tags":["notable"],"xterm":"zuppa-di-cozze","options":[],"den":"black mussel in tomato, ciabatta, green oil","dzh":"黑淡菜搭配番茄、恰巴達麵包、香草油","explain":{"en":"An Italian mussel soup in which fresh mussels are steamed open in a broth typically made with tomato, garlic, white wine, and herbs. The flavorful broth is a key feature of the dish. It is commonly served with crusty bread for dipping.","zh":"一道義大利青口湯，以新鮮青口在番茄、大蒜、白葡萄酒和香草熬成的湯底中烹煮至開口。湯底本身鮮美濃郁，是此菜的精髓所在。通常搭配脆皮麵包沾湯享用。"}},{"en":"Filletto di Salmone","zh":"鮭魚菲力","p":"132","tags":["notable"],"xterm":"filletto-di-salmone","options":[],"den":"pan seared salmon, broccoli, spring onion, chilli, bell pepper pure","dzh":"香煎鮭魚、青花菜、蔥、辣椒、甜椒泥","explain":{"en":"Filletto di Salmone (fee-LET-toh dee sal-MOH-neh) is Italian for \"salmon fillet.\" Filletto (related to the French filet) refers to a boneless cut of fish or meat; salmone is salmon. The dish straightforwardly presents a pan-seared or roasted boneless salmon portion.","zh":"Filletto di Salmone（fee-LET-toh dee sal-MOH-neh）義大利文即「鮭魚柳」。Filletto與法語filet同源，指去骨的魚肉或肉排；salmone即鮭魚。此菜通常以煎或烤方式烹調去骨鮭魚。"}},{"en":"Filletto di Branzino","zh":"海鱸魚菲力","p":"102","tags":["gluten-free","notable"],"xterm":"filletto-di-branzino","options":[],"den":"roasted seabass, fresh tomato sauce, capers, kalamata olives, grilled vegetables","dzh":"烤海鱸魚、新鮮番茄醬、酸豆、卡拉瑪塔橄欖、烤時蔬","explain":{"en":"Branzino (bran-ZEE-noh) is the Italian name for European sea bass (Dicentrarchus labrax), prized in Mediterranean cuisine for its delicate, sweet white flesh. Filletto di Branzino (fee-LET-toh dee bran-ZEE-noh) means a boneless fillet of this fish, typically grilled or roasted.","zh":"Branzino（bran-ZEE-noh）是歐洲鱸魚的義大利名稱，在地中海料理中備受推崇，以其細嫩鮮甜的白肉著稱。Filletto di Branzino（fee-LET-toh dee bran-ZEE-noh）即去骨鱸魚柳，通常以烤或煎方式烹調。"}},{"en":"Galletto al Forno","zh":"爐烤春雞","p":"97","tags":["gluten-free","notable"],"xterm":"galletto-al-forno","options":[],"den":"spring chicken, seasonal vegetables, potato, chimichurri","dzh":"春雞、當季蔬菜、馬鈴薯、奇米丘里醬","explain":{"en":"An Italian oven-roasted dish featuring galletto, a young small chicken (poussin) typically weighing under 500 g. The bird is seasoned with herbs, garlic, and olive oil before roasting, resulting in tender meat and crispy skin. It is often served whole or halved.","zh":"義大利烤焗料理，主角是「galletto」——一種體重通常不超過500克的幼雞（春雞）。烤前以香草、大蒜和橄欖油醃製，烤出皮脆肉嫩的效果。通常整隻或對半切開上桌。"}},{"en":"Tagliata di Manzo","zh":"義式切片牛肉","p":"99","tags":["gluten-free","notable"],"xterm":"tagliata-di-manzo","options":[],"den":"pan seared sliced beef flank, rocket salad, cherry tomato, shaved parmesan, balsamic reduction","dzh":"香煎切片牛腹肉、芝麻葉沙拉、小番茄、刨絲帕瑪森起司、巴薩米克濃縮醬","explain":{"en":"An Italian beef dish in which a steak — typically sirloin or ribeye — is grilled to medium-rare and then sliced against the grain. The slices are arranged over rocket leaves and shaved Parmesan, drizzled with olive oil. The name means \"sliced beef\" in Italian.","zh":"義大利牛肉料理，將西冷或肋眼牛扒烤至五成熟後逆紋切片。肉片鋪放在芝麻菜和帕爾馬芝士薄片上，淋以橄欖油。名稱在義大利文中即為「切片牛肉」之意。"}}],"id":"sec-4"},{"en":"Desserts","zh":"甜點","note":"All prices quoted are inclusive of prevailing taxes","items":[{"en":"Tropical Fruits Platter","zh":"熱帶水果拼盤","p":"44","tags":[],"xterm":"","options":[],"den":"selection of our seasonal fruits, 5 types","dzh":"精選當季水果五種"},{"en":"Tiramisu (glass)","zh":"提拉米蘇（玻璃杯裝）","p":"48","tags":["signature","notable"],"xterm":"tiramisu","options":[],"den":"layers of mascarpone cream, coffee-soaked lady fingers and a dusting of cocoa powder","dzh":"馬斯卡彭奶油分層、咖啡浸泡手指餅乾與可可粉撒面","explain":{"en":"A beloved Italian dessert made from layers of espresso-soaked savoiardi (ladyfinger biscuits) and a creamy mixture of mascarpone cheese, eggs, and sugar, dusted with cocoa powder. Its name means \"pick me up\" in Italian, a nod to its coffee content. It is often set and served in a glass for individual portions.","zh":"深受喜愛的義大利甜點，由浸泡了濃縮咖啡的手指餅乾與馬斯卡彭芝士、雞蛋和糖製成的忌廉層層疊放，表面撒上可可粉。名稱在義大利文中意為「提振精神」，呼應其咖啡成分。杯裝版本方便個人享用。"}},{"en":"Cannoli","zh":"卡諾里捲","p":"45","tags":["notable"],"xterm":"cannoli","options":[],"den":"crisp and flaky cannoli shell, lusciously creamy, sweet ricotta cheese and mascarpone with decadent dark chocolate chips","dzh":"酥脆薄片卡諾里外殼，內填濃郁甜瑞可塔起司與馬斯卡彭，搭配黑巧克力碎片","explain":{"en":"A traditional Sicilian pastry consisting of tube-shaped fried pastry shells filled with a sweet, creamy ricotta filling, often mixed with chocolate chips, candied fruit, or pistachios. The shells are crispy while the filling is rich and smooth. The singular form is \"cannolo.\"","zh":"源自西西里島的傳統義式甜點，以炸脆的圓筒形薄酥皮為外殼，內填以瑞可達芝士為基底的甜忌廉，常混入朱古力碎、蜜餞水果或開心果。外皮香脆，餡料濃郁滑順。單數形式為「cannolo」。"}},{"en":"Almond Semifreddo","zh":"杏仁半冷凍冰淇淋","p":"45","tags":["notable"],"xterm":"semifreddo","options":[],"den":"creamy almond semifreddo, warm apple compote","dzh":"濃郁杏仁半冷凍甜點，搭配溫熱蘋果果醬","explain":{"en":"An Italian semi-frozen dessert with a texture between ice cream and mousse, made from whipped cream, eggs, and sugar with various flavourings such as almond, chocolate, or fruit. It is served sliced and cold but not fully frozen hard. The name means \"half cold\" in Italian.","zh":"義大利半凍甜品，質感介乎雪糕和慕絲之間，以打發忌廉、雞蛋和糖製成，可加入杏仁、朱古力或水果等各式口味。切片冷食，但質地不像雪糕那樣完全凍硬。名稱在義大利文中意為「半冷」。"}},{"en":"Vanilla Panna Cotta","zh":"香草義式奶凍","p":"48","tags":["notable"],"xterm":"panna-cotta","options":[],"den":"creamy cooked cream, mixed berries compote","dzh":"濃郁熟煮鮮奶油，搭配綜合莓果果醬","explain":{"en":"A classic Italian dessert from the Piedmont region, made by setting sweetened cream with gelatin and chilling it until firm. It has a silky, delicate texture and a mild milky flavour that pairs well with fruit coulis, caramel, or vanilla. The name means \"cooked cream\" in Italian.","zh":"源自義大利皮埃蒙特的經典甜品，以明膠將加糖的忌廉凝固冷卻而成。質感絲滑細嫩，味道清淡，帶奶香，常搭配果醬、焦糖或雲尼拿醬享用。名稱在義大利文中意為「煮熟的忌廉」。"}}],"id":"sec-5"},{"en":"Signature Cocktail's","zh":"招牌調酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Dannatini","zh":"丹那提尼","p":"50","tags":[],"xterm":"","options":[],"den":"white rum, espresso, cinnamon syrup","dzh":"白蘭姆酒、濃縮咖啡、肉桂糖漿"},{"en":"Terrace Spritz","zh":"Terrace 氣泡調酒","p":"50","tags":["notable"],"xterm":"spritz","options":[],"den":"homemade limoncello, prosecco, soda water","dzh":"自製檸檬酒、普羅賽克氣泡酒、蘇打水","explain":{"en":"Spritz (SHPRITS) comes from the German/Austrian word for \"splash\" — Austrian soldiers in 19th-century Venice would splash soda water into local wine to lower the alcohol. The modern Aperol or Campari Spritz (prosecco, bitter liqueur, soda, orange slice) is now Italy's most iconic aperitivo.","zh":"Spritz（SHPRITS）源自德語/奧地利語「噴濺」之意——19世紀奧地利士兵在威尼斯將蘇打水加入當地葡萄酒中稀釋酒精。現代版以prosecco、Aperol或Campari加蘇打水和橙片調製，已成為義大利最具代表性的餐前酒。"}}],"id":"sec-6"},{"en":"Signature Mocktail's","zh":"招牌無酒精調飲","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Danna Ice Tea","zh":"丹那冰茶","p":"40","tags":[],"xterm":"","options":[],"den":"coconut syrup, orgeat syrup, passion fruit syrup, black tea","dzh":"椰子糖漿、杏仁糖漿、百香果糖漿、紅茶"},{"en":"Peach Spritz","zh":"水蜜桃氣泡飲","p":"40","tags":[],"xterm":"","options":[],"den":"peach puree, grenadine syrup, lime, soda water","dzh":"水蜜桃果泥、石榴糖漿、萊姆、蘇打水"}],"id":"sec-7"},{"en":"Sparkling Wine Cocktail","zh":"氣泡酒調酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"French 75","zh":"法式75","p":"45","tags":["notable"],"xterm":"french-75","options":[],"den":"gin, lemon juice, sparkling wine","dzh":"琴酒、檸檬汁、氣泡酒","explain":{"en":"The French 75 is a cocktail of gin (or cognac), lemon juice, sugar, and champagne. It was named after the French 75mm field gun used in World War I — the drink's kick was said to feel like being hit by that artillery. It was popularised at Harry's New York Bar in Paris around 1915.","zh":"法式75號是以琴酒（或干邑）、檸檬汁、糖及香檳調製的雞尾酒，以一戰時法軍使用的75毫米野戰炮命名——據說此酒的後勁有如被炮擊中一般。約於1915年在巴黎的Harry's New York Bar廣為流傳。"}},{"en":"Bellini","zh":"貝里尼","p":"45","tags":["notable"],"xterm":"bellini","options":[],"den":"peach purée, prosecco","dzh":"水蜜桃果泥、普羅賽克氣泡酒","explain":{"en":"The Bellini (bel-LEE-nee) is a cocktail of white peach purée and prosecco, created around 1948 by Giuseppe Cipriani at Harry's Bar in Venice. He named it after the Venetian Renaissance painter Giovanni Bellini, whose artwork inspired the drink's delicate pink-gold hue.","zh":"貝里尼（bel-LEE-nee）以白桃果泥與prosecco氣泡酒調製，約於1948年由威尼斯Harry's Bar的Giuseppe Cipriani創作。他以文藝復興時期威尼斯畫家喬凡尼·貝里尼命名，因畫作色調令他聯想到這款酒的淡粉金色澤。"}},{"en":"Mimosa","zh":"含羞草","p":"45","tags":[],"xterm":"","options":[],"den":"fresh orange juice, prosecco","dzh":"新鮮柳橙汁、普羅賽克氣泡酒"},{"en":"Kir Royal","zh":"皇家基爾","p":"45","tags":["notable"],"xterm":"kir-royal","options":[],"den":"crème de cassis, prosecco","dzh":"黑醋栗香甜酒、普羅賽克氣泡酒","explain":{"en":"A classic French aperitif made by combining crème de cassis (blackcurrant liqueur) with Champagne. It is a more prestigious variation of the original Kir, which uses still white wine instead. The drink is pale pink to deep red in colour with a fruity, slightly sweet taste.","zh":"經典法式開胃酒，以黑加侖子甜酒（crème de cassis）加入香檳調製而成。此酒是原版Kir（以靜白葡萄酒代替香檳）的升級版。色澤呈淡粉紅至深紅色，口感果香帶微甜。"}}],"id":"sec-8"},{"en":"Martini's","zh":"馬丁尼系列","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Cosmopolitan","zh":"柯夢波丹","p":"45","tags":[],"xterm":"","options":[],"den":"vodka, triple sec, cranberry juice, lime juice","dzh":"伏特加、橙皮酒、蔓越莓汁、萊姆汁"},{"en":"Manhattan","zh":"曼哈頓","p":"45","tags":[],"xterm":"","options":[],"den":"canadian club, sweet vermouth, angostura bitters","dzh":"加拿大威士忌、甜香艾酒、安格斯圖拉苦精"},{"en":"Espresso Martini","zh":"濃縮咖啡馬丁尼","p":"45","tags":[],"xterm":"","options":[],"den":"vodka, kahlua, espresso, sugar syrup","dzh":"伏特加、卡魯哇咖啡酒、濃縮咖啡、糖漿"},{"en":"Dry Martini","zh":"乾式馬丁尼","p":"45","tags":[],"xterm":"","options":[],"den":"gin, dry vermouth","dzh":"琴酒、不甜香艾酒"}],"id":"sec-9"},{"en":"Classic Cocktail","zh":"經典調酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Orange Spritzz","zh":"柳橙氣泡調酒","p":"45","tags":[],"xterm":"","options":[],"den":"le favori, prosecco, soda water","dzh":"Le Favori 橙酒、普羅賽克氣泡酒、蘇打水"},{"en":"Daiquiri","zh":"黛克瑞","p":"45","tags":["notable"],"xterm":"daiquiri","options":[],"den":"light rum, triple sec, lime juice, simple syrup","dzh":"淡蘭姆酒、橙皮酒、萊姆汁、糖漿","explain":{"en":"Daiquiri (DAK-uh-ree) is a Cuban cocktail of white rum, fresh lime juice, and sugar — simple, bright, and refreshing. It takes its name from Daiquirí, a small mining town in eastern Cuba near Santiago, where American engineers reportedly mixed local rum with lime around 1900.","zh":"Daiquiri（DAK-uh-ree）是古巴雞尾酒，以白蘭姆酒、新鮮青檸汁及糖調製，清爽簡潔。名稱來自古巴東部聖地牙哥附近的小礦業小鎮Daiquirí，據說美國工程師約於1900年在當地以蘭姆酒和青檸調製而成。"}},{"en":"Whskey Sour","zh":"威士忌酸酒","p":"45","tags":[],"xterm":"","options":[],"den":"whiskey, lime juice, simple syrup","dzh":"威士忌、萊姆汁、糖漿"},{"en":"Old fashion","zh":"古典雞尾酒","p":"45","tags":["notable"],"xterm":"old-fashioned","options":[],"den":"whiskey, brown sugar, angostura bitters","dzh":"威士忌、紅糖、安格斯圖拉苦精","explain":{"en":"One of the oldest and most iconic cocktails, made by muddling a sugar cube with aromatic bitters, then adding whiskey (typically bourbon or rye) and a large ice cube. It is garnished with an orange peel and sometimes a cherry. It is spirit-forward, strong, and subtly sweet.","zh":"最古老、最具代表性的雞尾酒之一，將方糖與芳香苦精搗勻，加入威士忌（通常為波本或黑麥威士忌）和大冰塊調製而成。以橙皮裝飾，有時加入車厘子。酒味突出，酒體強勁，帶微甜。"}},{"en":"Piña Colada","zh":"鳳梨可樂達","p":"45","tags":["notable"],"xterm":"pina-colada","options":[],"den":"white rum, malibu, coconut cream, pineapple juice","dzh":"白蘭姆酒、馬里布椰子酒、椰奶、鳳梨汁","explain":{"en":"Piña Colada (PEEN-yah koh-LAH-dah) means \"strained pineapple\" in Spanish. This Puerto Rican cocktail blends white rum, coconut cream, and pineapple juice; it was declared Puerto Rico's national drink in 1978. The Caribe Hilton in San Juan claims its 1954 invention.","zh":"Piña Colada（PEEN-yah koh-LAH-dah）西班牙語意為「過濾的鳳梨」。這款波多黎各雞尾酒以白蘭姆酒、椰漿及鳳梨汁調製，於1978年被列為波多黎各國家飲品。聖胡安的加勒比希爾頓酒店宣稱於1954年發明此酒。"}},{"en":"Margarita","zh":"瑪格麗特","p":"45","tags":[],"xterm":"","options":[],"den":"tequila, triple sec, lime juice, simple syrup","dzh":"龍舌蘭酒、橙皮酒、萊姆汁、糖漿"},{"en":"Negroni","zh":"內格羅尼","p":"45","tags":["notable"],"xterm":"negroni","options":[],"den":"gin, campari, sweet vermouth","dzh":"琴酒、金巴利、甜香艾酒","explain":{"en":"A classic Italian cocktail made in equal parts of gin, sweet vermouth, and Campari, stirred over ice and garnished with an orange slice or peel. It is bittersweet, aromatic, and spirit-forward. It was reportedly invented in Florence in 1919.","zh":"經典義大利雞尾酒，以等份琴酒、甜苦艾酒和金巴利攪拌加冰調製，以橙片或橙皮裝飾。口感甘苦交融，香氣馥郁，酒味鮮明。據說源於1919年的佛羅倫斯。"}},{"en":"Mojito","zh":"莫希托","p":"45","tags":[],"xterm":"","options":[],"den":"light rum, brown sugar, mint leaf, soda water","dzh":"淡蘭姆酒、紅糖、薄荷葉、蘇打水"}],"id":"sec-10"},{"en":"Mocktails","zh":"無酒精調飲","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Mango Lassi","zh":"芒果拉西","p":"35","tags":["notable"],"xterm":"mango-lassi","options":[],"den":"yoghurt, mango purée, mango juice","dzh":"優格、芒果果泥、芒果汁","explain":{"en":"A popular South Asian chilled drink blending yogurt with mango pulp, sugar, and sometimes cardamom or rose water. It is thick, creamy, and refreshing, often enjoyed as a cooling counterpart to spicy food. Lassi is the general term for the yogurt-based drink category.","zh":"廣受歡迎的南亞冷飲，以乳酪與芒果果肉、糖調勻而成，有時加入荳蔻或玫瑰水。口感濃稠滑順、清爽怡人，常作為辛辣菜餚的清口飲品。「拉西」泛指此類以乳酪為基底的飲品。"}},{"en":"Fruit Mocktail","zh":"水果調飲","p":"35","tags":[],"xterm":"","options":[],"den":"orange juice, grapefruit juice, banana purée, pineapple juice, lime juice","dzh":"柳橙汁、葡萄柚汁、香蕉果泥、鳳梨汁、萊姆汁"},{"en":"Virgin Piña Colada","zh":"無酒精鳳梨可樂達","p":"35","tags":[],"xterm":"","options":[],"den":"pineapple juice, coconut cream","dzh":"鳳梨汁、椰奶"},{"en":"Fruit Punch","zh":"水果賓治","p":"35","tags":[],"xterm":"","options":[],"den":"mango juice, pineapple juice, orange juice, lime juice, grenadine syrup","dzh":"芒果汁、鳳梨汁、柳橙汁、萊姆汁、石榴糖漿"},{"en":"Summer Delight","zh":"夏日清新飲","p":"35","tags":[],"xterm":"","options":[],"den":"orange juice, mango juice, strawberry purée, lime juice, sprite","dzh":"柳橙汁、芒果汁、草莓果泥、萊姆汁、雪碧"},{"en":"Virgin Mojito","zh":"無酒精莫希托","p":"35","tags":[],"xterm":"","options":[],"den":"mint leaf, lime juice, brown sugar, soda water","dzh":"薄荷葉、萊姆汁、紅糖、蘇打水"}],"id":"sec-11"},{"en":"Draught","zh":"生啤酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Carlsberg 330 ml","zh":"嘉士伯 330 毫升","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carlsberg 500 ml","zh":"嘉士伯 500 毫升","p":"40","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-12"},{"en":"Beer of the World","zh":"世界精選啤酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Carlsberg | Denmark","zh":"嘉士伯｜丹麥","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Tiger | Singapore","zh":"虎牌｜新加坡","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"e 5","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-16"},{"en":"Rum","zh":"蘭姆酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Cachaca","zh":"卡莎沙","p":"28","tags":["notable"],"xterm":"cachaca","options":[],"den":"","dzh":"","explain":{"en":"Cachaça (ka-SHA-sa) is Brazil's national spirit, distilled directly from fresh sugarcane juice rather than molasses, giving it a grassy, funky freshness that sets it apart from rum. It is the essential base of the Caipirinha cocktail. Most cachaça is unaged and bottled clear, though barrel-aged expressions develop richer, woodier notes.","zh":"卡夏莎（ka-SHA-sa）是巴西的國民烈酒，直接以新鮮甘蔗汁蒸餾而成，而非以糖蜜為原料，因此帶有清新的草本與發酵香氣，風味有別於蘭姆酒。它是經典調酒卡比利亞（Caipirinha）不可或缺的基酒。多數卡夏莎未經桶陳，呈透明清澈，但經橡木桶熟成的款式則帶有更豐富的木質層次。"}},{"en":"Bacardi Light","zh":"百加得白蘭姆","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bacardi Gold","zh":"百加得金蘭姆","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Captain Morgan Black Label","zh":"摩根船長黑標","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Captain Morgan Spice","zh":"摩根船長香料蘭姆","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Myers's","zh":"邁爾斯","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Malibu","zh":"馬里布","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-17"},{"en":"Tequila","zh":"龍舌蘭酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Camino","zh":"卡米諾","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Jose Cuervo Gold","zh":"金快活","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Patron Silver","zh":"培恩銀標","p":"44","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Patron Añejo","zh":"培恩陳年","p":"44","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-18"},{"en":"Whiskey Collections – Scotch","zh":"威士忌精選 — 蘇格蘭","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Chivas Re nd spices including myrrh, rhubarb, and saffron. Intensely bitter and medicinal, it is traditionally served as a digestivo.","zh":"Fernet-Branca（fer-NET BRAN-kah）是自1845年起由米蘭Branca家族釀製的苦味義大利藥草利口酒（amaro），以包含沒藥、大黃和番紅花在內的27種藥草香料秘方製成。口味極苦帶藥草氣息，傳統上作為餐後助消化酒飲用。"}},{"en":"Kirsch","zh":"櫻桃白蘭地","p":"36","tags":["notable"],"xterm":"kirsch","options":[],"den":"","dzh":"","explain":{"en":"Kirsch (KEERSH), short for Kirschwasser (KEERSH-vas-er), is German for \"cherry water\" — a clear, dry brandy distilled from fermented whole sour cherries, pits included, which lend a subtle almond-like bitterness. Originating in the Black Forest region of Germany and Alsace, France, it is a key flavouring in Black Forest cake and Swiss fondue. Unlike sweet cherry liqueurs, Kirsch is unsweetened and distinctly spirit-forward.","zh":"Kirsch（KEERSH）是 Kirschwasser（KEERSH-vas-er）的縮寫，德文意為「櫻桃水」，是一種以整顆酸櫻桃（含果核）發酵後蒸餾而成的清澈不甜白蘭地，果核賦予其淡淡的杏仁苦香。它源自德國黑森林地區與法國阿爾薩斯，是黑森林蛋糕與瑞士起司火鍋的經典調味用酒。與甜味櫻桃利口酒不同，Kirsch 不含糖，酒味鮮明純粹。"}},{"en":"Poire Williams","zh":"威廉斯梨子白蘭地","p":"38","tags":["notable"],"xterm":"poire-williams","options":[],"den":"","dzh":"","explain":{"en":"Poire Williams (pwahr wil-YAMZ) is a clear fruit brandy (eau-de-vie) distilled from Williams pears — known in English as Bartlett pears. Produced mainly in Switzerland, France, and Alsace, it captures the fresh, floral fragrance of ripe pear with no added sugar.","zh":"Poire Williams（pwahr wil-YAMZ）是以威廉梨（英文稱Bartlett pear）蒸餾而成的透明果香白蘭地（eau-de-vie），主要產於瑞士、法國及阿爾薩斯地區，不添加糖分，完整保留熟梨的清新花香。"}}],"id":"sec-29"},{"en":"Grappa","zh":"葡萄渣白蘭地","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Pilzer Chardonnay","zh":"皮爾澤夏多內葡萄渣白蘭地","p":"38","tags":["notable"],"xterm":"grappa","options":[],"den":"","dzh":"","explain":{"en":"An Italian pomace brandy distilled from the grape skins, seeds, and stems left after winemaking. It is typically strong (35–60% ABV) with a robust, fiery character, and is traditionally served as a digestif after meals. Single-variety grappas, such as those made from Chardonnay grapes, carry the aromatic profile of that grape.","zh":"義大利的葡萄渣白蘭地，以釀酒後剩餘的葡萄皮、籽和梗蒸餾而成。酒精度通常較高（35–60%），口感強勁辛烈，傳統上作為餐後助消化酒飲用。以單一品種葡萄（如夏多內）製作的格拉帕，會帶有該葡萄品種的香氣特質。"}},{"en":"Pilzer Moscato Giallo","zh":"皮爾澤黃蜜思嘉葡萄渣白蘭地","p":"38","tags":["notable"],"xterm":"grappa","options":[],"den":"","dzh":"","explain":{"en":"An Italian pomace brandy distilled from the grape skins, seeds, and stems left after winemaking. It is typically strong (35–60% ABV) with a robust, fiery character, and is traditionally served as a digestif after meals. Single-variety grappas, such as those made from Chardonnay grapes, carry the aromatic profile of that grape.","zh":"義大利的葡萄渣白蘭地，以釀酒後剩餘的葡萄皮、籽和梗蒸餾而成。酒精度通常較高（35–60%），口感強勁辛烈，傳統上作為餐後助消化酒飲用。以單一品種葡萄（如夏多內）製作的格拉帕，會帶有該葡萄品種的香氣特質。"}}],"id":"sec-30"},{"en":"Liquers","zh":"利口酒","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Tia Maria","zh":"提亞瑪麗亞咖啡酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Kahlúa","zh":"卡魯哇咖啡酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bailey's","zh":"百利甜酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Amaretto","zh":"杏仁香甜酒","p":"33","tags":["notable"],"xterm":"amaretto","options":[],"den":"","dzh":"","explain":{"en":"Amaretto (ah-mah-RET-toh) is a sweet Italian liqueur whose name means \"a little bitter\" — from amaro (bitter). Despite its almond flavour, it is traditionally made from apricot kernels or a blend of almonds and stone-fruit pits. It originates from Saronno in northern Italy; Disaronno is the best-known brand.","zh":"Amaretto（ah-mah-RET-toh）是義大利甜味利口酒，名稱源自amaro（苦），意為「略帶苦味」。雖然帶有杏仁香氣，傳統上以杏桃核仁或杏仁與核果仁混合製成。起源於義大利北部薩羅諾，Disaronno是最知名的品牌。"}},{"en":"Crème De Banana","zh":"香蕉香甜酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Blue Curacao","zh":"藍色柑橘酒","p":"33","tags":["notable"],"xterm":"curacao","options":[],"den":"","dzh":"","explain":{"en":"Curaçao (KYOOR-uh-sow) is a liqueur flavored with the dried peel of the laraha citrus fruit, native to the Caribbean island of Curaçao — a Dutch colony where Spanish settlers found the local oranges too bitter to eat but discovered their peel had an intense, aromatic oil. Blue Curaçao is simply the classic orange-flavored liqueur dyed vivid blue for cocktail color effects; the flavor is essentially the same as the clear or orange versions.","zh":"庫拉索橙皮酒（KYOOR-uh-sow）是以拉拉哈柑橘（laraha）的乾燥果皮為原料製成的香甜酒，產自荷屬加勒比海島嶼庫拉索。當地西班牙移民發現這種橙子苦到難以入口，卻意外找到其果皮含有濃郁的芳香精油，於是發展出這款經典橙香酒。藍色庫拉索酒是添加了藍色食用色素的版本，風味與透明或橙色款幾乎相同，主要用來為調酒增添鮮豔色彩。"}},{"en":"Cherry Brandy","zh":"櫻桃白蘭地","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sambuca","zh":"桑布卡茴香酒","p":"33","tags":["notable"],"xterm":"sambuca","options":[],"den":"","dzh":"","explain":{"en":"Sambuca (sam-BOO-kah) is an Italian anise-flavoured liqueur, sweet and strongly aromatic. The name likely derives from sambuco (elderberry) in Italian, though modern Sambuca is flavoured with star anise or green anise, not elderberry. It is often served con la mosca — \"with the fly\" — meaning three coffee beans floated on top for luck.","zh":"Sambuca（sam-BOO-kah）是義大利的茴香甜味利口酒，香氣濃郁。名稱可能源自義大利語sambuco（接骨木），但現代配方以八角或綠茴香調味，並不含接骨木。常見喝法是con la mosca（「帶著蒼蠅」），即在酒杯中放入三粒咖啡豆以象徵好運。"}},{"en":"D.O.M Benedictine","zh":"班尼迪克丁香草酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cointreau","zh":"君度橙酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-31"},{"en":"Mineral Water","zh":"礦泉水","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Acqua Panna 75cl","zh":"阿夸帕娜天然礦泉水 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Natural","dzh":"天然礦泉水"},{"en":"San Pellegrino 75cl","zh":"聖沛黎洛氣泡水 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Sparkling","dzh":"氣泡礦泉水"}],"id":"sec-32"},{"en":"Soda","zh":"汽水","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Coke","zh":"可口可樂","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Coke Zero","zh":"零卡可口可樂","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sprite","zh":"雪碧","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-33"},{"en":"Freshly Squeezed Juice","zh":"現榨果汁","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Orange","zh":"柳橙汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Pineapple","zh":"鳳梨汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Watermelon","zh":"西瓜汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carrot","zh":"紅蘿蔔汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Apple","zh":"蘋果汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-34"},{"en":"Fresh Coconut","zh":"新鮮椰子","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Pandan Coconut","zh":"班蘭椰子","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-35"},{"en":"Local Tea and Coffee","zh":"在地茶與咖啡","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Teh Tarik","zh":"拉茶","p":"18","tags":["notable"],"xterm":"teh-tarik","options":[],"den":"black tea with condensed milk","dzh":"紅茶加煉乳","explain":{"en":"A popular Malaysian and Singaporean hot milk tea made with strong black tea blended with sweetened condensed milk. Its name means \"pulled tea\" in Malay, referring to the technique of pouring the drink between two vessels from a height to create a frothy top and cool it slightly. It is a staple at kopitiams (traditional coffee shops).","zh":"一種在馬來西亞和新加坡廣受歡迎的熱奶茶，以濃烈紅茶加入甜煉乳調製而成。其名稱在馬來語中意為「拉茶」，源於調製時將茶在兩個容器之間從高處來回傾倒，以製造綿密奶泡並略為降溫的技法。拉茶是傳統咖啡店（Kopitiam）的必備飲品。"}},{"en":"Kopi Kedah","zh":"吉打咖啡","p":"18","tags":[],"xterm":"","options":[],"den":"Black local coffee with condensed milk","dzh":"在地黑咖啡加煉乳"}],"id":"sec-36"},{"en":"Freshly Brewed Coffee","zh":"現煮咖啡","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"Americano","zh":"美式咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Café latte","zh":"拿鐵咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cappuccino","zh":"卡布奇諾","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Espresso","zh":"濃縮咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Decaffeinated","zh":"低咖啡因咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-37"},{"en":"1837 TWG Tea Selections","zh":"1837 TWG 精選茶品","note":"All our prices are nett and in Malaysia ringgit","items":[{"en":"English Breakfast Tea","zh":"英式早餐茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"English Earl Grey","zh":"伯爵茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Jasmine Queen Tea","zh":"茉莉女王茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Rose Boudoir Tea","zh":"玫瑰閨房茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Chamomile Tea","zh":"洋甘菊茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Marrakech Tea","zh":"馬拉喀什茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-38"}];
const TAGS = [{"id":"notable","en":"Notable","zh":"特色","icon":"💡","group":"highlight"},{"id":"signature","en":"Highlight","zh":"推薦亮點","icon":"⭐","group":"highlight"},{"id":"gluten-free","en":"Gluten Free","zh":"無麩質","icon":"🌾","group":"diet"},{"id":"contains-nuts","en":"Contains Nuts","zh":"含堅果","icon":"🥜","group":"allergen"},{"id":"vegetarian","en":"Vegetarian","zh":"適合素食","icon":"🌱","group":"diet"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.filter(t => t !== "notable").map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const pic = it.img ? `<img class="dish" src="${esc(it.img)}" loading="lazy" alt="">` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${pic}${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
</body>
</html>
