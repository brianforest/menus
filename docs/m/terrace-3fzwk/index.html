<style>
  :root {
    --ink: #1c1c1e; --muted: #6f6f74; --line: #e7e3db; --paper: #faf8f4;
    --card: #ffffff; --accent: #8a6d3b; --accent-soft: #f1eae0; --price: #2c2c2e;
    --maxw: 900px; --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang TC", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; overflow-wrap: break-word;
  }
  header.hero {
    text-align: center; padding: calc(40px + env(safe-area-inset-top, 0px)) 20px 26px;
    background: linear-gradient(180deg, #fff 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--line);
  }
  header.hero h1 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(36px, 9vw, 54px); letter-spacing: 1px; font-weight: 700; }
  header.hero .zh-title { color: var(--accent); font-size: clamp(18px, 4.6vw, 24px); margin-top: 6px; letter-spacing: 4px; }
  header.hero .sub { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .controls {
    position: sticky; top: 0; z-index: 30; background: rgba(250,248,244,.92);
    backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line); padding: 8px 0 6px;
  }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; padding: 0 14px; }
  .lang-toggle button {
    flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    padding: 7px 16px; min-height: 38px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -ms-overflow-style: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a { flex: 0 0 auto; text-decoration: none; font-size: 15px; color: var(--accent);
    background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 14px calc(80px + var(--safe-b)); }
  .filterbar { display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px 8px;
    scrollbar-width: none; -ms-overflow-style: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 6px 12px; min-height: 36px; cursor: pointer;
    white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  body.lang-zh .chip .cen { display: none; }
  body.lang-en .chip .czh { display: none; }

  section { margin-top: 38px; scroll-margin-top: 96px; }
  .sec-head { border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .sec-head h2 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px, 6.4vw, 32px); letter-spacing: .5px; }
  .sec-head .zh { color: var(--accent); font-size: clamp(17px, 4.6vw, 21px); letter-spacing: 2px; }
  .sec-note { color: var(--muted); font-size: 15px; margin: 0 0 12px; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }
  .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .name { font-weight: 700; font-size: 18px; }
  .item .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .item .tags { font-size: 15px; letter-spacing: 1px; }
  .dish { display: block; width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 8px; }
  .explain { font: inherit; font-size: 15px; line-height: 1; border: 1px solid var(--line);
    background: var(--card); border-radius: 999px; padding: 3px 7px; cursor: pointer; }
  .popover { position: absolute; z-index: 50; max-width: 300px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 15px;
    line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,.16); }
  .popover[hidden] { display: none; }
  .popover .pen { display: block; }
  .popover .pzh { display: block; color: #4a4a4f; margin-top: 6px; }
  body.lang-zh .popover .pen { display: none; }
  body.lang-en .popover .pzh { display: none; }
  .item .name-zh { color: var(--accent); font-weight: 500; font-size: 17px; margin-top: 1px; }
  .item .price { font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item .desc { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .item .desc-zh { color: #4a4a4f; font-size: 15px; margin-top: 3px; }

  .opts { margin-top: 8px; }
  .optg { margin-top: 8px; padding: 8px 10px; background: var(--accent-soft);
    border-left: 3px solid var(--accent); border-radius: 8px; }
  .optg:first-child { margin-top: 0; }
  .optg-label { font-weight: 700; font-size: 15px; }
  .opt-hint { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 6px; }
  .optg-choices { list-style: none; margin: 6px 0 0; padding: 0;
    display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .optg-choices li { font-size: 15px; }
  .opts .ozh { color: var(--accent); }
  .opts .oen, .opts .ozh { margin-right: 3px; }
  .opt-price { color: var(--price); font-variant-numeric: tabular-nums; margin-left: 3px; }
  body.lang-zh .opts .oen { display: none; }
  body.lang-en .opts .ozh { display: none; }

  body.lang-zh .name { display: none; }
  body.lang-zh .desc { display: none; }
  body.lang-zh .name-zh { font-size: 18px; font-weight: 700; color: var(--ink); }
  body.lang-en .name-zh { display: none; }
  body.lang-en .desc-zh { display: none; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);
    color: #fff; font-size: 20px; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  #toTop.show { opacity: .92; pointer-events: auto; }

  footer { text-align: center; color: var(--muted); font-size: 14.5px;
    padding: 28px 16px calc(40px + var(--safe-b)); border-top: 1px solid var(--line); }
</style>

<script>
const MENU = [{"en":"Appetisers","zh":"前菜","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Parmigiana Di Melanzane","zh":"帕爾瑪茄子","p":"61","tags":["vegetarian","notable"],"xterm":"parmigiana-di-melanzane","options":[],"den":"sweet eggplant, tomato, mozzarella, parmesan","dzh":"甜茄子、番茄、莫扎瑞拉芝士、帕爾瑪芝士","explain":{"en":"A classic Southern Italian baked dish made of layered sliced aubergine (eggplant), tomato sauce, mozzarella, and Parmesan cheese. The layers are baked until golden and bubbling. It is served as a starter or a vegetarian main course.","zh":"這是一道經典的南義大利烤焗料理，以切片茄子、番茄醬、莫扎瑞拉芝士和帕爾馬芝士層層疊放，烤至金黃焦香。可作為前菜或素食主菜享用。"}},{"en":"Truffle Bruschetta","zh":"松露布魯斯凱塔","p":"94","tags":["vegetarian","notable"],"xterm":"bruschetta","options":[],"den":"buffalo mozzarella, truffle paste, shaved parmesan","dzh":"水牛莫扎瑞拉芝士、松露醬、刨絲帕爾瑪芝士","explain":{"en":"An Italian appetiser of grilled or toasted bread rubbed with garlic and drizzled with olive oil, then topped with various ingredients. Classic toppings include fresh tomato and basil, though premium versions may feature truffle. The bread's charred, crisp surface is characteristic.","zh":"義大利常見的前菜，以烤脆的麵包片塗抹大蒜、淋上橄欖油，再加上各式配料。經典款以新鮮番茄和羅勒為餡，精緻版本則可能加入松露。其特點是麵包表面烤得香脆略帶焦香。"}},{"en":"Salmon Tartare","zh":"鮭魚他他","p":"90","tags":["signature","gluten-free"],"xterm":"","options":[],"den":"salmon roe, capers, gherkin, shallot, mustard cream","dzh":"鮭魚卵、酸豆、醃黃瓜、紅蔥頭、芥末忌廉"}],"id":"sec-0"},{"en":"Salads","zh":"沙律","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Salade Nicoise","zh":"尼斯沙律","p":"79","tags":["gluten-free","notable"],"xterm":"salade-nicoise","options":[],"den":"pan seared tuna, mixed lettuce, green bean, olive, cherry tomato, hard-boiled egg, capers dressing","dzh":"煎吞拿魚、雜生菜、四季豆、橄欖、車厘茄、水煮蛋、酸豆醬汁","explain":{"en":"A composed salad originating from Nice in southern France. Traditional ingredients include tuna, hard-boiled eggs, green beans, olives, anchovies, and tomatoes dressed with vinaigrette. It is hearty enough to serve as a main course.","zh":"源自法國南部城市尼斯的組合沙律。傳統食材包括吞拿魚、水煮蛋、四季豆、橄欖、鯷魚和番茄，以油醋汁調味。份量豐盛，可作主菜享用。"}},{"en":"The Terrace Caesar Salad","zh":"Terrace 凱撒沙律","p":"79","tags":["vegetarian","gluten-free"],"xterm":"","options":[],"den":"young baby romaine lettuce, grilled chicken, speck crisp, grated parmesan, Caesar dressing","dzh":"嫩蘿蔓生菜、燒雞、煙肉脆片、磨碎帕爾瑪芝士、凱撒醬"},{"en":"Insalata Mista","zh":"意式混合沙律","p":"42","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-mista","options":[],"den":"seasonal green salad, olives, tomato, sundried tomato, artichoke, grilled vegetables","dzh":"時令青菜沙律、橄欖、番茄、日曬番茄、洋薊、燒蔬菜","explain":{"en":"Meaning \"mixed salad\" in Italian, this is a simple side salad of assorted seasonal greens and raw vegetables dressed with olive oil and vinegar. The exact composition varies by restaurant and season. It is a common accompaniment to Italian meals.","zh":"義大利文意為「混合沙律」，是一款以各式時令生菜和蔬菜拌以橄欖油和醋調製的簡單配菜沙律。具體食材因餐廳和季節而異，是義大利餐桌上常見的配菜。"}},{"en":"Grilled Octopus Salad","zh":"燒八爪魚沙律","p":"90","tags":["gluten-free"],"xterm":"","options":[],"den":"octopus, tomato confit, potato, lemon dressing","dzh":"八爪魚、油封番茄、薯仔、檸檬醬汁"},{"en":"Insalata Caprese","zh":"卡布里沙律","p":"108","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-caprese","options":[],"den":"tomato confit & balsamic caramel","dzh":"油封番茄及巴薩米克焦糖","explain":{"en":"A classic Italian salad from the island of Capri, made with alternating slices of fresh mozzarella, ripe tomatoes, and basil leaves. It is dressed simply with olive oil, salt, and sometimes balsamic glaze. The dish is celebrated for the quality of its few ingredients.","zh":"源自義大利卡布里島的經典沙律，以新鮮莫扎瑞拉芝士、熟透的番茄和羅勒葉交替排列而成。以橄欖油和鹽簡單調味，有時加入陳年黑醋汁。此菜的精髓在於食材本身的品質。"}},{"en":"Buffalo Mozzarella","zh":"水牛莫扎瑞拉芝士","p":"108","tags":["gluten-free","signature"],"xterm":"","options":[],"den":"mango and bell pepper, beef speck","dzh":"芒果、燈籠椒、牛肉煙肉"}],"id":"sec-1"},{"en":"Pasta and Risotto","zh":"意大利麵及燴飯","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Spaghetti Bolognese","zh":"肉醬意大利麵","p":"95","tags":[],"xterm":"","options":[],"den":"long pasta in tomato braised beef ragout","dzh":"長麵配番茄燉牛肉醬"},{"en":"Fettuccine Lamb Ragout","zh":"羊肉醬寬麵","p":"86","tags":[],"xterm":"","options":[],"den":"flat long pasta in braised minced lamb, thyme","dzh":"扁長麵配燉羊絞肉、百里香"},{"en":"Linguine Al Pesto","zh":"青醬扁麵","p":"64","tags":["vegetarian","gluten-free","contains-nuts"],"xterm":"","options":[],"den":"long pasta in basil and pine nut sauce","dzh":"長麵配羅勒松子醬"},{"en":"Beetroot Gnocchi","zh":"甜菜根薯疙瘩","p":"78","tags":["vegetarian","notable"],"xterm":"gnocchi","options":[],"den":"pan-seared beetroot and potato dumpling, taleggio cream and walnut","dzh":"煎甜菜根薯疙瘩，配塔雷吉歐忌廉及核桃","explain":{"en":"Italian soft dumplings traditionally made from potato, flour, and egg, shaped into small pillowy rounds or ovals. They are boiled and then served with various sauces such as butter and sage, tomato, or cream. Variations like beetroot gnocchi use vegetable purée for colour and flavour.","zh":"義大利傳統軟糯的小丸子麵食，通常以馬鈴薯、麵粉和雞蛋製成，塑成小圓形或橢圓形。煮熟後搭配各式醬汁，如牛油鼠尾草、番茄或忌廉醬。甜菜根版本則加入蔬菜泥，增添色彩與風味。"}},{"en":"Andaman Prawn Aglio Olio","zh":"安達曼大蝦蒜香橄欖油意麵","p":"90","tags":["gluten-free","notable"],"xterm":"aglio-olio","options":[],"den":"pasta in garlic and olive oil, and Andaman prawn","dzh":"意麵配大蒜橄欖油及安達曼大蝦","explain":{"en":"Aglio e olio is a simple but flavourful Italian pasta dish whose name means \"garlic and oil\" in Italian. It is made by tossing pasta with olive oil, sautéed garlic, chilli flakes, and parsley. The dish relies on high-quality olive oil and proper technique to achieve its characteristic light, aromatic coating.","zh":"蒜香橄欖油意麵名稱在義大利語中意為「蒜與油」，是一道簡單而風味十足的義大利麵食。做法是將意麵拌入橄欖油、炒香蒜片、辣椒碎及香芹。此菜講究橄欖油的品質與烹調技巧，以呈現清爽芳香的醬汁。"}},{"en":"Truffle and Porcini Mushroom Risotto","zh":"松露牛肝菌燴飯","p":"72","tags":["vegetarian","gluten-free","notable"],"xterm":"risotto","options":[],"den":"carnaroli rice, porcini mushroom stock, sautéed forest mushroom, truffle oil","dzh":"卡納羅利米、牛肝菌高湯、炒雜菌、松露油","explain":{"en":"Risotto is a Northern Italian rice dish made by slowly cooking short-grain rice (such as Arborio) in broth while continuously stirring. The starch released from the rice creates a naturally creamy texture without the need for cream. It is typically finished with butter and Parmesan for added richness.","zh":"燉飯是義大利北部的米飯料理，以短粒米（如阿柏里奧米）在高湯中持續攪拌慢煮而成。米粒釋出的澱粉自然形成幼滑如奶油的質感，無需另加鮮忌廉。最後通常拌入牛油和帕馬芝士增添濃郁風味。"}},{"en":"Cheese and Prawn Risotto","zh":"芝士大蝦燴飯","p":"98","tags":["notable"],"xterm":"risotto","options":[],"den":"carnaroli rice in crustacean bisque, Andaman prawn, mozzarella cheese","dzh":"卡納羅利米配甲殼類濃湯、安達曼大蝦、莫扎瑞拉芝士","explain":{"en":"Risotto is a Northern Italian rice dish made by slowly cooking short-grain rice (such as Arborio) in broth while continuously stirring. The starch released from the rice creates a naturally creamy texture without the need for cream. It is typically finished with butter and Parmesan for added richness.","zh":"燉飯是義大利北部的米飯料理，以短粒米（如阿柏里奧米）在高湯中持續攪拌慢煮而成。米粒釋出的澱粉自然形成幼滑如奶油的質感，無需另加鮮忌廉。最後通常拌入牛油和帕馬芝士增添濃郁風味。"}}],"id":"sec-2"},{"en":"Pizza","zh":"薄餅","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Bufalina","zh":"水牛芝士薄餅","p":"70","tags":["vegetarian"],"xterm":"","options":[],"den":"tomato, mozzarella di bufala, basil","dzh":"番茄、水牛莫扎瑞拉芝士、羅勒"},{"en":"Latteria","zh":"六芝士薄餅","p":"98","tags":["vegetarian"],"xterm":"","options":[],"den":"6 cheeses: parmesen, gorgonzola, shredded mozzarella, buffalo mozzarella, smoked provolone, taleggio","dzh":"六款芝士：帕爾瑪、藍紋芝士、絲狀莫扎瑞拉、水牛莫扎瑞拉、煙燻普羅伏隆、塔雷吉歐"},{"en":"Botanica","zh":"蔬菜薄餅","p":"80","tags":["vegetarian"],"xterm":"","options":[],"den":"mozzarella, grilled seasonal vegetables, fresh garden herbs","dzh":"莫扎瑞拉芝士、燒時令蔬菜、新鮮香草"},{"en":"Tartufina","zh":"松露薄餅","p":"110","tags":[],"xterm":"","options":[],"den":"beef speck, shredded mozzarella, buffalo mozzarella, black truffle paste, truffle oil","dzh":"牛肉煙肉、絲狀莫扎瑞拉、水牛莫扎瑞拉、黑松露醬、松露油"},{"en":"Rustica","zh":"田園薄餅","p":"98","tags":[],"xterm":"","options":[],"den":"roasted potato, taleggio cheese, shredded mozzarella, lamb ragout","dzh":"烤薯仔、塔雷吉歐芝士、絲狀莫扎瑞拉、羊肉醬"},{"en":"Frutti Di Mare","zh":"海鮮薄餅","p":"130","tags":["signature","notable"],"xterm":"frutti-di-mare","options":[],"den":"Andaman catch of the sea: prawn, mussel, squid, crabmeat, scallops, clams, seabass, lobster, Mozzarella","dzh":"安達曼海鮮：大蝦、青口、魷魚、蟹肉、帶子、蜆、海鱸魚、龍蝦、莫扎瑞拉芝士","explain":{"en":"Italian for \"fruits of the sea,\" this term refers to a mix of seafood — typically including prawns, mussels, clams, squid, and scallops. It appears on menus as a topping for pizza or pasta, or as a standalone seafood platter. The exact selection varies by catch and season.","zh":"義大利文意為「海之果實」，泛指多種混合海鮮，通常包括明蝦、青口、蜆、魷魚和帶子等。可作為薄餅或意粉的配料，也可以作獨立的海鮮拼盤呈現。具體食材因時令漁獲而異。"}}],"id":"sec-3"},{"en":"Main Course","zh":"主菜","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Cacciucco – Seafood Stew","zh":"卡丘科海鮮燉湯","p":"188","tags":["signature","notable"],"xterm":"cacciucco","options":[],"den":"oven baked seafood soup with lobster, mussels, clams, scallops, squid","dzh":"焗爐海鮮湯，配龍蝦、青口、蜆、帶子、魷魚","explain":{"en":"A rich, thick seafood stew originating from Livorno in Tuscany, Italy. It traditionally contains a wide variety of fish and shellfish cooked in a spiced tomato and red wine broth. It is typically served over slices of toasted garlic bread.","zh":"源自義大利托斯卡納利佛諾市的濃郁海鮮燉湯。傳統做法將多種魚類和貝類以加了香料的番茄紅酒湯底燉煮而成，通常搭配蒜味烤麵包片一同上桌。"}},{"en":"Zuppa di Cozze","zh":"番茄青口湯","p":"79","tags":["notable"],"xterm":"zuppa-di-cozze","options":[],"den":"black mussel in tomato, ciabatta, green oil","dzh":"黑青口配番茄、拖鞋麵包、青醬油","explain":{"en":"An Italian mussel soup in which fresh mussels are steamed open in a broth typically made with tomato, garlic, white wine, and herbs. The flavorful broth is a key feature of the dish. It is commonly served with crusty bread for dipping.","zh":"一道義大利青口湯，以新鮮青口在番茄、大蒜、白葡萄酒和香草熬成的湯底中烹煮至開口。湯底本身鮮美濃郁，是此菜的精髓所在。通常搭配脆皮麵包沾湯享用。"}},{"en":"Filletto di Salmone","zh":"鮭魚柳","p":"132","tags":[],"xterm":"","options":[],"den":"pan seared salmon, broccoli, spring onion, chilli, bell pepper pure","dzh":"煎鮭魚柳，配西蘭花、青蔥、辣椒、燈籠椒蓉"},{"en":"Filletto di Branzino","zh":"海鱸魚柳","p":"102","tags":["gluten-free"],"xterm":"","options":[],"den":"roasted seabass, fresh tomato sauce, capers, kalamata olives, grilled vegetables","dzh":"烤海鱸魚、新鮮番茄醬、酸豆、卡拉馬塔橄欖、燒蔬菜"},{"en":"Galletto al Forno","zh":"烤春雞","p":"97","tags":["gluten-free","notable"],"xterm":"galletto-al-forno","options":[],"den":"spring chicken, seasonal vegetables, potato, chimichurri","dzh":"春雞、時令蔬菜、薯仔、奇米丘利醬","explain":{"en":"An Italian oven-roasted dish featuring galletto, a young small chicken (poussin) typically weighing under 500 g. The bird is seasoned with herbs, garlic, and olive oil before roasting, resulting in tender meat and crispy skin. It is often served whole or halved.","zh":"義大利烤焗料理，主角是「galletto」——一種體重通常不超過500克的幼雞（春雞）。烤前以香草、大蒜和橄欖油醃製，烤出皮脆肉嫩的效果。通常整隻或對半切開上桌。"}},{"en":"Tagliata di Manzo","zh":"切片牛肉","p":"99","tags":["gluten-free","notable"],"xterm":"tagliata-di-manzo","options":[],"den":"pan seared sliced beef flank, rocket salad, cherry tomato, shaved parmesan, balsamic reduction","dzh":"煎牛側腹肉片、火箭菜沙律、車厘茄、刨絲帕爾瑪芝士、巴薩米克醬汁","explain":{"en":"An Italian beef dish in which a steak — typically sirloin or ribeye — is grilled to medium-rare and then sliced against the grain. The slices are arranged over rocket leaves and shaved Parmesan, drizzled with olive oil. The name means \"sliced beef\" in Italian.","zh":"義大利牛肉料理，將西冷或肋眼牛扒烤至五成熟後逆紋切片。肉片鋪放在芝麻菜和帕爾馬芝士薄片上，淋以橄欖油。名稱在義大利文中即為「切片牛肉」之意。"}}],"id":"sec-4"},{"en":"Desserts","zh":"甜品","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Tropical Fruits Platter","zh":"熱帶水果拼盤","p":"44","tags":[],"xterm":"","options":[],"den":"selection of our seasonal fruits, 5 types","dzh":"精選時令水果五款"},{"en":"Tiramisu (glass)","zh":"提拉米蘇（杯裝）","p":"48","tags":["signature","notable"],"xterm":"tiramisu","options":[],"den":"layers of mascarpone cream, coffee-soaked lady fingers and a dusting of cocoa powder","dzh":"馬斯卡彭忌廉、咖啡浸手指餅乾及可可粉層疊而成","explain":{"en":"A beloved Italian dessert made from layers of espresso-soaked savoiardi (ladyfinger biscuits) and a creamy mixture of mascarpone cheese, eggs, and sugar, dusted with cocoa powder. Its name means \"pick me up\" in Italian, a nod to its coffee content. It is often set and served in a glass for individual portions.","zh":"深受喜愛的義大利甜點，由浸泡了濃縮咖啡的手指餅乾與馬斯卡彭芝士、雞蛋和糖製成的忌廉層層疊放，表面撒上可可粉。名稱在義大利文中意為「提振精神」，呼應其咖啡成分。杯裝版本方便個人享用。"}},{"en":"Cannoli","zh":"卡諾里","p":"45","tags":["notable"],"xterm":"cannoli","options":[],"den":"crisp and flaky cannoli shell, lusciously creamy, sweet ricotta cheese and mascarpone with decadent dark chocolate chips","dzh":"酥脆卡諾里殼，配香滑甜瑞可塔芝士、馬斯卡彭及黑朱古力碎","explain":{"en":"A traditional Sicilian pastry consisting of tube-shaped fried pastry shells filled with a sweet, creamy ricotta filling, often mixed with chocolate chips, candied fruit, or pistachios. The shells are crispy while the filling is rich and smooth. The singular form is \"cannolo.\"","zh":"源自西西里島的傳統義式甜點，以炸脆的圓筒形薄酥皮為外殼，內填以瑞可達芝士為基底的甜忌廉，常混入朱古力碎、蜜餞水果或開心果。外皮香脆，餡料濃郁滑順。單數形式為「cannolo」。"}},{"en":"Almond Semifreddo","zh":"杏仁雪糕蛋糕","p":"45","tags":["notable"],"xterm":"semifreddo","options":[],"den":"creamy almond semifreddo, warm apple compote","dzh":"香滑杏仁雪糕蛋糕，配溫熱蘋果醬","explain":{"en":"An Italian semi-frozen dessert with a texture between ice cream and mousse, made from whipped cream, eggs, and sugar with various flavourings such as almond, chocolate, or fruit. It is served sliced and cold but not fully frozen hard. The name means \"half cold\" in Italian.","zh":"義大利半凍甜品，質感介乎雪糕和慕絲之間，以打發忌廉、雞蛋和糖製成，可加入杏仁、朱古力或水果等各式口味。切片冷食，但質地不像雪糕那樣完全凍硬。名稱在義大利文中意為「半冷」。"}},{"en":"Vanilla Panna Cotta","zh":"香草奶凍","p":"48","tags":["notable"],"xterm":"panna-cotta","options":[],"den":"creamy cooked cream, mixed berries compote","dzh":"香滑煮製忌廉，配雜莓醬","explain":{"en":"A classic Italian dessert from the Piedmont region, made by setting sweetened cream with gelatin and chilling it until firm. It has a silky, delicate texture and a mild milky flavour that pairs well with fruit coulis, caramel, or vanilla. The name means \"cooked cream\" in Italian.","zh":"源自義大利皮埃蒙特的經典甜品，以明膠將加糖的忌廉凝固冷卻而成。質感絲滑細嫩，味道清淡，帶奶香，常搭配果醬、焦糖或雲尼拿醬享用。名稱在義大利文中意為「煮熟的忌廉」。"}}],"id":"sec-5"},{"en":"Signature Cocktails","zh":"招牌雞尾酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Dannatini","zh":"丹娜堤尼","p":"50","tags":[],"xterm":"","options":[],"den":"white rum, espresso, cinnamon syrup","dzh":"白蘭姆酒、意式濃縮咖啡、肉桂糖漿"},{"en":"Terrace Spritz","zh":"Terrace 氣泡雞尾酒","p":"50","tags":[],"xterm":"","options":[],"den":"homemade limoncello, prosecco, soda water","dzh":"自製檸檬酒、普羅賽克氣泡酒、梳打水"}],"id":"sec-6"},{"en":"Signature Mocktails","zh":"招牌無酒精雞尾酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Danna Ice Tea","zh":"丹娜冰茶","p":"40","tags":[],"xterm":"","options":[],"den":"coconut syrup, orgeat syrup, passion fruit syrup, black tea","dzh":"椰子糖漿、杏仁糖漿、百香果糖漿、紅茶"},{"en":"Peach Spritz","zh":"蜜桃氣泡飲","p":"40","tags":[],"xterm":"","options":[],"den":"peach puree, grenadine syrup, lime, soda water","dzh":"蜜桃果泥、石榴糖漿、青檸、梳打水"}],"id":"sec-7"},{"en":"Sparkling Wine Cocktail","zh":"氣泡酒雞尾酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"French 75","zh":"法式75","p":"45","tags":[],"xterm":"","options":[],"den":"gin, lemon juice, sparkling wine","dzh":"琴酒、檸檬汁、氣泡酒"},{"en":"Bellini","zh":"貝利尼","p":"45","tags":[],"xterm":"","options":[],"den":"peach purée, prosecco","dzh":"蜜桃果泥、普羅賽克氣泡酒"},{"en":"Mimosa","zh":"含羞草","p":"45","tags":[],"xterm":"","options":[],"den":"fresh orange juice, prosecco","dzh":"新鮮橙汁、普羅賽克氣泡酒"},{"en":"Kir Royal","zh":"皇家基爾","p":"45","tags":["notable"],"xterm":"kir-royal","options":[],"den":"crème de cassis, prosecco","dzh":"黑加侖利口酒、普羅賽克氣泡酒","explain":{"en":"A classic French aperitif made by combining crème de cassis (blackcurrant liqueur) with Champagne. It is a more prestigious variation of the original Kir, which uses still white wine instead. The drink is pale pink to deep red in colour with a fruity, slightly sweet taste.","zh":"經典法式開胃酒，以黑加侖子甜酒（crème de cassis）加入香檳調製而成。此酒是原版Kir（以靜白葡萄酒代替香檳）的升級版。色澤呈淡粉紅至深紅色，口感果香帶微甜。"}}],"id":"sec-8"},{"en":"Martinis","zh":"馬天尼","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Cosmopolitan","zh":"柯夢波丹","p":"45","tags":[],"xterm":"","options":[],"den":"vodka, triple sec, cranberry juice, lime juice","dzh":"伏特加、橙皮甜酒、蔓越莓汁、青檸汁"},{"en":"Manhattan","zh":"曼哈頓","p":"45","tags":[],"xterm":"","options":[],"den":"canadian club, sweet vermouth, angostura bitters","dzh":"加拿大俱樂部威士忌、甜苦艾酒、安哥斯圖拉苦精"},{"en":"Espresso Martini","zh":"濃縮咖啡馬天尼","p":"45","tags":[],"xterm":"","options":[],"den":"vodka, kahlua, espresso, sugar syrup","dzh":"伏特加、卡魯哇咖啡酒、意式濃縮咖啡、糖漿"},{"en":"Dry Martini","zh":"乾馬天尼","p":"45","tags":[],"xterm":"","options":[],"den":"gin, dry vermouth","dzh":"琴酒、乾苦艾酒"}],"id":"sec-9"},{"en":"Classic Cocktail","zh":"經典雞尾酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Orange Spritzz","zh":"橙味氣泡雞尾酒","p":"45","tags":[],"xterm":"","options":[],"den":"le favori, prosecco, soda water","dzh":"Le Favori橙酒、普羅賽克氣泡酒、梳打水"},{"en":"Daiquiri","zh":"代基里","p":"45","tags":[],"xterm":"","options":[],"den":"light rum, triple sec, lime juice, simple syrup","dzh":"淡蘭姆酒、橙皮甜酒、青檸汁、糖漿"},{"en":"Whskey Sour","zh":"威士忌酸酒","p":"45","tags":[],"xterm":"","options":[],"den":"whiskey, lime juice, simple syrup","dzh":"威士忌、青檸汁、糖漿"},{"en":"Old fashion","zh":"古典雞尾酒","p":"45","tags":["notable"],"xterm":"old-fashioned","options":[],"den":"whiskey, brown sugar, angostura bitters","dzh":"威士忌、黃糖、安哥斯圖拉苦精","explain":{"en":"One of the oldest and most iconic cocktails, made by muddling a sugar cube with aromatic bitters, then adding whiskey (typically bourbon or rye) and a large ice cube. It is garnished with an orange peel and sometimes a cherry. It is spirit-forward, strong, and subtly sweet.","zh":"最古老、最具代表性的雞尾酒之一，將方糖與芳香苦精搗勻，加入威士忌（通常為波本或黑麥威士忌）和大冰塊調製而成。以橙皮裝飾，有時加入車厘子。酒味突出，酒體強勁，帶微甜。"}},{"en":"Piña Colada","zh":"椰林飄香","p":"45","tags":[],"xterm":"","options":[],"den":"white rum, malibu, coconut cream, pineapple juice","dzh":"白蘭姆酒、馬利寶椰子酒、椰子忌廉、菠蘿汁"},{"en":"Margarita","zh":"瑪格麗特","p":"45","tags":[],"xterm":"","options":[],"den":"tequila, triple sec, lime juice, simple syrup","dzh":"龍舌蘭酒、橙皮甜酒、青檸汁、糖漿"},{"en":"Negroni","zh":"尼格羅尼","p":"45","tags":["notable"],"xterm":"negroni","options":[],"den":"gin, campari, sweet vermouth","dzh":"琴酒、金巴利、甜苦艾酒","explain":{"en":"A classic Italian cocktail made in equal parts of gin, sweet vermouth, and Campari, stirred over ice and garnished with an orange slice or peel. It is bittersweet, aromatic, and spirit-forward. It was reportedly invented in Florence in 1919.","zh":"經典義大利雞尾酒，以等份琴酒、甜苦艾酒和金巴利攪拌加冰調製，以橙片或橙皮裝飾。口感甘苦交融，香氣馥郁，酒味鮮明。據說源於1919年的佛羅倫斯。"}},{"en":"Mojito","zh":"莫吉托","p":"45","tags":[],"xterm":"","options":[],"den":"light rum, brown sugar, mint leaf, soda water","dzh":"淡蘭姆酒、黃糖、薄荷葉、梳打水"}],"id":"sec-10"},{"en":"Mocktails","zh":"無酒精雞尾酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Mango Lassi","zh":"芒果拉西","p":"35","tags":["notable"],"xterm":"mango-lassi","options":[],"den":"yoghurt, mango purée, mango juice","dzh":"乳酪、芒果果泥、芒果汁","explain":{"en":"A popular South Asian chilled drink blending yogurt with mango pulp, sugar, and sometimes cardamom or rose water. It is thick, creamy, and refreshing, often enjoyed as a cooling counterpart to spicy food. Lassi is the general term for the yogurt-based drink category.","zh":"廣受歡迎的南亞冷飲，以乳酪與芒果果肉、糖調勻而成，有時加入荳蔻或玫瑰水。口感濃稠滑順、清爽怡人，常作為辛辣菜餚的清口飲品。「拉西」泛指此類以乳酪為基底的飲品。"}},{"en":"Fruit Mocktail","zh":"水果無酒精雞尾酒","p":"35","tags":[],"xterm":"","options":[],"den":"orange juice, grapefruit juice, banana purée, pineapple juice, lime juice","dzh":"橙汁、葡萄柚汁、香蕉果泥、菠蘿汁、青檸汁"},{"en":"Virgin Piña Colada","zh":"無酒精椰林飄香","p":"35","tags":[],"xterm":"","options":[],"den":"pine :"利口酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Tia Maria","zh":"提亞瑪麗亞","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Kahlúa","zh":"卡魯哇","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bailey's","zh":"百利甜酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Amaretto","zh":"杏仁利口酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Crème De Banana","zh":"香蕉忌廉利口酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Blue Curacao","zh":"藍橙皮酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cherry Brandy","zh":"櫻桃白蘭地","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sambuca","zh":"薩姆布卡茴香酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"D.O.M Benedictine","zh":"當修道院利口酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cointreau","zh":"君度橙酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-31"},{"en":"Mineral Water","zh":"礦泉水","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Acqua Panna 75cl","zh":"愛克雲天然礦泉水 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Natural","dzh":"天然"},{"en":"San Pellegrino 75cl","zh":"聖沛黎洛氣泡水 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Sparkling","dzh":"氣泡"}],"id":"sec-32"},{"en":"Soda","zh":"汽水","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Coke","zh":"可口可樂","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Coke Zero","zh":"可口可樂零","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sprite","zh":"雪碧","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-33"},{"en":"Freshly Squeezed Juice","zh":"鮮榨果汁","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Orange","zh":"橙汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Pineapple","zh":"菠蘿汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Watermelon","zh":"西瓜汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carrot","zh":"紅蘿蔔汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Apple","zh":"蘋果汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-34"},{"en":"Fresh Coconut","zh":"新鮮椰子","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Pandan Coconut","zh":"班蘭椰子","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-35"},{"en":"Local Tea and Coffee","zh":"本地茶及咖啡","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Teh Tarik","zh":"拉茶","p":"18","tags":["notable"],"xterm":"teh-tarik","options":[],"den":"black tea with condensed milk","dzh":"紅茶加煉奶","explain":{"en":"A popular Malaysian and Singaporean hot milk tea made with strong black tea blended with sweetened condensed milk. Its name means \"pulled tea\" in Malay, referring to the technique of pouring the drink between two vessels from a height to create a frothy top and cool it slightly. It is a staple at kopitiams (traditional coffee shops).","zh":"一種在馬來西亞和新加坡廣受歡迎的熱奶茶，以濃烈紅茶加入甜煉乳調製而成。其名稱在馬來語中意為「拉茶」，源於調製時將茶在兩個容器之間從高處來回傾倒，以製造綿密奶泡並略為降溫的技法。拉茶是傳統咖啡店（Kopitiam）的必備飲品。"}},{"en":"Kopi Kedah","zh":"吉打咖啡","p":"18","tags":["notable"],"xterm":"kopi","options":[],"den":"black local coffee with condensed milk","dzh":"本地黑咖啡加煉奶","explain":{"en":"Traditional Southeast Asian coffee, common in Malaysian and Singaporean kopitiams, brewed from robusta beans that are roasted with sugar and butter or margarine. This roasting method gives it a distinctive caramelised, slightly sweet flavour different from Western-style coffee. It is typically brewed through a cloth sock filter and served with condensed or evaporated milk.","zh":"南洋傳統咖啡，盛行於馬來西亞和新加坡的咖啡店（Kopitiam），以羅布斯塔咖啡豆混合糖和奶油或人造牛油烘焙而成。這種烘焙方式賦予咖啡獨特的焦糖風味，帶有微微甜味，與西式咖啡截然不同。通常以布袋過濾沖泡，搭配煉乳或淡奶飲用。"}}],"id":"sec-36"},{"en":"Freshly Brewed Coffee","zh":"現磨咖啡","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Americano","zh":"美式咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Café Latte","zh":"拿鐵咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cappuccino","zh":"卡布奇諾","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Espresso","zh":"意式濃縮咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Decaffeinated","zh":"無咖啡因咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-37"},{"en":"1837 TWG Tea Selections","zh":"1837 TWG茶品精選","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"English Breakfast Tea","zh":"英式早餐茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"English Earl Grey","zh":"英式伯爵茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Jasmine Queen Tea","zh":"茉莉皇后茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Rose Boudoir Tea","zh":"玫瑰閨房茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Chamomile Tea","zh":"洋甘菊茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Marrakech Tea","zh":"馬拉喀什茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-38"}];
const TAGS = [{"id":"notable","en":"Notable","zh":"特色","icon":"💡","group":"highlight"},{"id":"signature","en":"Highlight","zh":"招牌推薦","icon":"⭐","group":"highlight"},{"id":"gluten-free","en":"Gluten Free","zh":"無麩質","icon":"🌾","group":"diet"},{"id":"contains-nuts","en":"Contains Nuts","zh":"含堅果","icon":"🥜","group":"allergen"},{"id":"vegetarian","en":"Vegetarian","zh":"適合素食","icon":"🌱","group":"diet"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.filter(t => t !== "notable").map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const pic = it.img ? `<img class="dish" src="${esc(it.img)}" loading="lazy" alt="">` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${pic}${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
