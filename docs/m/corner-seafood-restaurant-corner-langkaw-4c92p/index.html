-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E4 / Steam Teochew","zh":"潮州蒸魚","p":"","tags":["market-price"],"xterm":"teochew-steamed-fish","options":[],"den":"","dzh":"","explain":{"en":"A dish from the Teochew (Chaozhou) culinary tradition of southern China, where whole fish is steamed with preserved salted plums, tomatoes, pickled mustard greens, tofu, and ginger. The combination of these ingredients creates a distinctively sour, savoury, and refreshing flavour. It is lighter and more complex in seasoning than plain Cantonese steamed fish.","zh":"源自中國南方潮州菜系的傳統料理，以整條魚配以鹹酸梅、番茄、酸菜、豆腐及薑片蒸製而成。各種配料相互融合，形成獨特的酸鮮鹹香風味，口感比清蒸粵式魚更為清爽層次豐富。"}},{"en":"E5 / Steam Soya Sauce","zh":"清蒸魚","p":"","tags":["signature","market-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E6 / BBQ","zh":"燒烤魚","p":"","tags":["market-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E7 / Mango Salad","zh":"泰式芒果魚","p":"","tags":["spicy","market-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E8 / Fried Cincaluk","zh":"馬來腌蝦魚","p":"","tags":["signature","market-price"],"xterm":"cincaluk","options":[],"den":"","dzh":"","explain":{"en":"A pungent Malay/Peranakan condiment and ingredient made from fermented small shrimp (geragau), salt, and rice. It has a strong, sour, and salty flavour and is used as a seasoning in stir-fries or served as a dipping condiment. It is distinct from shrimp paste (belacan) as it is wet and contains whole tiny shrimp.","zh":"一種濃味的馬來及娘惹食材，以小蝦（銀蝦）、鹽及米飯發酵而成，味道鹹酸且氣味濃烈。可作為炒菜的調味料或佐餐蘸料使用。與峇拉煎（蝦膏）不同，馬來醃蝦質地濕潤且含有完整的小蝦。"}},{"en":"E9 / Fried Three Flavor","zh":"三味魚","p":"","tags":["market-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E10 / Hong Kong Steam","zh":"港式蒸魚","p":"","tags":["market-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E11 / Claypot with Yams","zh":"香芋石鍋魚","p":"","tags":["signature","market-price"],"xterm":"","options":[],"den":"","dzh":""},{"en":"E12 / Sambal","zh":"馬來風味魚","p":"","tags":["market-price"],"xterm" 炒，風味濃香。"}},{"en":"Q9 / Crispy CHEN with Salted Egg","zh":"咸蛋黃炒CHEN","p":"RM28.00","tags":["signature"],"xterm":"","options":[],"den":"Crispy greens stir-fried with salted egg yolk.","dzh":"咸蛋黃炒脆葉蔬菜。"}],"id":"sec-16"},{"en":"Soup","zh":"湯","note":"All prices subject to 10% service charge.","items":[{"en":"R1 / Seafood Tomyum","zh":"海鮮冬陰湯","p":"","tags":["spicy"],"xterm":"tom-yum","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM28.00"},{"en":"Medium","zh":"中份","p":"RM38.00"}]}],"den":"","dzh":"","explain":{"en":"A classic Thai hot and sour soup made with lemongrass, galangal, kaffir lime leaves, chilli, lime juice, and fish sauce. It is most commonly served with prawns (Tom Yum Goong) but can include other proteins. The soup is bold, aromatic, spicy, and tangy all at once.","zh":"泰國經典酸辣湯，以香茅、南薑、泰國青檸葉、辣椒、青檸汁及魚露熬製而成，最常見的版本為加入大蝦（冬陰功蝦）。湯底香氣濃郁，集辛辣、酸鮮於一身，風味層次豐富。"}},{"en":"R2 / Seafood Soup","zh":"海鮮湯","p":"","tags":[],"xterm":"","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM25.00"},{"en":"Medium","zh":"中份","p":"RM35.00"}]}],"den":"","dzh":""},{"en":"R3 / Seaweed","zh":"紫菜湯","p":"","tags":[],"xterm":"","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM18.00"},{"en":"Medium","zh":"中份","p":"RM28.00"}]}],"den":"","dzh":""},{"en":"R4 / Fish Ball","zh":"魚丸湯","p":"","tags":[],"xterm":"","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM18.00"},{"en":"Medium","zh":"中份","p":"RM28.00"}]}],"den":"","dzh":""},{"en":"R5 / Pickle Vegetable","zh":"咸菜湯","p":"","tags":[],"xterm":"","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM18.00"},{"en":"Medium","zh":"中份","p":"RM28.00"}]}],"den":"","dzh":""},{"en":"R6 / Fried Egg","zh":"煎蛋湯","p":"","tags":[],"xterm":"","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM18.00"},{"en":"Medium","zh":"中份","p":"RM28.00"}]}],"den":"","dzh":""},{"en":"R7 / Vegetable with Bean Curd","zh":"青菜豆腐湯","p":"","tags":[],"xterm":"","options":[{"en":"Size","zh":"份量","kind":"one","choices":[{"en":"Small","zh":"小份","p":"RM18.00"},{"en":"Medium","zh":"中份","p":"RM28.00"}]}],"den":"","dzh":""}],"id":"sec-17"},{"en":"Local Cuisine","zh":"主食","note":"All prices subject to 10% service charge.","items":[{"en":"S1 / Seafood Fried Noodle","zh":"海鮮煎生麵","p":"RM15.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"S2 / Chicken Noodle","zh":"雞蓉生麵","p":"RM15.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"S3 / Corner Fried Rice","zh":"遇見招牌炒飯","p":"RM15.00","tags":["signature","popular"],"xterm":"","options":[],"den":"","dzh":""},{"en":"S4 / Thai Spicy Fried Rice","zh":"泰式炒飯","p":"RM15.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"S5 / Fried Vermicelli Noodle (Bihun)","zh":"炒米粉","p":"RM15.00","tags":[],"xterm":"bihun","options":[],"den":"","dzh":"","explain":{"en":"Thin noodles made from rice flour, common throughout Southeast and East Asia. They are very fine, white, and delicate in texture, cooking quickly and absorbing surrounding flavours well. Bihun is the Malay/Indonesian term for rice vermicelli and is used in a wide variety of stir-fried, soupy, and salad-style dishes.","zh":"以米粉製成的幼細麵條，廣泛用於東南亞及東亞各地的料理中。米粉色白纖細，質地輕盈，容易熟透且吸味能力強。Bihun為馬來語及印尼語的米粉名稱，可用於炒、湯或涼拌等多種烹調方式。"}}],"id":"sec-18"},{"en":"Drink — Fresh Juice","zh":"飲料 — 鮮榨果汁","note":"All prices subject to 10% service charge.","items":[{"en":"T1 / Apple","zh":"蘋果汁","p":"RM12.50 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T2 / Orange","zh":"橙汁","p":"RM12.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T3 / Pineapple","zh":"菠蘿汁","p":"RM12.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T4 / Lemon","zh":"檸檬汁","p":"RM12.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T5 / Watermelon","zh":"西瓜汁","p":"RM12.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T6 / Carrot","zh":"紅蘿蔔汁","p":"RM12.50 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T7 / Musk Lime with Salty Plum","zh":"桔子酸梅汁","p":"RM12.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T8 / Honey Lemon","zh":"蜜糖檸檬","p":"RM12.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T9 / Mixed Juice","zh":"混合果汁（三種）","p":"RM15.00 per glass","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T10 / Coconut","zh":"椰子汁","p":"RM15.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"T11 / per Jug","zh":"果汁（一壺）","p":"RM50.00","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-19"},{"en":"Soft Drink","zh":"軟飲","note":"All prices subject to 10% service charge.","items":[{"en":"U1 / Coke","zh":"可樂","p":"RM7.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"U2 / Coke Zero","zh":"無糖可樂","p":"RM7.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"U3 / Sprite","zh":"雪碧","p":"RM7.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"U4 / Ice Lemon Tea","zh":"檸檬茶","p":"RM7.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"U5 / 100 Plus","zh":"100號","p":"RM7.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"U6 / Mineral Water Small","zh":"純淨水（小）","p":"RM4.00","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-20"},{"en":"Hot Drink","zh":"熱飲","note":"All prices subject to 10% service charge.","items":[{"en":"V1 / Black Coffee","zh":"黑咖啡","p":"","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"V2 / White Coffee","zh":"白咖啡","p":"RM8.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"V3 / Green Tea","zh":"綠茶","p":"RM7.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"V4 / Milo","zh":"美祿","p":"RM8.00","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-21"},{"en":"Beer","zh":"啤酒","note":"All prices subject to 10% service charge.","items":[{"en":"W1 / Tigger","zh":"虎牌啤酒","p":"RM9.00 per can","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"W2 / Crystal Beer","zh":"白虎啤酒","p":"RM9.00 per can","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"W3 / Casrberg","zh":"嘉士伯啤酒","p":"RM9.00 per can","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"W4 / Chang","zh":"大象啤酒","p":"RM9.00 per bottle","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"W5 / Heineken","zh":"喜力啤酒","p":"RM12.00 per can","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"W6 / Singha","zh":"勝獅啤酒","p":"RM12.00 per can","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"W7 / Guinness","zh":"黑狗啤酒","p":"RM13.00 per can","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-22"},{"en":"Wine — Red Wine","zh":"酒 — 紅葡萄酒","note":"All prices subject to 10% service charge.","items":[{"en":"X1 / Barton & Guestier Cuvee vin Rouge","zh":"巴頓蓋斯蒂紅葡萄酒","p":"RM15.00 per glass / RM60.00 per bottle","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"X2 / Lindeman's Cabernet Sauvignon","zh":"林德曼紅葡萄酒","p":"RM25.00 per glass / RM90.00 per bottle","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-23"},{"en":"Wine — White Wine","zh":"酒 — 白葡萄酒","note":"All prices subject to 10% service charge.","items":[{"en":"X3 / Barton & Guestier Cuvee vin Blanc","zh":"巴頓蓋斯蒂白葡萄酒","p":"RM15.00 per glass / RM60.00 per bottle","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"X4 / Lindeman's Sauvignon Blanc","zh":"林德曼白葡萄酒","p":"RM25.00 per glass / RM90.00 per bottle","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-24"}];
const TAGS = [{"id":"popular","en":"Popular","zh":"人氣","icon":"🔥","group":"highlight"},{"id":"signature","en":"Signature Dish","zh":"招牌菜","icon":"⭐","group":"highlight"},{"id":"spicy","en":"Spicy","zh":"辣","icon":"🌶️","group":"diet"},{"id":"market-price","en":"Live Seafood / Market Price","zh":"活海鮮／時價","icon":"🦞","group":"other"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
