<style>
  :root {
    --ink: #1c1c1e; --muted: #6f6f74; --line: #e7e3db; --paper: #faf8f4;
    --card: #ffffff; --accent: #8a6d3b; --accent-soft: #f1eae0; --price: #2c2c2e;
    --maxw: 900px; --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang TC", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; overflow-wrap: break-word;
  }
  header.hero {
    text-align: center; padding: calc(40px + env(safe-area-inset-top, 0px)) 20px 26px;
    background: linear-gradient(180deg, #fff 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--line);
  }
  header.hero h1 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(36px, 9vw, 54px); letter-spacing: 1px; font-weight: 700; }
  header.hero .zh-title { color: var(--accent); font-size: clamp(18px, 4.6vw, 24px); margin-top: 6px; letter-spacing: 4px; }
  header.hero .sub { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .controls {
    position: sticky; top: 0; z-index: 30; background: rgba(250,248,244,.92);
    backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line); padding: 8px 0 6px;
  }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; padding: 0 14px; }
  .lang-toggle button {
    flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    padding: 7px 16px; min-height: 38px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -ms-overflow-style: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a { flex: 0 0 auto; text-decoration: none; font-size: 15px; color: var(--accent);
    background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 14px calc(80px + var(--safe-b)); }
  .filterbar { display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px 8px;
    scrollbar-width: none; -ms-overflow-style: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 6px 12px; min-height: 36px; cursor: pointer;
    white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  body.lang-zh .chip .cen { display: none; }
  body.lang-en .chip .czh { display: none; }

  section { margin-top: 38px; scroll-margin-top: 96px; }
  .sec-head { border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .sec-head h2 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px, 6.4vw, 32px); letter-spacing: .5px; }
  .sec-head .zh { color: var(--accent); font-size: clamp(17px, 4.6vw, 21px); letter-spacing: 2px; }
  .sec-note { color: var(--muted); font-size: 15px; margin: 0 0 12px; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }
  .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .name { font-weight: 700; font-size: 18px; }
  .item .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .item .tags { font-size: 15px; letter-spacing: 1px; }
  .dish { display: block; width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 8px; }
  .explain { font: inherit; font-size: 15px; line-height: 1; border: 1px solid var(--line);
    background: var(--card); border-radius: 999px; padding: 3px 7px; cursor: pointer; }
  .popover { position: absolute; z-index: 50; max-width: 300px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 15px;
    line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,.16); }
  .popover[hidden] { display: none; }
  .popover .pen { display: block; }
  .popover .pzh { display: block; color: #4a4a4f; margin-top: 6px; }
  body.lang-zh .popover .pen { display: none; }
  body.lang-en .popover .pzh { display: none; }
  .item .name-zh { color: var(--accent); font-weight: 500; font-size: 17px; margin-top: 1px; }
  .item .price { font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item .desc { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .item .desc-zh { color: #4a4a4f; font-size: 15px; margin-top: 3px; }

  .opts { margin-top: 8px; }
  .optg { margin-top: 8px; padding: 8px 10px; background: var(--accent-soft);
    border-left: 3px solid var(--accent); border-radius: 8px; }
  .optg:first-child { margin-top: 0; }
  .optg-label { font-weight: 700; font-size: 15px; }
  .opt-hint { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 6px; }
  .optg-choices { list-style: none; margin: 6px 0 0; padding: 0;
    display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .optg-choices li { font-size: 15px; }
  .opts .ozh { color: var(--accent); }
  .opts .oen, .opts .ozh { margin-right: 3px; }
  .opt-price { color: var(--price); font-variant-numeric: tabular-nums; margin-left: 3px; }
  body.lang-zh .opts .oen { display: none; }
  body.lang-en .opts .ozh { display: none; }

  body.lang-zh .name { display: none; }
  body.lang-zh .desc { display: none; }
  body.lang-zh .name-zh { font-size: 18px; font-weight: 700; color: var(--ink); }
  body.lang-en .name-zh { display: none; }
  body.lang-en .desc-zh { display: none; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);
    color: #fff; font-size: 20px; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  #toTop.show { opacity: .92; pointer-events: auto; }

  footer { text-align: center; color: var(--muted); font-size: 14.5px;
    padding: 28px 16px calc(40px + var(--safe-b)); border-top: 1px solid var(--line); }
</style>

te":"","items":[{"en":"Teh Tarik","zh":"拉茶","p":"18","tags":[],"xterm":"teh-tarik","options":[],"den":"black tea with condensed milk","dzh":"紅茶配煉奶"},{"en":"Kopi Kedah","zh":"吉打咖啡","p":"18","tags":[],"xterm":"kopi","options":[],"den":"Black local coffee with condensed milk","dzh":"本地黑咖啡配煉奶"}],"id":"sec-36"},{"en":"Freshly Brewed Coffee","zh":"現沖咖啡","note":"","items":[{"en":"Americano","zh":"美式咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Café Latte","zh":"拿鐵","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cappuccino","zh":"卡布奇諾","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Espresso","zh":"濃縮咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Decaffeinated","zh":"低咖啡因咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-37"},{"en":"1837 TWG Tea Selections","zh":"1837 TWG茶系列","note":"","items":[{"en":"English Breakfast Tea","zh":"英式早餐茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"English Earl Grey","zh":"英式伯爵茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Jasmine Queen Tea","zh":"茉莉皇后茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Rose Boudoir Tea","zh":"玫瑰閨房茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Chamomile Tea","zh":"洋甘菊茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Marrakech Tea","zh":"馬拉喀什茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-38"}];
const TAGS = [{"id":"signature","en":"Highlight","zh":"招牌推薦","icon":"⭐","group":"highlight"},{"id":"gluten-free","en":"Gluten Free","zh":"無麩質","icon":"🌾","group":"diet"},{"id":"contains-nuts","en":"Contains Nuts","zh":"含堅果","icon":"🥜","group":"allergen"},{"id":"vegetarian","en":"Vegetarian","zh":"適合素食","icon":"🌱","group":"diet"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.filter(t => t !== "notable").map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const pic = it.img ? `<img class="dish" src="${esc(it.img)}" loading="lazy" alt="">` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${pic}${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
