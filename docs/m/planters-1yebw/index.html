<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Planter's · 菜單 Menu</title>

<meta name="description" content="Planter's 英中對照菜單 — Bilingual (English / 繁體中文) menu, mobile-friendly." />
<meta name="theme-color" content="#8a6d3b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<meta property="og:type" content="website" />
<meta property="og:title" content="Planter's · 英中對照菜單 Bilingual Menu" />
<meta property="og:description" content="英文 + 繁體中文對照，手機閱讀體驗最佳。Tap to browse the full menu." />
<meta name="twitter:card" content="summary" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #1c1c1e; --muted: #6f6f74; --line: #e7e3db; --paper: #faf8f4;
    --card: #ffffff; --accent: #8a6d3b; --accent-soft: #f1eae0; --price: #2c2c2e;
    --maxw: 900px; --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang TC", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; overflow-wrap: break-word;
  }
  header.hero {
    text-align: center; padding: calc(40px + env(safe-area-inset-top, 0px)) 20px 26px;
    background: linear-gradient(180deg, #fff 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--line);
  }
  header.hero h1 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(36px, 9vw, 54px); letter-spacing: 1px; font-weight: 700; }
  header.hero .zh-title { color: var(--accent); font-size: clamp(18px, 4.6vw, 24px); margin-top: 6px; letter-spacing: 4px; }
  header.hero .sub { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .controls {
    position: sticky; top: 0; z-index: 30; background: rgba(250,248,244,.92);
    backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line); padding: 8px 0 6px;
  }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; padding: 0 14px; }
  .lang-toggle button {
    flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    padding: 7px 16px; min-height: 38px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -ms-overflow-style: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a { flex: 0 0 auto; text-decoration: none; font-size: 15px; color: var(--accent);
    background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 14px calc(80px + var(--safe-b)); }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 18px; justify-content: center;
    padding: 16px 14px; margin: 18px auto 4px; max-width: 720px; background: var(--card);
    border: 1px solid var(--line); border-radius: 14px; font-size: 15px; }
  .legend span { white-space: nowrap; }

  section { margin-top: 38px; scroll-margin-top: 96px; }
  .sec-head { border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .sec-head h2 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px, 6.4vw, 32px); letter-spacing: .5px; }
  .sec-head .zh { color: var(--accent); font-size: clamp(17px, 4.6vw, 21px); letter-spacing: 2px; }
  .sec-note { color: var(--muted); font-size: 15px; margin: 0 0 12px; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }
  .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .name { font-weight: 700; font-size: 18px; }
  .item .name .tags { font-size: 15px; margin-left: 5px; letter-spacing: 1px; }
  .item .name-zh { color: var(--accent); font-weight: 500; font-size: 17px; margin-top: 1px; }
  .item .price { font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item .desc { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .item .desc-zh { color: #4a4a4f; font-size: 15px; margin-top: 3px; }

  body.lang-zh .name { display: none; }
  body.lang-zh .desc { display: none; }
  body.lang-zh .name-zh { font-size: 18px; font-weight: 700; color: var(--ink); }
  body.lang-en .name-zh { display: none; }
  body.lang-en .desc-zh { display: none; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);
    color: #fff; font-size: 20px; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  #toTop.show { opacity: .92; pointer-events: auto; }

  footer { text-align: center; color: var(--muted); font-size: 14.5px;
    padding: 28px 16px calc(40px + var(--safe-b)); border-top: 1px solid var(--line); }
</style>
</head>
<body class="lang-both">

<header class="hero">
  <h1>Planter's</h1>
  <div class="zh-title">普蘭特餐廳</div>
  <div class="sub">英中對照 · Bilingual</div>
</header>

<div class="controls">
  <div class="lang-toggle" role="group" aria-label="language">
    <button data-lang="both" class="active">雙語</button>
    <button data-lang="zh">中文</button>
    <button data-lang="en">EN</button>
  </div>
  <nav class="nav" id="nav" aria-label="sections"></nav>
</div>

<div class="wrap">
  <div class="legend">
    <span>🌶️ Spicy 辣</span>
    <span>🌱 Vegetarian 適合素食</span>
    <span>🐷 Pork 豬肉</span>
    <span>🐔 Chicken 雞肉</span>
    <span>🐟 Seafood 海鮮</span>
    <span>🐮 Beef 牛肉</span>
  </div>
  <main id="menu"></main>
</div>

<button id="toTop" aria-label="back to top">↑</button>

<footer>
  英中對照菜單 · Bilingual Menu — 中文翻譯僅供參考，內容以餐廳原文為準。<br />
  Chinese translation for reference only; the restaurant's original wording prevails.
</footer>

<script>
const ICON = { spicy:"🌶️", veg:"🌱", pork:"🐷", chicken:"🐔", seafood:"🐟", beef:"🐮" };
const MENU = [{"en":"From the Griddle","zh":"鐵板料理","note":"","items":[{"en":"Pancakes","zh":"班戟","p":"","t":[],"den":"blueberry, maple syrup, whipped cream","dzh":"藍莓、楓糖漿、鮮忌廉"},{"en":"Waffles","zh":"窩夫","p":"","t":[],"den":"chocolate sauce, fruit compote, whipped cream","dzh":"朱古力醬、燉水果、鮮忌廉"},{"en":"French Toast","zh":"法式吐司","p":"","t":[],"den":"maple syrup, whipped cream, cinnamon","dzh":"楓糖漿、鮮忌廉、肉桂"}],"id":"sec-0"},{"en":"Asian Corner","zh":"亞洲風味角","note":"","items":[{"en":"Roti Canai","zh":"印度煎餅","p":"","t":["chicken"],"den":"choice of egg roti or plain roti. Malaysian flat bread, dhal, sambal and chicken curry. (Malaysia's Roti Canai is rated as 'The Best Bread In The World' by TasteAtlas)","dzh":"可選雞蛋印度煎餅或原味印度煎餅，配豆泥、參巴醬及雞肉咖喱。（馬來西亞印度煎餅被TasteAtlas評選為「世界最佳麵包」）"},{"en":"Dosa","zh":"印度薄餅","p":"","t":["veg"],"den":"choice of plain dosa or masala dosa. Savoury rice crepe, coconut, chili chutney","dzh":"可選原味或馬薩拉印度薄餅，鹹味米餅配椰子及辣椒酸辣醬"}],"id":"sec-1"},{"en":"Hot Kitchen","zh":"熱廚料理","note":"","items":[{"en":"Eggs Scrambled, Sunny Side Up, Over-Easy, Boiled or Poached","zh":"炒蛋、太陽蛋、半熟煎蛋、水煮蛋或水波蛋","p":"","t":["beef","chicken"],"den":"served with (upon request) baked beans, mushrooms, grilled tomato, hashbrown. Your choice of beef, chicken sausage & beef or chicken slice","dzh":"可選搭配（按需求）烤豆、蘑菇、烤番茄、薯餅，並可選牛肉、雞肉香腸及牛肉或雞肉片"},{"en":"Eggs Benedict","zh":"班尼迪克蛋","p":"","t":["beef"],"den":"toasted English muffins, grilled beef bacon, poached eggs, Hollandaise sauce, fresh herbs","dzh":"烤英式鬆餅、烤牛肉培根、水波蛋、荷蘭醬、新鮮香草"},{"en":"Eggs Royale","zh":"皇家蛋","p":"","t":["seafood"],"den":"toasted English muffins, smoked salmon, poached eggs, Hollandaise sauce, fresh herbs","dzh":"烤英式鬆餅、煙燻三文魚、水波蛋、荷蘭醬、新鮮香草"},{"en":"Oatmeal Porridge","zh":"燕麥粥","p":"","t":["veg"],"den":"served with cinnamon, honey, raisin. Choice of sweet or savory, with full cream, almond milk or water","dzh":"配肉桂、蜂蜜、葡萄乾，可選甜味或鹹味，以全脂鮮奶、杏仁奶或清水烹製"},{"en":"Noodle Soup","zh":"湯麵","p":"","t":["chicken"],"den":"choice of clear broth or Nyonya curry broth with tender chicken and fresh vegetables, accompanied by vermicelli, flat rice noodles, or egg noodles","dzh":"可選清湯或娘惹咖喱湯底，配嫩雞肉及新鮮蔬菜，搭配粉絲、河粉或蛋麵"}],"id":"sec-2"},{"en":"Awaken Your Sense","zh":"喚醒感官","note":"Your drinks, your way","items":[{"en":"Latte","zh":"拿鐵","p":"","t":[],"den":"","dzh":""},{"en":"Cappuccino","zh":"卡布奇諾","p":"","t":[],"den":"","dzh":""},{"en":"Americano","zh":"美式咖啡","p":"","t":[],"den":"","dzh":""},{"en":"Espresso","zh":"濃縮咖啡","p":"","t":[],"den":"","dzh":""},{"en":"Flat White","zh":"馥芮白","p":"","t":[],"den":"","dzh":""},{"en":"Milo","zh":"美祿","p":"","t":[],"den":"","dzh":""},{"en":"Hot Chocolate","zh":"熱朱古力","p":"","t":[],"den":"","dzh":""},{"en":"Selection of Teas","zh":"精選茶品","p":"","t":[],"den":"","dzh":""},{"en":"Teh Tarik","zh":"拉茶","p":"","t":[],"den":"Malaysian black tea mixed with condensed milk","dzh":"馬來西亞紅茶混合煉乳"},{"en":"Kopi Kedah","zh":"吉打咖啡","p":"","t":[],"den":"Locally-grown coffee with earthy notes and a smooth finish, highlighting the flavours of Kedah's fertile lands","dzh":"本地種植咖啡，帶有泥土氣息及順滑尾韻，展現吉打肥沃土地的風味"}],"id":"sec-3"}];

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");

MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${id}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const tags = (it.t && it.t.length) ? `<span class="tags">${it.t.map(k=>ICON[k]||"").join(" ")}</span>` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    return `<div class="item">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)} ${tags}</div>
          <div class="name-zh">${esc(it.zh)}</div>
        </div>${price}
      </div>${den}${dzh}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${id}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive:true });
toTop.addEventListener("click", () => scrollTo({ top:0, behavior:"smooth" }));
</script>
</body>
</html>
