<style>
  :root {
    --ink: #1c1c1e; --muted: #6f6f74; --line: #e7e3db; --paper: #faf8f4;
    --card: #ffffff; --accent: #8a6d3b; --accent-soft: #f1eae0; --price: #2c2c2e;
    --maxw: 900px; --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang TC", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; overflow-wrap: break-word;
  }
  header.hero {
    text-align: center; padding: calc(40px + env(safe-area-inset-top, 0px)) 20px 26px;
    background: linear-gradient(180deg, #fff 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--line);
  }
  header.hero h1 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(36px, 9vw, 54px); letter-spacing: 1px; font-weight: 700; }
  header.hero .zh-title { color: var(--accent); font-size: clamp(18px, 4.6vw, 24px); margin-top: 6px; letter-spacing: 4px; }
  header.hero .sub { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .controls {
    position: sticky; top: 0; z-index: 30; background: rgba(250,248,244,.92);
    backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line); padding: 8px 0 6px;
  }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; padding: 0 14px; }
  .lang-toggle button {
    flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    padding: 7px 16px; min-height: 38px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -ms-overflow-style: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a { flex: 0 0 auto; text-decoration: none; font-size: 15px; color: var(--accent);
    background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 14px calc(80px + var(--safe-b)); }
  .filterbar { display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px 8px;
    scrollbar-width: none; -ms-overflow-style: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 6px 12px; min-height: 36px; cursor: pointer;
    white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  body.lang-zh .chip .cen { display: none; }
  body.lang-en .chip .czh { display: none; }

  section { margin-top: 38px; scroll-margin-top: 96px; }
  .sec-head { border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .sec-head h2 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px, 6.4vw, 32px); letter-spacing: .5px; }
  .sec-head .zh { color: var(--accent); font-size: clamp(17px, 4.6vw, 21px); letter-spacing: 2px; }
  .sec-note { color: var(--muted); font-size: 15px; margin: 0 0 12px; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }
  .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .name { font-weight: 700; font-size: 18px; }
  .item .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .item .tags { font-size: 15px; letter-spacing: 1px; }
  .dish { display: block; width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 8px; }
  .explain { font: inherit; font-size: 15px; line-height: 1; border: 1px solid var(--line);
    background: var(--card); border-radius: 999px; padding: 3px 7px; cursor: pointer; }
  .popover { position: absolute; z-index: 50; max-width: 300px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 15px;
    line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,.16); }
  .popover[hidden] { display: none; }
  .popover .pen { display: block; }
  .popover .pzh { display: block; color: #4a4a4f; margin-top: 6px; }
  body.lang-zh .popover .pen { display: none; }
  body.lang-en .popover .pzh { display: none; }
  .item .name-zh { color: var(--accent); font-weight: 500; font-size: 17px; margin-top: 1px; }
  .item .price { font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item .desc { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .item .desc-zh { color: #4a4a4f; font-size: 15px; margin-top: 3px; }

  .opts { margin-top: 8px; }
  .optg { margin-top: 8px; padding: 8px 10px; background: var(--accent-soft);
    border-left: 3px solid var(--accent); border-radius: 8px; }
  .optg:first-child { margin-top: 0; }
  .optg-label { font-weight: 700; font-size: 15px; }
  .opt-hint { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 6px; }
  .optg-choices { list-style: none; margin: 6px 0 0; padding: 0;
    display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .optg-choices li { font-size: 15px; }
  .opts .ozh { color: var(--accent); }
  .opts .oen, .opts .ozh { margin-right: 3px; }
  .opt-price { color: var(--price); font-variant-numeric: tabular-nums; margin-left: 3px; }
  body.lang-zh .opts .oen { display: none; }
  body.lang-en .opts .ozh { display: none; }

  body.lang-zh .name { display: none; }
  body.lang-zh .desc { display: none; }
  body.lang-zh .name-zh { font-size: 18px; font-weight: 700; color: var(--ink); }
  body.lang-en .name-zh { display: none; }
  body.lang-en .desc-zh { display: none; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);
    color: #fff; font-size: 20px; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  #toTop.show { opacity: .92; pointer-events: auto; }

  footer { text-align: center; color: var(--muted); font-size: 14.5px;
    padding: 28px 16px calc(40px + var(--safe-b)); border-top: 1px solid var(--line); }
</style>

<script>
const MENU = [{"en":"Appetizers","zh":"開胃菜","note":"","items":[{"en":"Topee Mushroom Soup","zh":"Topee 蘑菇湯","p":"RM 16.90","tags":["notable"],"xterm":"focaccia","options":[],"den":"Mixed Mushroom, Cream, Truffle oil, Focaccia","dzh":"綜合蘑菇、鮮奶油、松露油、佛卡夏麵包","explain":{"en":"Puttanesca (poo-tah-NES-kah) is a bold, punchy Italian sauce from Naples made with tomatoes, olives, capers, anchovies, and garlic. The name derives from the Italian word for 'prostitute' — the dish's origin story, likely apocryphal, claims it was thrown together quickly from pantry staples. Here it tops a pizza with tuna instead of the classic pasta base.","zh":"普塔內斯卡（poo-tah-NES-kah）是義大利拿坡里的經典醬汁，由番茄、橄欖、酸豆、鯷魚和大蒜製成，風味濃烈鮮明。其名稱源自義大利文中「妓女」一詞，相傳是用廚房現有食材快速烹成的料理，起源故事真偽難考。此處以鮪魚搭配這款醬汁做成披薩。"}},{"en":"French Onion Soup","zh":"法式洋蔥湯","p":"RM 24.90","tags":["notable"],"xterm":"french-onion-soup","options":[],"den":"Chicken Broth, Caramelised Onion, Focaccia, Parmesan, Mozzarelle, Cheddar","dzh":"雞高湯、焦糖洋蔥、佛卡夏麵包、帕馬森起司、莫札瑞拉起司、切達起司","explain":{"en":"Stracciatella (strah-chah-TEL-lah) means 'little shreds' in Italian — it is the creamy, pulled-curd interior of burrata cheese, sold on its own as a soft, milky spread. Originating in Puglia, southern Italy, it is prized for its rich, fresh-dairy flavour and silky texture, melting beautifully over a hot pizza.","zh":"斯特拉恰泰拉（strah-chah-TEL-lah）在義大利文中意為「小碎片」，是布拉塔起司內部那層奶香濃郁的細絲狀軟凝乳，單獨販售時質地如滑順的鮮奶油醬。源自義大利南部普利亞大區，鋪在熱披薩上會輕柔融化，奶香十足。"}},{"en":"Cola Beef Stew","zh":"可樂燉牛肉","p":"RM 24.90","tags":[],"xterm":"","options":[],"den":"Beef, Potato, Celery, Onion, Garlic, Cherry Tomato, Focaccia","dzh":"牛肉、馬鈴薯、西芹、洋蔥、大蒜、小番茄、佛卡夏麵包"},{"en":"Caesar with Chicken Breast","zh":"凱薩沙拉佐雞胸肉","p":"RM 27.90","tags":["notable"],"xterm":"caesar-salad","options":[],"den":"Baby Romaine, Seared Chicken Breast, Parmesan Crisps, Boiled Egg, Walnut, Cherry Tomato","dzh":"小蘿蔓生菜、煎雞胸肉、帕馬森脆片、水煮蛋、核桃、小番茄","explain":{"en":"Margherita (mar-geh-REE-tah) is the classic Neapolitan pizza of tomato, mozzarella, and fresh basil — the three colours intentionally mirror the Italian flag. It is named after Queen Margherita of Savoy, who reportedly favoured this combination during a visit to Naples in 1889.","zh":"瑪格麗特（mar-geh-REE-tah）是拿坡里經典披薩，以番茄、莫扎瑞拉起司和新鮮羅勒三色呼應義大利國旗。相傳1889年薩伏依王朝的瑪格麗特皇后造訪拿坡里時對此口味情有獨鍾，披薩因此以她命名。"}},{"en":"Caesar with Anchovies","zh":"凱薩沙拉佐鯷魚","p":"RM 19.90","tags":["notable"],"xterm":"caesar-salad","options":[],"den":"Baby Romaine, Crispy Anchovies, Parmesan Crisps, Boiled Egg, Walnut, Cherry Tomato","dzh":"小蘿蔓生菜、酥炸鯷魚、帕馬森脆片、水煮蛋、核桃、小番茄","explain":{"en":"Margherita (mar-geh-REE-tah) is the classic Neapolitan pizza of tomato, mozzarella, and fresh basil — the three colours intentionally mirror the Italian flag. It is named after Queen Margherita of Savoy, who reportedly favoured this combination during a visit to Naples in 1889.","zh":"瑪格麗特（mar-geh-REE-tah）是拿坡里經典披薩，以番茄、莫扎瑞拉起司和新鮮羅勒三色呼應義大利國旗。相傳1889年薩伏依王朝的瑪格麗特皇后造訪拿坡里時對此口味情有獨鍾，披薩因此以她命名。"}},{"en":"Roasted Pumpkin Salad","zh":"烤南瓜沙拉","p":"RM 23.90","tags":[],"xterm":"","options":[],"den":"Roasted Pumpkin, Baby Spinach, Poached Egg, Walnuts, Sliced Red Onion, Arugula Pesto, Parmesan Crisps","dzh":"烤南瓜、嫩菠菜、水波蛋、核桃、紅洋蔥片、芝麻葉青醬、帕馬森脆片"},{"en":"Farm's Fruit Salad","zh":"農場水果沙拉","p":"RM 25.90","tags":[],"xterm":"","options":[],"den":"Shoyu Mushrooms, Strawberry, Cherry Tomato, Arugula, Walnuts","dzh":"醬油蘑菇、草莓、小番茄、芝麻葉、核桃"}],"id":"sec-0"},{"en":"Main","zh":"主菜","note":"","items":[{"en":"Harbour Crunch","zh":"酥脆港灣鱸魚","p":"RM 33.90","tags":[],"xterm":"","options":[],"den":"Battered Seabass Fillet, Fries, House Tartare","dzh":"炸麵衣鱸魚柳、薯條、自製塔塔醬"},{"en":"Dancing Bass","zh":"舞動鱸魚","p":"RM 39.90","tags":[],"xterm":"","options":[],"den":"Pan-Seared Seabass, Wasabi Mash, Baby Kailan, Garlic Soy Reduction","dzh":"煎鱸魚、山葵馬鈴薯泥、嫩芥藍、蒜味醬油濃縮醬"},{"en":"Nesting Bass","zh":"鳥巢鱸魚","p":"RM 39.90","tags":[],"xterm":"","options":[],"den":"Pan-Seared Seabass, Vermicelli Nest, Cherry Tomato, Bell Pepper Coulis","dzh":"煎鱸魚、米粉巢、小番茄、彩椒庫利醬"},{"en":"Bass in Lemak","zh":"叻沙椰汁鱸魚","p":"RM 39.90","tags":["notable"],"xterm":"lemak","options":[],"den":"Seared Seabass, Brown Butter Carrot, Seared Potato, Red Onion, Cherry Tomato, Masak Lemak Sauce","dzh":"煎鱸魚、焦香奶油胡蘿蔔、煎馬鈴薯、紅洋蔥、小番茄、椰汁黃咖哩醬","explain":{"en":"Truffles are rare, prized fungi that grow underground near tree roots in parts of Europe, hunted by trained dogs or pigs. Their intensely earthy, musky aroma makes them one of the world's most expensive ingredients. On menus, 'truffle' often refers to black truffle (Périgord, France) or white truffle (Alba, Italy), though truffle oil — a more affordable flavouring — is also common.","zh":"松露是一種稀有的地下真菌，生長於歐洲部分地區的樹根旁，需訓練有素的狗或豬來尋找。其濃烈的土壤氣息與麝香芳香使它成為全球最昂貴的食材之一。菜單上的「松露」通常指法國黑松露或義大利白松露，但平價的松露油也相當普遍。"}},{"en":"Lemony Bass","zh":"檸香鱸魚","p":"RM 39.90","tags":[],"xterm":"","options":[],"den":"Lemongrass Baked Seabass, Lemon Butter Sauce, Seared Snake Bean, Potato with button Mushroom","dzh":"香茅烤鱸魚、檸檬奶油醬、煎四季豆、馬鈴薯佐洋菇"},{"en":"Fiesty Aqua Flower","zh":"辣味海洋花","p":"RM 39.90","tags":[],"xterm":"","options":[],"den":"Cheesy Cauliflower Steak, Octopus, Prawn, Clams, Cherry Tomato, Spicy Tangy Sauce","dzh":"起司白花椰菜排、章魚、蝦、蛤蜊、小番茄、辛辣酸醬"},{"en":"Shrimp Cauli Toss","zh":"奶油蝦仁花椰菜","p":"RM 37.90","tags":[],"xterm":"","options":[],"den":"Fried Caulirice, Butter Garlic Prawn, Fried Egg, Cabbage Slaw","dzh":"炒花椰米飯、蒜香奶油蝦、煎蛋、高麗菜絲沙拉"}],"id":"sec-1"},{"en":"Burger","zh":"漢堡","note":"","items":[{"en":"Dirty Burger","zh":"髒漢堡","p":"RM 34.90","tags":[],"xterm":"","options":[],"den":"Fried Chicken Thigh, Cheese Slice, Tomato, Fried Onion Rings, Fried Egg, Cabbage Slaw, Brioche Bun, Fries, Pickles","dzh":"炸雞腿肉、起司片、番茄、炸洋蔥圈、煎蛋、高麗菜絲、布里歐麵包、薯條、醃黃瓜"},{"en":"Wagyu Burger","zh":"和牛漢堡","p":"RM 47.90","tags":["notable"],"xterm":"wagyu","options":[],"den":"Wagyu Beef Patty, Sliced Cheese, Arugula, Tomato, Fried Portobello, Caramelised Onion, Brioche Bun, Fries, Pickles","dzh":"和牛牛肉排、起司片、芝麻葉、番茄、炸波特貝勒菇、焦糖洋蔥、布里歐麵包、薯條、醃黃瓜","explain":{"en":"Burrata (boo-RAH-tah) is a fresh Italian cheese with a solid mozzarella shell and a creamy stracciatella centre — its name means 'buttered' in Italian. Caprese (kah-PREH-zeh) refers to the classic salad from the island of Capri, pairing fresh cheese with tomatoes, basil, and olive oil. Together they make a richer, creamier take on the beloved Italian classic.","zh":"布拉塔（boo-RAH-tah）是義大利鮮起司，外層是莫扎瑞拉，內部包覆著濃郁的斯特拉恰泰拉奶餡，名稱意為「加了奶油的」。卡布里（kah-PREH-zeh）源自義大利卡布里島，指以鮮起司、番茄、羅勒和橄欖油組合而成的經典沙拉。兩者結合，造就更濃郁滑潤的義式風味。"}},{"en":"Marine Burger","zh":"海洋漢堡","p":"RM 38.90","tags":["notable"],"xterm":"wasabi-tartare","options":[],"den":"Fried Seabass Fillet, Wassabi Tartare, Onion Ring, Kyuri, Cabbage Slaw, Brioche Bun, Fries, Pickles","dzh":"炸鱸魚柳、山葵塔塔醬、洋蔥圈、小黃瓜、高麗菜絲、布里歐麵包、薯條、醃黃瓜","explain":{"en":"Cajun (KAY-jun) refers to the cooking style of Louisiana's Cajun people — descendants of French-Acadian settlers who were expelled from Canada in the 18th century. The cuisine is known for bold seasoning blends of paprika, cayenne, garlic, onion, and herbs, delivering a smoky, spicy kick. It is commonly applied to grilled or fried meats, seafood, and vegetables.","zh":"卡疆（KAY-jun）指美國路易斯安那州卡疆人的烹飪風格，他們是18世紀被驅逐出加拿大的法裔阿卡迪亞移民後裔。其料理以紅椒粉、卡宴辣椒、大蒜、洋蔥和香草等組成的香料混合為特色，帶有煙燻辛辣的風味，常用於烤肉、海鮮和蔬菜。"}}],"id":"sec-2"},{"en":"For Kiddo","zh":"兒童餐","note":"","items":[{"en":"Signature Chicken Bolognese","zh":"招牌雞肉波隆那義大利麵","p":"RM 17.90","tags":["signature","notable"],"xterm":"bolognese","options":[],"den":"Spaghetti, Chicken Bolognese, Poached Egg","dzh":"義大利直麵、雞肉波隆那肉醬、水波蛋","explain":{"en":"Portobello (por-toh-BEL-oh) is simply a fully matured cremini mushroom — the same species as the common button mushroom, just allowed to grow large and flat. The name is a modern American marketing invention from the 1980s to make the oversized mushroom sound appealing. Its dense, meaty texture makes it a popular vegetarian substitute for meat, and it holds up well when battered and fried into 'fingers'.","zh":"波特貝勒菇（por-toh-BEL-oh）其實就是完全成熟的褐色蘑菇，與常見的白鈕扣菇是同一品種，只是任其生長至大而扁平的狀態。這個名稱是1980年代美國商人為了讓這款大型蘑菇更吸引人而創造的行銷詞彙。其厚實、有嚼勁的肉質使它成為極佳的素食替代食材，裹粉炸成「條狀」尤其美味。"}},{"en":"Topee's Mac & Cheese","zh":"Topee 通心粉起司","p":"RM 17.90","tags":["notable"],"xterm":"mac-and-cheese","options":[{"en":"Add-ons","zh":"加料選項","kind":"one","choices":[{"en":"Chicken Toast Slice","zh":"雞肉吐司片","p":""},{"en":"Streaky Beef","zh":"五花牛肉片","p":""},{"en":"Vegetarian","zh":"素食","p":""}]}],"den":"Macaroni, 3-Cheese Sauce","dzh":"通心粉、三種起司醬","explain":{"en":"Buffalo wings have nothing to do with buffalo — they are named after Buffalo, New York, where they were invented at the Anchor Bar in 1964. The wings are deep-fried and tossed in a tangy, buttery hot sauce (typically Frank's RedHot and butter). Ranch dressing, a cool herb-and-buttermilk dip, is the classic American accompaniment to balance the heat.","zh":"水牛城辣翅與水牛毫無關係，名稱來自美國紐約州的水牛城（Buffalo），1964年發源於當地的Anchor Bar。雞翅經油炸後裹上以辣椒醬和奶油調製的酸辣醬汁。田園醬是一種以白脫牛奶和香草調製的清爽蘸醬，是美國搭配辣翅的經典組合，用來平衡辣味。"}},{"en":"Fish and Potato Goujons","zh":"炸魚條薯條","p":"RM 17.90","tags":["notable"],"xterm":"goujons","options":[],"den":"Fried Fish Fingers, Fries, House Tartare Sauce","dzh":"炸魚條、薯條、自製塔塔醬","explain":{"en":"Chicken Diane is a pan-sauce dish modelled on the classic Steak Diane, a mid-20th-century American restaurant staple of sautéed meat finished tableside in a sauce of butter, Worcestershire, mustard, cream, and cognac. 'Diane' refers to Diana, the Roman goddess of the hunt, lending the dish its regal name. The chicken version swaps steak for breast fillet while keeping the rich, flame-kissed sauce.","zh":"黛安娜雞胸肉源自經典的「黛安娜牛排」，這是20世紀中期美國餐廳的人氣料理，以奶油、伍斯特醬、芥末、鮮奶油和干邑白蘭地在桌邊現做醬汁收尾。「黛安娜」指羅馬神話中的狩獵女神Diana，賦予這道菜高雅的名稱。雞肉版本以雞胸肉取代牛排，保留了濃郁的奶香火焰醬汁風味。"}}],"id":"sec-3"},{"en":"Pasta","zh":"義大利麵","note":"","items":[{"en":"Pulled Ribs Tagliatelle","zh":"手撕牛肋寬扁麵","p":"RM 38.90","tags":["notable"],"xterm":"tagliatelle","options":[],"den":"Tagliatelle, Pulled Beef Ribs, Cherry Tomato, Braised Beef Sauce, Parmesan","dzh":"義大利寬扁麵、手撕燉牛肋、小番茄、燉牛肉醬、帕馬森起司","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian rice dish — typically made with short-grain Arborio or Carnaroli rice — cooked slowly with stock added ladle by ladle until creamy and al dente. The technique relies on the rice releasing starch gradually to create its signature velvety texture, finished with butter and Parmesan. It is a cornerstone of Lombardy and Piedmont cuisine.","zh":"燉飯（ree-ZOT-toh）是義大利北部的經典米飯料理，通常使用阿博里歐或卡納羅利等短粒米，以高湯一勺勺慢慢加入拌炒，直至米飯呈現奶滑且帶嚼勁的質地。這種製作技法讓米粒緩緩釋出澱粉，最後以奶油和帕瑪森起司增添濃郁風味，是倫巴底和皮埃蒙特料理的代表作。"}},{"en":"Rosso Clam","zh":"紅醬蛤蜊義大利麵","p":"RM 38.90","tags":["notable"],"xterm":"pomodoro","options":[],"den":"Tagliatelle, Pomodoro Sauce, Clams, Cherry Tomato, Parmesan","dzh":"義大利寬扁麵、番茄醬、蛤蜊、小番茄、帕馬森起司","explain":{"en":"Mojito (moh-HEE-toh) is a Cuban cocktail of white rum, lime juice, sugar, mint, and soda water — Havana's most iconic drink. A 'Nojito' (or 'Virgin Mojito') keeps all the bright, refreshing flavours but omits the rum, making it alcohol-free. The name 'mojito' likely derives from the African word 'mojo', meaning a small charm or magic spell.","zh":"莫希托（moh-HEE-toh）是古巴雞尾酒，以白蘭姆酒、萊姆汁、糖、薄荷和蘇打水調製，是哈瓦那最具代表性的飲品。「無酒精莫希托」（Nojito）保留所有清新爽口的風味，僅去除蘭姆酒，適合不飲酒者享用。「mojito」這個名稱可能源自非洲詞語「mojo」，意指小護身符或魔法。"}},{"en":"Seafood Lemak","zh":"椰汁海鮮義大利麵","p":"RM 42.90","tags":["spicy","notable"],"xterm":"lemak","options":[],"den":"Prawn, Clams, Octopus, Spaghetti with Lemak Sauce","dzh":"蝦、蛤蜊、章魚、椰汁咖哩義大利直麵","explain":{"en":"Truffles are rare, prized fungi that grow underground near tree roots in parts of Europe, hunted by trained dogs or pigs. Their intensely earthy, musky aroma makes them one of the world's most expensive ingredients. On menus, 'truffle' often refers to black truffle (Périgord, France) or white truffle (Alba, Italy), though truffle oil — a more affordable flavouring — is also common.","zh":"松露是一種稀有的地下真菌，生長於歐洲部分地區的樹根旁，需訓練有素的狗或豬來尋找。其濃烈的土壤氣息與麝香芳香使它成為全球最昂貴的食材之一。菜單上的「松露」通常指法國黑松露或義大利白松露，但平價的松露油也相當普遍。"}},{"en":"Spicy Bass","zh":"辣味鱸魚義大利麵","p":"RM 42.90","tags":["spicy"],"xterm":"","options":[],"den":"Spaghetti, Seared Seabass, Spinach, Mushroom, Cherry Tomato, Spicy Tangy Sauce, Parmesan","dzh":"義大利直麵、煎鱸魚、菠菜、蘑菇、小番茄、辛辣酸醬、帕馬森起司"},{"en":"Poultry Ragout","zh":"家禽肉醬義大利麵","p":"RM 30.90","tags":["notable"],"xterm":"ragout","options":[],"den":"Fusilli, Tomato Chicken Ragout, Cherry Tomato, Spinach, Mushroom, Poached Egg","dzh":"螺旋麵、番茄雞肉燉肉醬、小番茄、菠菜、蘑菇、水波蛋","explain":{"en":"Pale ale is a style of beer brewed with predominantly pale malt, giving it a lighter colour and cleaner malt flavour than darker ales. 'Ale' means the beer is fermented with top-fermenting yeast at warmer temperatures, producing fruitier, more aromatic notes compared to lagers. Coopers, from Adelaide, Australia, is one of the country's oldest family-owned breweries and is known for its naturally conditioned, slightly hazy pale ale.","zh":"淡色艾爾是以淺色麥芽為主釀造的啤酒風格，顏色比深色艾爾淺，麥芽風味也較為清爽。「艾爾」（Ale）指以上層發酵酵母在較高溫下釀造，賦予啤酒比拉格更多果香與芳香氣息。庫珀斯（Coopers）來自澳洲阿德萊德，是當地歷史最悠久的家族釀酒廠之一，以天然瓶內二次發酵、略帶混濁的淡色艾爾聞名。"}},{"en":"Carbonara","zh":"卡波納拉義大利麵","p":"RM 33.90","tags":[],"xterm":"carbonara","options":[{"en":"Protein choice","zh":"蛋白質選項","kind":"one","choices":[{"en":"Smoked Duck","zh":"煙燻鴨肉","p":""},{"en":"Chicken Toast","zh":"雞肉吐司","p":""},{"en":"Streaky Beef","zh":"五花牛肉","p":""}]}],"den":"Spaghetti, Parmesan, Black Pepper, Carbonara Sauce","dzh":"義大利直麵、帕馬森起司、黑胡椒、卡波納拉醬"},{"en":"Chicken Olio","zh":"蒜香雞肉義大利麵","p":"RM 29.90","tags":[],"xterm":"aglio-olio","options":[],"den":"Spaghetti, Grilled Chicken, Oil, Garlic Chips, Chilli, Basil, Cherry Tomato, Parmesan","dzh":"義大利直麵、烤雞肉、橄欖油、蒜片、辣椒、羅勒、小番茄、帕馬森起司"},{"en":"Creamy Spinach Mushroom","zh":"奶油菠菜蘑菇義大利麵","p":"RM 29.90","tags":["vegetarian"],"xterm":"","options":[],"den":"Penne, Spinach, Mushroom, Poached Egg, Cream Sauce","dzh":"筆管麵、菠菜、蘑菇、水波蛋、奶油醬"},{"en":"Arugula Pesto","zh":"芝麻葉青醬義大利麵","p":"RM 34.90","tags":["vegetarian"],"xterm":"pesto","options":[],"den":"Spaghetti, Walnuts, Sundried Tomato, Zucchini Chips, Arugula Pesto, Parmesan","dzh":"義大利直麵、核桃、日曬番茄乾、炸櫛瓜片、芝麻葉青醬、帕馬森起司"}],"id":"sec-4 ":[],"den":"Crispy Chicken Bites, Signature Gravy, Cherry Tomato, Arugula, Mixed Cheese","dzh":"酥炸雞塊、招牌肉汁、小番茄、芝麻葉、綜合起司"},{"en":"Tartare Fish Pizza","zh":"塔塔魚肉披薩","p":"RM 31.90","tags":[],"xterm":"tartare","options":[],"den":"Seabass Fillet, Tartare Sauce, Cherry Tomato, Onion, Arugula, Capers, Mixed Cheese","dzh":"鱸魚柳、塔塔醬、小番茄、洋蔥、芝麻葉、酸豆、綜合起司"},{"en":"Tuna Putanesca Pizza","zh":"鮪魚普塔內斯卡披薩","p":"RM 31.90","tags":["notable"],"xterm":"puttanesca","options":[],"den":"Tomato-Based, Tuna, Capers, Black Olives, Cherry Tomato, Chilli Flake, Crispy Garlic, Mixed Cheese","dzh":"番茄醬底、鮪魚、酸豆、黑橄欖、小番茄、辣椒片、酥炸大蒜、綜合起司","explain":{"en":"Puttanesca (poo-tah-NES-kah) is a bold, punchy Italian sauce from Naples made with tomatoes, olives, capers, anchovies, and garlic. The name derives from the Italian word for 'prostitute' — the dish's origin story, likely apocryphal, claims it was thrown together quickly from pantry staples. Here it tops a pizza with tuna instead of the classic pasta base.","zh":"普塔內斯卡（poo-tah-NES-kah）是義大利拿坡里的經典醬汁，由番茄、橄欖、酸豆、鯷魚和大蒜製成，風味濃烈鮮明。其名稱源自義大利文中「妓女」一詞，相傳是用廚房現有食材快速烹成的料理，起源故事真偽難考。此處以鮪魚搭配這款醬汁做成披薩。"}},{"en":"Smoked Duck & Orange Honey Pizza","zh":"煙燻鴨肉橙香蜂蜜披薩","p":"RM 32.90","tags":[],"xterm":"","options":[],"den":"Smoked Duck, Orange Honey Glaze, Caramelised Onion, Mozzarelle, Rocket","dzh":"煙燻鴨肉、橙香蜂蜜糖衣、焦糖洋蔥、莫札瑞拉起司、芝麻葉"},{"en":"Wagyu Pizza","zh":"和牛披薩","p":"RM 38.90","tags":["signature","notable"],"xterm":"wagyu","options":[],"den":"Signature Gravy, Wagyu Beef Mince, Mushroom, Cherry Tomato, Mixed Cheese","dzh":"招牌肉汁、和牛絞肉、蘑菇、小番茄、綜合起司","explain":{"en":"Burrata (boo-RAH-tah) is a fresh Italian cheese with a solid mozzarella shell and a creamy stracciatella centre — its name means 'buttered' in Italian. Caprese (kah-PREH-zeh) refers to the classic salad from the island of Capri, pairing fresh cheese with tomatoes, basil, and olive oil. Together they make a richer, creamier take on the beloved Italian classic.","zh":"布拉塔（boo-RAH-tah）是義大利鮮起司，外層是莫扎瑞拉，內部包覆著濃郁的斯特拉恰泰拉奶餡，名稱意為「加了奶油的」。卡布里（kah-PREH-zeh）源自義大利卡布里島，指以鮮起司、番茄、羅勒和橄欖油組合而成的經典沙拉。兩者結合，造就更濃郁滑潤的義式風味。"}},{"en":"Pesto Streaky Beef Pizza","zh":"青醬五花牛肉披薩","p":"RM 30.90","tags":[],"xterm":"pesto","options":[],"den":"Arugula Pesto, Streaky Beef, Cherry Tomato, Red Onion, Arugula, Mixed Cheese","dzh":"芝麻葉青醬、五花牛肉片、小番茄、紅洋蔥、芝麻葉、綜合起司"},{"en":"Delectable Pulled Beef Pizza","zh":"手撕牛肉披薩","p":"RM 32.90","tags":[],"xterm":"","options":[],"den":"Beef Gravy, Pulled Beef, Cherry Tomato, Arugula, Mixed Cheese","dzh":"牛肉醬汁、手撕牛肉、小番茄、芝麻葉、綜合起司"},{"en":"Stracciatella Beef Pepperoni Pizza","zh":"斯特拉恰泰拉起司牛肉辣腸披薩","p":"RM 29.90","tags":["notable"],"xterm":"stracciatella","options":[],"den":"Tomato-Based, Fresh Stracciatella, Beef Pepperoni, Mixed Cheese","dzh":"番茄醬底、新鮮斯特拉恰泰拉起司、牛肉辣腸、綜合起司","explain":{"en":"Stracciatella (strah-chah-TEL-lah) means 'little shreds' in Italian — it is the creamy, pulled-curd interior of burrata cheese, sold on its own as a soft, milky spread. Originating in Puglia, southern Italy, it is prized for its rich, fresh-dairy flavour and silky texture, melting beautifully over a hot pizza.","zh":"斯特拉恰泰拉（strah-chah-TEL-lah）在義大利文中意為「小碎片」，是布拉塔起司內部那層奶香濃郁的細絲狀軟凝乳，單獨販售時質地如滑順的鮮奶油醬。源自義大利南部普利亞大區，鋪在熱披薩上會輕柔融化，奶香十足。"}},{"en":"Garlic Butter Prawn Pizza","zh":"蒜香奶油蝦披薩","p":"RM 36.90","tags":[],"xterm":"","options":[],"den":"Tomato-Based, Garlic Butter, Prawns, Cherry Tomato, Red Chilli, Crispy Garlic, Mixed Cheese","dzh":"番茄醬底、蒜香奶油、蝦、小番茄、紅辣椒、酥炸大蒜、綜合起司"},{"en":"Stracciatella Margarita Pizza","zh":"斯特拉恰泰拉瑪格麗特披薩","p":"RM 25.90","tags":["vegetarian","notable"],"xterm":"margherita","options":[],"den":"Tomato-Based, Basil, Extra Virgin Olive Oil, Garlic Crisps, Fresh Stracciatella","dzh":"番茄醬底、羅勒、特級初榨橄欖油、蒜片、新鮮斯特拉恰泰拉起司","explain":{"en":"Margherita (mar-geh-REE-tah) is the classic Neapolitan pizza of tomato, mozzarella, and fresh basil — the three colours intentionally mirror the Italian flag. It is named after Queen Margherita of Savoy, who reportedly favoured this combination during a visit to Naples in 1889.","zh":"瑪格麗特（mar-geh-REE-tah）是拿坡里經典披薩，以番茄、莫扎瑞拉起司和新鮮羅勒三色呼應義大利國旗。相傳1889年薩伏依王朝的瑪格麗特皇后造訪拿坡里時對此口味情有獨鍾，披薩因此以她命名。"}},{"en":"Mushroom Trio Truffle Pizza","zh":"三菇松露披薩","p":"RM 26.90","tags":["vegetarian","notable"],"xterm":"truffle","options":[],"den":"Cream Base, Button Mushroom, Cherry Tomato, Garlic Crisps, Truffle Oil, Mixed Cheese","dzh":"奶油醬底、洋菇、小番茄、蒜片、松露油、綜合起司","explain":{"en":"Truffles are rare, prized fungi that grow underground near tree roots in parts of Europe, hunted by trained dogs or pigs. Their intensely earthy, musky aroma makes them one of the world's most expensive ingredients. On menus, 'truffle' often refers to black truffle (Périgord, France) or white truffle (Alba, Italy), though truffle oil — a more affordable flavouring — is also common.","zh":"松露是一種稀有的地下真菌，生長於歐洲部分地區的樹根旁，需訓練有素的狗或豬來尋找。其濃烈的土壤氣息與麝香芳香使它成為全球最昂貴的食材之一。菜單上的「松露」通常指法國黑松露或義大利白松露，但平價的松露油也相當普遍。"}},{"en":"Burrata Caprese Pizza","zh":"布拉塔卡布里沙拉披薩","p":"RM 27.90","tags":["vegetarian","notable"],"xterm":"burrata-caprese","options":[],"den":"Burrata, Roasted Cherry Tomato, Arugula, Pesto Base, Balsamic Essence","dzh":"布拉塔起司、烤小番茄、芝麻葉、青醬底、巴薩米可香精","explain":{"en":"Burrata (boo-RAH-tah) is a fresh Italian cheese with a solid mozzarella shell and a creamy stracciatella centre — its name means 'buttered' in Italian. Caprese (kah-PREH-zeh) refers to the classic salad from the island of Capri, pairing fresh cheese with tomatoes, basil, and olive oil. Together they make a richer, creamier take on the beloved Italian classic.","zh":"布拉塔（boo-RAH-tah）是義大利鮮起司，外層是莫扎瑞拉，內部包覆著濃郁的斯特拉恰泰拉奶餡，名稱意為「加了奶油的」。卡布里（kah-PREH-zeh）源自義大利卡布里島，指以鮮起司、番茄、羅勒和橄欖油組合而成的經典沙拉。兩者結合，造就更濃郁滑潤的義式風味。"}}],"id":"sec-6"},{"en":"Snack & Bites","zh":"輕食小點","note":"Sharing Plate","items":[{"en":"Truffle Fries with Cheese Sauce","zh":"松露薯條佐起司醬","p":"RM 16.90","tags":["vegetarian","notable"],"xterm":"truffle","options":[],"den":"","dzh":"","explain":{"en":"Truffles are rare, prized fungi that grow underground near tree roots in parts of Europe, hunted by trained dogs or pigs. Their intensely earthy, musky aroma makes them one of the world's most expensive ingredients. On menus, 'truffle' often refers to black truffle (Périgord, France) or white truffle (Alba, Italy), though truffle oil — a more affordable flavouring — is also common.","zh":"松露是一種稀有的地下真菌，生長於歐洲部分地區的樹根旁，需訓練有素的狗或豬來尋找。其濃烈的土壤氣息與麝香芳香使它成為全球最昂貴的食材之一。菜單上的「松露」通常指法國黑松露或義大利白松露，但平價的松露油也相當普遍。"}},{"en":"Criss-Cross Fries Basket","zh":"格子薯條籃","p":"RM 13.90","tags":["vegetarian"],"xterm":"","options":[],"den":"","dzh":""},{"en":"Crispy Cauliflower Florets","zh":"酥炸白花椰菜","p":"RM 13.90","tags":["vegetarian"],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cajun Corn Ribs","zh":"卡疆香料玉米棒","p":"RM 13.90","tags":["vegetarian","notable"],"xterm":"cajun","options":[],"den":"","dzh":"","explain":{"en":"Cajun (KAY-jun) refers to the cooking style of Louisiana's Cajun people — descendants of French-Acadian settlers who were expelled from Canada in the 18th century. The cuisine is known for bold seasoning blends of paprika, cayenne, garlic, onion, and herbs, delivering a smoky, spicy kick. It is commonly applied to grilled or fried meats, seafood, and vegetables.","zh":"卡疆（KAY-jun）指美國路易斯安那州卡疆人的烹飪風格，他們是18世紀被驅逐出加拿大的法裔阿卡迪亞移民後裔。其料理以紅椒粉、卡宴辣椒、大蒜、洋蔥和香草等組成的香料混合為特色，帶有煙燻辛辣的風味，常用於烤肉、海鮮和蔬菜。"}},{"en":"Crispy Focaccia with Butter (3pcs)","zh":"酥脆佛卡夏麵包佐奶油（3片）","p":"RM 11.90","tags":["vegetarian","notable"],"xterm":"focaccia","options":[],"den":"","dzh":"","explain":{"en":"Puttanesca (poo-tah-NES-kah) is a bold, punchy Italian sauce from Naples made with tomatoes, olives, capers, anchovies, and garlic. The name derives from the Italian word for 'prostitute' — the dish's origin story, likely apocryphal, claims it was thrown together quickly from pantry staples. Here it tops a pizza with tuna instead of the classic pasta base.","zh":"普塔內斯卡（poo-tah-NES-kah）是義大利拿坡里的經典醬汁，由番茄、橄欖、酸豆、鯷魚和大蒜製成，風味濃烈鮮明。其名稱源自義大利文中「妓女」一詞，相傳是用廚房現有食材快速烹成的料理，起源故事真偽難考。此處以鮪魚搭配這款醬汁做成披薩。"}},{"en":"Mashed Potato with Gravy","zh":"肉汁馬鈴薯泥","p":"RM 13.90","tags":["vegetarian"],"xterm":"","options":[],"den":"","dzh":""},{"en":"Portobello Fingers with Tartare Sauce","zh":"波特貝勒菇條佐塔塔醬","p":"RM 18.90","tags":["vegetarian","notable"],"xterm":"portobello","options":[],"den":"","dzh":"","explain":{"en":"Portobello (por-toh-BEL-oh) is simply a fully matured cremini mushroom — the same species as the common button mushroom, just allowed to grow large and flat. The name is a modern American marketing invention from the 1980s to make the oversized mushroom sound appealing. Its dense, meaty texture makes it a popular vegetarian substitute for meat, and it holds up well when battered and fried into 'fingers'.","zh":"波特貝勒菇（por-toh-BEL-oh）其實就是完全成熟的褐色蘑菇，與常見的白鈕扣菇是同一品種，只是任其生長至大而扁平的狀態。這個名稱是1980年代美國商人為了讓這款大型蘑菇更吸引人而創造的行銷詞彙。其厚實、有嚼勁的肉質使它成為極佳的素食替代食材，裹粉炸成「條狀」尤其美味。"}},{"en":"Fried Cajun Octopus with Tartare Sauce","zh":"卡疆炸章魚佐塔塔醬","p":"RM 24.90","tags":["notable"],"xterm":"cajun","options":[],"den":"","dzh":"","explain":{"en":"Cajun (KAY-jun) refers to the cooking style of Louisiana's Cajun people — descendants of French-Acadian settlers who were expelled from Canada in the 18th century. The cuisine is known for bold seasoning blends of paprika, cayenne, garlic, onion, and herbs, delivering a smoky, spicy kick. It is commonly applied to grilled or fried meats, seafood, and vegetables.","zh":"卡疆（KAY-jun）指美國路易斯安那州卡疆人的烹飪風格，他們是18世紀被驅逐出加拿大的法裔阿卡迪亞移民後裔。其料理以紅椒粉、卡宴辣椒、大蒜、洋蔥和香草等組成的香料混合為特色，帶有煙燻辛辣的風味，常用於烤肉、海鮮和蔬菜。"}},{"en":"Buffalo Wings with Ranch Dressing (4 sets)","zh":"水牛城辣翅佐田園醬（4份）","p":"RM 21.90","tags":["spicy","notable"],"xterm":"buffalo-wings","options":[],"den":"","dzh":"","explain":{"en":"Buffalo wings have nothing to do with buffalo — they are named after Buffalo, New York, where they were invented at the Anchor Bar in 1964. The wings are deep-fried and tossed in a tangy, buttery hot sauce (typically Frank's RedHot and butter). Ranch dressing, a cool herb-and-buttermilk dip, is the classic American accompaniment to balance the heat.","zh":"水牛城辣翅與水牛毫無關係，名稱來自美國紐約州的水牛城（Buffalo），1964年發源於當地的Anchor Bar。雞翅經油炸後裹上以辣椒醬和奶油調製的酸辣醬汁。田園醬是一種以白脫牛奶和香草調製的清爽蘸醬，是美國搭配辣翅的經典組合，用來平衡辣味。"}},{"en":"Sesame Glazed Wings with Pickles (4 sets)","zh":"芝麻醬汁雞翅佐醃菜（4份）","p":"RM 21.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Grazing Platter","zh":"豐盛拼盤","p":"RM 45.90","tags":[],"xterm":"","options":[],"den":"Criss Cross Fries, Sliced Jumbo Chicken Sausage, Lamb Shoulder Strips, Fried Cauliflower Florets, Cajun Corn Ribs","dzh":"格子薯條、大雞肉香腸片、羊肩肉條、炸白花椰菜、卡疆香料玉米棒"},{"en":"Topee Skewer Platter with Fries","zh":"Topee 串燒拼盤佐薯條","p":"RM 40.90","tags":[],"xterm":"","options":[],"den":"Beef, Chicken & Mushroom Sticks with In-House Sauce","dzh":"牛肉、雞肉與蘑菇串佐自製醬汁"},{"en":"The Potatoes Family with Tartere, Cheese Sauce & Ketchup","zh":"薯家族拼盤佐塔塔醬、起司醬與番茄醬","p":"RM 30.90","tags":["vegetarian"],"xterm":"","options":[],"den":"Fries, Wedges, Cris-Cross Fries, with 3 Special Dips","dzh":"薯條、馬鈴薯角、格子薯條，附3種特製沾醬"},{"en":"Mushroom Madness","zh":"蘑菇狂想曲","p":"RM 33.90","tags":["vegetarian"],"xterm":"","options":[],"den":"3 Types of Fried Mushrooms, Lemon Shoyu Mushroom, Focaccia Toast","dzh":"3種炸菇、檸檬醬油蘑菇、佛卡夏吐司"},{"en":"Lamb Shoulder Strips with Focaccia","zh":"羊肩肉條佐佛卡夏麵包","p":"RM 24.90","tags":["notable"],"xterm":"focaccia","options":[],"den":"Stir-Fry Lamb Shoulder, Chilli, Onion, Focaccia","dzh":"炒羊肩肉、辣椒、洋蔥、佛卡夏麵包","explain":{"en":"Puttanesca (poo-tah-NES-kah) is a bold, punchy Italian sauce from Naples made with tomatoes, olives, capers, anchovies, and garlic. The name derives from the Italian word for 'prostitute' — the dish's origin story, likely apocryphal, claims it was thrown together quickly from pantry staples. Here it tops a pizza with tuna instead of the classic pasta base.","zh":"普塔內斯卡（poo-tah-NES-kah）是義大利拿坡里的經典醬汁，由番茄、橄欖、酸豆、鯷魚和大蒜製成，風味濃烈鮮明。其名稱源自義大利文中「妓女」一詞，相傳是用廚房現有食材快速烹成的料理，起源故事真偽難考。此處以鮪魚搭配這款醬汁做成披薩。"}}],"id":"sec-7"},{"en":"Chicken Mains","zh":"雞肉主菜","note":"","items":[{"en":"The G.M.C","zh":"G.M.C 雞肉堡","p":"RM 38.90","tags":[],"xterm":"","options":[],"den":"Fried Chicken, Buttercream Sauce, Poached Egg, Cherry Tomato, Focaccia, Cabbage Slaw","dzh":"炸雞、奶油霜醬、水波蛋、小番茄、佛卡夏麵包、高麗菜絲沙拉"},{"en":"Hot Chick","zh":"辣雞","p":"RM 29.90","tags":[],"xterm":"","options":[],"den":"Fried Chicken Chop, Cabbage Slaw, Fries, Signature Gravy","dzh":"炸雞排、高麗菜絲沙拉、薯條、招牌肉汁"},{"en":"Tuscan Poultry","zh":"托斯卡尼烤雞腿","p":"RM 35.90","tags":[],"xterm":"tuscan","options":[],"den":"Roasted Whole Chicken Leg, Seared Potato, Cherry Tomato, Tuscan Sauce","dzh":"烤整隻雞腿、煎馬鈴薯、小番茄、托斯卡尼醬"},{"en":"Chicken Dianne","zh":"黛安娜雞胸肉","p":"RM 33.90","tags":["notable"],"xterm":"chicken-diane","options":[],"den":"Seared Chicken Breast, Spinach, Mushroom, Mashed Potato, Mustard Cream Sauce","dzh":"煎雞胸肉、菠菜、蘑菇、馬鈴薯泥、芥末奶油醬","explain":{"en":"Chicken Diane is a pan-sauce dish modelled on the classic Steak Diane, a mid-20th-century American restaurant staple of sautéed meat finished tableside in a sauce of butter, Worcestershire, mustard, cream, and cognac. 'Diane' refers to Diana, the Roman goddess of the hunt, lending the dish its regal name. The chicken version swaps steak for breast fillet while keeping the rich, flame-kissed sauce.","zh":"黛安娜雞胸肉源自經典的「黛安娜牛排」，這是20世紀中期美國餐廳的人氣料理，以奶油、伍斯特醬、芥末、鮮奶油和干邑白蘭地在桌邊現做醬汁收尾。「黛安娜」指羅馬神話中的狩獵女神Diana，賦予這道菜高雅的名稱。雞肉版本以雞胸肉取代牛排，保留了濃郁的奶香火焰醬汁風味。"}},{"en":"Fowl Play","zh":"炒煮雞胸肉","p":"RM 33.90","tags":[],"xterm":"","options":[],"den":"Seared Chicken Breast, Spinach, Mushroom, Seared Zucchini, Deglaze Sauce","dzh":"煎雞胸肉、菠菜、蘑菇、煎櫛瓜、鍋底收汁醬"},{"en":"Harvest-Moon Risotto","zh":"豐收月燉飯","p":"RM 29.90","tags":["vegetarian","notable"],"xterm":"risotto","options":[],"den":"Caulirice Risotto, Grilled Pumpkin, Seared Zucchini, Cherry Tomato, Lemon Oil","dzh":"花椰米燉飯、烤南瓜、煎櫛瓜、小番茄、檸檬油","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian rice dish — typically made with short-grain Arborio or Carnaroli rice — cooked slowly with stock added ladle by ladle until creamy and al dente. The technique relies on the rice releasing starch gradually to create its signature velvety texture, finished with butter and Parmesan. It is a cornerstone of Lombardy and Piedmont cuisine.","zh":"燉飯（ree-ZOT-toh）是義大利北部的經典米飯料理，通常使用阿博里歐或卡納羅利等短粒米，以高湯一勺勺慢慢加入拌炒，直至米飯呈現奶滑且帶嚼勁的質地。這種製作技法讓米粒緩緩釋出澱粉，最後以奶油和帕瑪森起司增添濃郁風味，是倫巴底和皮埃蒙特料理的代表作。"}},{"en":"Stuffed Squash","zh":"鑲南瓜","p":"RM 29.90","tags":["vegetarian"],"xterm":"","options":[],"den":"Stuffed Eggplant, Fried Cauliflower, Lemon Shoyu Mushrooms","dzh":"鑲茄子、炸白花椰菜、檸檬醬油蘑菇"}],"id":"sec-8"},{"en":"Beverage — Signature Cooler","zh":"飲品 — 招牌冷飲","note":"","items":[{"en":"Cowboy in Pink","zh":"粉紅牛仔","p":"RM 13.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Fizzie Orange","zh":"氣泡橙汁","p":"RM 13.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Lime & Mint Nojito","zh":"萊姆薄荷無酒精莫希托","p":"RM 13.90","tags":["notable"],"xterm":"mojito","options":[],"den":"","dzh":"","explain":{"en":"Mojito (moh-HEE-toh) is a Cuban cocktail of white rum, lime juice, sugar, mint, and soda water — Havana's most iconic drink. A 'Nojito' (or 'Virgin Mojito') keeps all the bright, refreshing flavours but omits the rum, making it alcohol-free. The name 'mojito' likely derives from the African word 'mojo', meaning a small charm or magic spell.","zh":"莫希托（moh-HEE-toh）是古巴雞尾酒，以白蘭姆酒、萊姆汁、糖、薄荷和蘇打水調製，是哈瓦那最具代表性的飲品。「無酒精莫希托」（Nojito）保留所有清新爽口的風味，僅去除蘭姆酒，適合不飲酒者享用。「mojito」這個名稱可能源自非洲詞語「mojo」，意指小護身符或魔法。"}},{"en":"Lemonade Fizz","zh":"氣泡檸檬水","p":"RM 13.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Strawberry Longan Mint","zh":"草莓龍眼薄荷飲","p":"RM 13.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Summer Berries Concoction","zh":"夏日莓果特調","p":"RM 13.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sour Apple","zh":"酸蘋果飲","p":"RM 13.90","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-9"},{"en":"Beverage — Chilled Juice","zh":"飲品 — 冷藏果汁","note":"","items":[{"en":"Orange","zh":"柳橙汁","p":"RM 8.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Apple","zh":"蘋果汁","p":"RM 8.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Pink Guava","zh":"粉紅芭樂汁","p":"RM 8.00","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-10"},{"en":"Beverage — Cooler Selection","zh":"飲品 — 冷飲選擇","note":"","items":[{"en":"Peach Tea","zh":"水蜜桃茶","p":"RM 8.00","tags":[],"xterm":"","options":[{"en":"Temperature","zh":"溫度","kind":"one","choices":[{"en":"Hot","zh":"熱","p":""},{"en":"Cold","zh":"冷","p":""}]}],"den":"","dzh":""},{"en":"Lemon Tea","zh":"檸檬茶","p":"RM 8.00","tags":[],"xterm":"","options":[{"en":"Temperature","zh":"溫度","kind":"one","choices":[{"en":"Hot","zh":"熱","p":""},{"en":"Cold","zh":"冷","p":""}]}],"den":"","dzh":""},{"en":"Honey Lemon","zh":"蜂蜜檸檬","p":"RM 8.00","tags":[],"xterm":"","options":[{"en":"Temperature","zh":"溫度","kind":"one","choices":[{"en":"Hot","zh":"熱","p":""},{"en":"Cold","zh":"冷","p":""}]}],"den":"","dzh":""}],"id":"sec-11"},{"en":"Beverage — Potted Tea (Refillable)","zh":"飲品 — 壺裝茶（可續杯）","note":"","items":[{"en":"Blackcurrent & Hibiscus Tea","zh":"黑醋栗洛神花茶","p":"RM 12.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Chamomile Tea","zh":"洋甘菊茶","p":"RM 12.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Lemongrass & Ginger Tea","zh":"香茅薑茶","p":"RM 12.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Peppermint Tea","zh":"薄荷茶","p":"RM 12.90","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-12"},{"en":"Beverage — Coffee Selection (illy Coffee)","zh":"飲品 — 咖啡系列（illy 咖啡）","note":"","items":[{"en":"Espresso","zh":"濃縮咖啡","p":"RM 9.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Hot Americano","zh":"熱美式咖啡","p":"RM 9.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Iced Americano","zh":"冰美式咖啡","p":"RM 9.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sunrise at Topee (C)","zh":"Topee 日出咖啡（冷）","p":"RM 14.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cowboy Sunset (C)","zh":"牛仔日落咖啡（冷）","p":"RM 14.90","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-13"},{"en":"Beverage — Soft Drink","zh":"飲品 — 軟性飲料","note":"","items":[{"en":"Coca-Cola","zh":"可口可樂","p":"RM 5.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"CokeZero","zh":"零卡可樂","p":"RM 5.90","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sprite","zh":"雪碧","p":"RM 5.90","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-14"},{"en":"Beverage — Bottle Beer (Buy 3 Get 4)","zh":"飲品 — 瓶裝啤酒（買3送1）","note":"","items":[{"en":"Tiger","zh":"虎牌啤酒","p":"RM 18.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Guinness","zh":"健力士黑啤","p":"RM 19.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Heineken","zh":"海尼根","p":"RM 20.00","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Coopers Pale Ale","zh":"庫珀斯淡色艾爾啤酒","p":"RM 27.00","tags":["notable"],"xterm":"pale-ale","options":[],"den":"","dzh":"","explain":{"en":"Pale ale is a style of beer brewed with predominantly pale malt, giving it a lighter colour and cleaner malt flavour than darker ales. 'Ale' means the beer is fermented with top-fermenting yeast at warmer temperatures, producing fruitier, more aromatic notes compared to lagers. Coopers, from Adelaide, Australia, is one of the country's oldest family-owned breweries and is known for its naturally conditioned, slightly hazy pale ale.","zh":"淡色艾爾是以淺色麥芽為主釀造的啤酒風格，顏色比深色艾爾淺，麥芽風味也較為清爽。「艾爾」（Ale）指以上層發酵酵母在較高溫下釀造，賦予啤酒比拉格更多果香與芳香氣息。庫珀斯（Coopers）來自澳洲阿德萊德，是當地歷史最悠久的家族釀酒廠之一，以天然瓶內二次發酵、略帶混濁的淡色艾爾聞名。"}}],"id":"sec-15"}];
const TAGS = [{"id":"notable","en":"Notable","zh":"特色","icon":"💡","group":"highlight"},{"id":"vegetarian","en":"Vegetarian","zh":"適合素食","icon":"🌱","group":"diet"},{"id":"spicy","en":"Spicy","zh":"辣","icon":"🌶️","group":"diet"},{"id":"signature","en":"Signature","zh":"招牌","icon":"⭐","group":"highlight"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.filter(t => t !== "notable").map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const pic = it.img ? `<img class="dish" src="${esc(it.img)}" loading="lazy" alt="">` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${pic}${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
</body>
</html>
