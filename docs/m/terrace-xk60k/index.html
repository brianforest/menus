<style>
  :root {
    --ink: #1c1c1e; --muted: #6f6f74; --line: #e7e3db; --paper: #faf8f4;
    --card: #ffffff; --accent: #8a6d3b; --accent-soft: #f1eae0; --price: #2c2c2e;
    --maxw: 900px; --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang TC", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; overflow-wrap: break-word;
  }
  header.hero {
    text-align: center; padding: calc(40px + env(safe-area-inset-top, 0px)) 20px 26px;
    background: linear-gradient(180deg, #fff 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--line);
  }
  header.hero h1 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(36px, 9vw, 54px); letter-spacing: 1px; font-weight: 700; }
  header.hero .zh-title { color: var(--accent); font-size: clamp(18px, 4.6vw, 24px); margin-top: 6px; letter-spacing: 4px; }
  header.hero .sub { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .controls {
    position: sticky; top: 0; z-index: 30; background: rgba(250,248,244,.92);
    backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line); padding: 8px 0 6px;
  }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; padding: 0 14px; }
  .lang-toggle button {
    flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    padding: 7px 16px; min-height: 38px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--ink); cursor: pointer;
  }
  .lang-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -ms-overflow-style: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a { flex: 0 0 auto; text-decoration: none; font-size: 15px; color: var(--accent);
    background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 14px calc(80px + var(--safe-b)); }
  .filterbar { display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px 8px;
    scrollbar-width: none; -ms-overflow-style: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; font: inherit; font-size: 15px; font-weight: 500;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 6px 12px; min-height: 36px; cursor: pointer;
    white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  body.lang-zh .chip .cen { display: none; }
  body.lang-en .chip .czh { display: none; }

  section { margin-top: 38px; scroll-margin-top: 96px; }
  .sec-head { border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .sec-head h2 { margin: 0; font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px, 6.4vw, 32px); letter-spacing: .5px; }
  .sec-head .zh { color: var(--accent); font-size: clamp(17px, 4.6vw, 21px); letter-spacing: 2px; }
  .sec-note { color: var(--muted); font-size: 15px; margin: 0 0 12px; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }
  .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .name { font-weight: 700; font-size: 18px; }
  .item .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .item .tags { font-size: 15px; letter-spacing: 1px; }
  .dish { display: block; width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 8px; }
  .explain { font: inherit; font-size: 15px; line-height: 1; border: 1px solid var(--line);
    background: var(--card); border-radius: 999px; padding: 3px 7px; cursor: pointer; }
  .popover { position: absolute; z-index: 50; max-width: 300px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 15px;
    line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,.16); }
  .popover[hidden] { display: none; }
  .popover .pen { display: block; }
  .popover .pzh { display: block; color: #4a4a4f; margin-top: 6px; }
  body.lang-zh .popover .pen { display: none; }
  body.lang-en .popover .pzh { display: none; }
  .item .name-zh { color: var(--accent); font-weight: 500; font-size: 17px; margin-top: 1px; }
  .item .price { font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item .desc { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .item .desc-zh { color: #4a4a4f; font-size: 15px; margin-top: 3px; }

  .opts { margin-top: 8px; }
  .optg { margin-top: 8px; padding: 8px 10px; background: var(--accent-soft);
    border-left: 3px solid var(--accent); border-radius: 8px; }
  .optg:first-child { margin-top: 0; }
  .optg-label { font-weight: 700; font-size: 15px; }
  .opt-hint { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 6px; }
  .optg-choices { list-style: none; margin: 6px 0 0; padding: 0;
    display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .optg-choices li { font-size: 15px; }
  .opts .ozh { color: var(--accent); }
  .opts .oen, .opts .ozh { margin-right: 3px; }
  .opt-price { color: var(--price); font-variant-numeric: tabular-nums; margin-left: 3px; }
  body.lang-zh .opts .oen { display: none; }
  body.lang-en .opts .ozh { display: none; }

  body.lang-zh .name { display: none; }
  body.lang-zh .desc { display: none; }
  body.lang-zh .name-zh { font-size: 18px; font-weight: 700; color: var(--ink); }
  body.lang-en .name-zh { display: none; }
  body.lang-en .desc-zh { display: none; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);
    color: #fff; font-size: 20px; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .2s; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  #toTop.show { opacity: .92; pointer-events: auto; }

  footer { text-align: center; color: var(--muted); font-size: 14.5px;
    padding: 28px 16px calc(40px + var(--safe-b)); border-top: 1px solid var(--line); }
</style>
</head>

<script>
const MENU = [{"en":"Appetisers","zh":"前菜","note":"","items":[{"en":"Parmigiana Di Melanzane","zh":"帕爾馬茄子","p":"61","tags":["vegetarian","notable"],"xterm":"parmigiana-di-melanzane","options":[],"den":"sweet eggplant, tomato, mozzarella, parmesan","dzh":"甜茄子、番茄、莫扎瑞拉芝士、帕爾馬芝士","explain":{"en":"A classic Southern Italian baked dish made of layered sliced aubergine (eggplant), tomato sauce, mozzarella, and Parmesan cheese. The layers are baked until golden and bubbling. It is served as a starter or a vegetarian main course.","zh":"這是一道經典的南義大利烤焗料理，以切片茄子、番茄醬、莫扎瑞拉芝士和帕爾馬芝士層層疊放，烤至金黃焦香。可作為前菜或素食主菜享用。"}},{"en":"Truffle Bruschetta","zh":"松露布斯凱塔","p":"94","tags":["vegetarian","notable"],"xterm":"truffle-bruschetta","options":[],"den":"buffalo mozzarella, truffle paste, shaved parmesan","dzh":"水牛莫扎瑞拉芝士、松露醬、刨片帕爾馬芝士","explain":{"en":"Bruschetta (broo-SKET-ta) is a classic Italian appetiser of grilled bread rubbed with garlic and drizzled with olive oil, topped with fresh ingredients. Here it is elevated with truffle — the prized underground fungus treasured for its intense earthy aroma. The name comes from the Italian verb 'bruscare', meaning to roast over coals.","zh":"布斯凱塔（broo-SKET-ta）是義大利經典前菜，以烤麵包片抹上大蒜、淋橄欖油為基底，再疊上各式食材。這道菜加入了松露——一種生長於地下、以濃郁土香著稱的珍貴菌類。名稱源自義大利文「bruscare」，意為炭火烘烤。"}},{"en":"Salmon Tartare","zh":"鮭魚他他","p":"90","tags":["signature","gluten-free","notable"],"xterm":"salmon-tartare","options":[],"den":"salmon roe, capers, gherkin, shallot, mustard cream","dzh":"鮭魚子、酸豆、酸黃瓜、紅蔥頭、芥末忌廉","explain":{"en":"Tartare (tar-TAR) refers to raw, finely chopped or diced protein dressed with seasoning — no heat applied. The name comes from the Tartar peoples of Central Asia, associated historically with eating raw meat. Here, fresh salmon is the star, typically finished with capers, shallots, and citrus.","zh":"韃靼（tar-TAR）指將生鮮食材細切後以調味料拌勻、完全不經烹煮的料理方式，名稱源自中亞韃靼民族，歷史上與生食肉類相關聯。此菜以新鮮鮭魚為主角，通常以酸豆、紅蔥頭及柑橘調味。"}}],"id":"sec-0"},{"en":"Salads","zh":"沙律","note":"","items":[{"en":"Salade Nicoise","zh":"尼斯沙律","p":"79","tags":["gluten-free","notable"],"xterm":"salade-nicoise","options":[],"den":"pan seared tuna, mixed lettuce, green bean, olive, cherry tomato, hard-boiled egg, capers dressing","dzh":"煎吞拿魚、混合生菜、青豆、橄欖、車厘茄、溏心蛋、酸豆醬汁","explain":{"en":"A composed salad originating from Nice in southern France. Traditional ingredients include tuna, hard-boiled eggs, green beans, olives, anchovies, and tomatoes dressed with vinaigrette. It is hearty enough to serve as a main course.","zh":"源自法國南部城市尼斯的組合沙律。傳統食材包括吞拿魚、水煮蛋、四季豆、橄欖、鯷魚和番茄，以油醋汁調味。份量豐盛，可作主菜享用。"}},{"en":"The Terrace Caesar Salad","zh":"露台凱撒沙律","p":"79","tags":["vegetarian","gluten-free"],"xterm":"","options":[],"den":"young baby romaine lettuce, grilled chicken, speck crisp, grated parmesan, Caesar dressing","dzh":"嫩羅馬生菜、烤雞肉、煙燻火腿脆片、刨絲帕爾馬芝士、凱撒醬"},{"en":"Insalata Mista","zh":"什錦沙律","p":"42","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-mista","options":[],"den":"seasonal green salad, olives, tomato, sundried tomato, artichoke, grilled vegetables","dzh":"時令青蔬沙律、橄欖、番茄、風乾番茄、朝鮮薊、烤時蔬","explain":{"en":"Meaning \"mixed salad\" in Italian, this is a simple side salad of assorted seasonal greens and raw vegetables dressed with olive oil and vinegar. The exact composition varies by restaurant and season. It is a common accompaniment to Italian meals.","zh":"義大利文意為「混合沙律」，是一款以各式時令生菜和蔬菜拌以橄欖油和醋調製的簡單配菜沙律。具體食材因餐廳和季節而異，是義大利餐桌上常見的配菜。"}},{"en":"Grilled Octopus Salad","zh":"烤章魚沙律","p":"90","tags":["gluten-free"],"xterm":"","options":[],"den":"octopus, tomato confit, potato, lemon dressing","dzh":"章魚、油封番茄、薯仔、檸檬醬汁"},{"en":"Insalata Caprese","zh":"卡布里沙律","p":"108","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-caprese","options":[],"den":"tomato confit & balsamic caramel","dzh":"油封番茄及香醋焦糖","explain":{"en":"A classic Italian salad from the island of Capri, made with alternating slices of fresh mozzarella, ripe tomatoes, and basil leaves. It is dressed simply with olive oil, salt, and sometimes balsamic glaze. The dish is celebrated for the quality of its few ingredients.","zh":"源自義大利卡布里島的經典沙律，以新鮮莫扎瑞拉芝士、熟透的番茄和羅勒葉交替排列而成。以橄欖油和鹽簡單調味，有時加入陳年黑醋汁。此菜的精髓在於食材本身的品質。"}},{"en":"Buffalo Mozzarella","zh":"水牛莫扎瑞拉芝士沙律","p":"108","tags":["gluten-free","signature","notable"],"xterm":"buffalo-mozzarella","options":[],"den":"mango and bell pepper, beef speck","dzh":"芒果、彩椒、牛肉煙燻火腿","explain":{"en":"Mozzarella (mot-sah-REL-la) is a fresh, pulled-curd cheese from southern Italy. Buffalo Mozzarella — Mozzarella di Bufala — is made from water buffalo milk, giving it a richer, creamier flavour than cow's-milk versions. It carries DOP protected-origin status in Italy.","zh":"莫札瑞拉（mot-sah-REL-la）是義大利南部的新鮮拉絲乳酪。水牛莫札瑞拉（Mozzarella di Bufala）以水牛奶製成，風味比一般牛奶版本更濃郁細滑，在義大利享有DOP原產地保護認證。"}}],"id":"sec-1"},{"en":"Pasta and Risotto","zh":"意大利麵與燉飯","note":"","items":[{"en":"Spaghetti Bolognese","zh":"肉醬意大利麵","p":"95","tags":["notable"],"xterm":"spaghetti-bolognese","options":[],"den":"long pasta in tomato braised beef ragout","dzh":"長麵配番茄燜牛肉肉醬","explain":{"en":"Spaghetti (spah-GET-ee) are long, thin round pasta strands. Bolognese (boh-loh-NYEH-zeh) is a slow-cooked meat ragù originating from Bologna, Italy — traditionally served with tagliatelle in its home city, but globally paired with spaghetti. The sauce is built on minced meat, soffritto, wine, and tomato.","zh":"Spaghetti（spah-GET-ee）是細長的圓形義大利麵條。Bolognese（boh-loh-NYEH-zeh）是源自義大利波隆那的慢燉肉醬，在當地傳統上以寬麵（tagliatelle）搭配，但全球普遍配搭意粉。醬汁以碎肉、炒香蔬菜底、葡萄酒及番茄慢燉而成。"}},{"en":"Fettuccine Lamb Ragout","zh":"羊肉醬寬麵","p":"86","tags":["notable"],"xterm":"fettuccine-lamb-ragout","options":[],"den":"flat long pasta in braised minced lamb, thyme","dzh":"扁長麵配燜羊肉碎及百里香","explain":{"en":"Fettuccine (fet-oo-CHEE-neh) are flat, ribbon-like egg pasta from central Italy — wider than linguine, narrower than pappardelle. Ragout (ra-GOO) is the French term for a slow-braised, seasoned meat stew; it is closely related to the Italian ragù. Here the technique is applied to lamb.","zh":"Fettuccine（fet-oo-CHEE-neh）是源自義大利中部的扁平帶狀雞蛋麵，寬度介於linguine與pappardelle之間。Ragout（ra-GOO）是法語，指慢燉調味的肉類燴菜，與義大利文ragù系出同源。此菜以羊肉為主角慢燉製成。"}},{"en":"Linguine Al Pesto","zh":"青醬扁麵","p":"64","tags":["vegetarian","gluten-free","contains-nuts","notable"],"xterm":"linguine-al-pesto","options":[],"den":"long pasta in basil and pine nut sauce","dzh":"長扁麵配羅勒松子醬","explain":{"en":"Linguine (lin-GWEE-neh) means \"little tongues\" in Italian — flat, narrow pasta slightly wider than spaghetti. Pesto (PES-toh) comes from the Ligurian word for \"pounded\" and refers to Genoa's famous uncooked sauce of basil, pine nuts, Parmesan, garlic, and olive oil.","zh":"Linguine（lin-GWEE-neh）義大利文意為「小舌頭」，是略寬於意粉的扁平細麵。Pesto（PES-toh）源自利古里亞語「搗碎」之意，指熱那亞著名的羅勒松子醬，以羅勒、松子、帕瑪森乳酪、大蒜及橄欖油冷製而成。"}},{"en":"Beetroot Gnocchi","zh":"甜菜根薯疙瘩","p":"78","tags":["vegetarian","notable"],"xterm":"beetroot-gnocchi","options":[],"den":"pan-seared beetroot and potato dumpling, taleggio cream and walnut","dzh":"煎甜菜根薯疙瘩、塔雷吉歐芝士忌廉及核桃","explain":{"en":"Gnocchi (NYOH-kee) are soft Italian dumplings, classically made from potato and flour; the beetroot version adds colour and a subtle earthiness. The name comes from the Italian nocchio, meaning a knot in wood. They are typically boiled and then tossed in butter or sauce.","zh":"Gnocchi（NYOH-kee）是義大利軟糯的小麵糰，傳統以馬鈴薯和麵粉製成；加入甜菜根後顏色鮮豔並帶有淡淡的土壤香氣。名稱源自義大利語nocchio，意為木節。通常水煮後拌奶油或醬汁享用。"}},{"en":"Andaman Prawn Aglio Olio","zh":"安達曼蝦蒜油意大利麵","p":"90","tags":["gluten-free","notable"],"xterm":"andaman-prawn-aglio-olio","options":[],"den":"pasta in garlic and olive oil, and Andaman prawn","dzh":"意大利麵配蒜蓉橄欖油及安達曼大蝦","explain":{"en":"The Andaman Sea, between Thailand and the Andaman Islands, supplies large, sweet prawns prized in fine-dining. Aglio e Olio (AH-lyoh eh OH-lyoh) is Italian for \"garlic and oil\" — a Neapolitan pasta staple of just spaghetti, garlic, chilli, and good olive oil in a silky emulsion.","zh":"安達曼海位於泰國與安達曼群島之間，以出產肉質鮮甜的大蝦聞名。Aglio e Olio（AH-lyoh eh OH-lyoh）義大利文即「蒜與油」，是那不勒斯的經典素簡麵食，以意粉、大蒜、辣椒和優質橄欖油乳化成滑順醬汁。"}},{"en":"Truffle and Porcini Mushroom Risotto","zh":"松露牛肝菌燉飯","p":"72","tags":["vegetarian","gluten-free","notable"],"xterm":"truffle-and-porcini-mushroom-risotto","options":[],"den":"carnaroli rice, porcini mushroom stock, sautéed forest mushroom, truffle oil","dzh":"卡納羅利米、牛肝菌高湯、炒雜菌、松露油","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian technique of slowly stirring short-grain rice (Arborio or Carnaroli) with warm stock until creamy. Porcini (por-CHEE-nee) means \"little pigs\" in Italian — these prized wild mushrooms have an intense, meaty flavour that pairs naturally with earthy truffle.","zh":"Risotto（ree-ZOT-toh）是義大利北部的烹調技法，將短粒米（如Arborio或Carnaroli）與熱高湯慢慢拌炒至濃稠滑順。Porcini（por-CHEE-nee）義大利文意為「小豬」，此珍貴野菇風味濃郁帶肉感，與土香松露天然相配。"}},{"en":"Cheese and Prawn Risotto","zh":"芝士大蝦燉飯","p":"98","tags":["notable"],"xterm":"cheese-and-prawn-risotto","options":[],"den":"carnaroli rice in crustacean bisque, Andaman prawn, mozzarella cheese","dzh":"卡納羅利米配甲殼類濃湯、安達曼大蝦、莫扎瑞拉芝士","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian technique of slowly stirring short-grain rice with warm stock to build a naturally creamy texture — no cream needed. Finishing with cheese (typically Parmesan) adds richness and a savoury depth that complements the sweetness of prawns.","zh":"Risotto（ree-ZOT-toh）是義大利北部以短粒米慢慢拌入熱高湯的烹調技法，無需添加忌廉即可達到天然濃稠口感。最後加入乳酪（通常為帕瑪森）增添鮮鹹風味，與蝦的鮮甜形成絕佳對比。"}}],"id":"sec-2"},{"en":"Pizza","zh":"薄餅","note":"","items":[{"en":"Bufalina","zh":"水牛芝士薄餅","p":"70","tags":["vegetarian","notable"],"xterm":"bufalina","options":[],"den":"tomato, mozzarella di bufala, basil","dzh":"番茄、水牛莫扎瑞拉芝士、羅勒","explain":{"en":"Bufalina (boo-fah-LEE-nah) is an Italian diminutive of bufala (water buffalo), referring to a pizza centred on Buffalo Mozzarella — Mozzarella di Bufala — the DOP-protected cheese made from water buffalo milk. It is richer and more milky than standard cow's-milk mozzarella.","zh":"Bufalina（boo-fah-LEE-nah）是義大利語bufala（水牛）的暱稱形式，指以水牛莫札瑞拉乳酪為主角的薄餅。水牛莫札瑞拉享有義大利DOP原產地保護認證，比一般牛奶乳酪更濃郁奶香。"}},{"en":"Latteria","zh":"六款芝士薄餅","p":"98","tags":["vegetarian","notable"],"xterm":"latteria","options":[],"den":"6 cheeses: parmesan, gorgonzola, shredded mozzarella, buffalo mozzarella, smoked provolone, taleggio","dzh":"六款芝士：帕爾馬、戈爾根朱勒、碎莫扎瑞拉、水牛莫扎瑞拉、煙燻波羅伏洛、塔雷吉歐","explain":{"en":"Latteria (lat-teh-REE-ah) is Italian for \"dairy\" or \"cheese shop\" — a pizza named for its celebration of multiple cheeses. Restaurants use the term to signal a cheese-forward pizza, often layering varieties such as mozzarella, Parmesan, Gorgonzola, and others for complexity.","zh":"Latteria（lat-teh-REE-ah）義大利文意為「乳品店」或「芝士店」，以此命名的薄餅主打多種乳酪的豐富層次。通常疊放莫札瑞拉、帕瑪森、戈爾根佐拉等多款乳酪，滋味複雜濃郁。"}},{"en":"Botanica","zh":"田園時蔬薄餅","p":"80","tags":["vegetarian","notable"],"xterm":"botanica","options":[],"den":"mozzarella, grilled seasonal vegetables, fresh garden herbs","dzh":"莫扎瑞拉芝士、烤時令蔬菜、新鮮香草","explain":{"en":"'Botanica' draws from the Latin 'botanicus', relating to plants, signalling a pizza topped entirely with seasonal garden vegetables. It is a menu-naming style that evokes freshness and a nature-inspired, plant-forward philosophy. Expect a colourful selection of herbs and vegetables rather than meat.","zh":"「Botanica」源自拉丁文「botanicus」，與植物相關，暗示這是一款以當季蔬菜為主角的薄餅。這是一種菜單命名風格，傳達清新自然、以植物為主的料理理念。可期待豐富多彩的香草與蔬菜，而非肉類配料。"}},{"en":"Tartufina","zh":"松露薄餅","p":"110","tags":["notable"],"xterm":"tartufina","options":[],"den":"beef speck, shredded mozzarella, buffalo mozzarella, black truffle paste, truffle oil","dzh":"牛肉煙燻火腿、碎莫扎瑞拉、水牛莫扎瑞拉、黑松露醬、松露油","explain":{"en":"Tartufina (tar-too-FEE-nah) is an Italian diminutive of tartufo (truffle), describing a truffle-themed pizza. Truffles are prized underground fungi — black or white — with an intensely earthy, aromatic flavour. The suffix -ina gives the name an affectionate, delicate quality matching the ingredient's luxurious subtlety.","zh":"Tartufina（tar-too-FEE-nah）是義大利語tartufo（松露）的暱稱形式，指以松露為主題的薄餅。松露是生長於地下的珍貴菌類，分黑松露與白松露，氣味濃郁獨特。字尾-ina帶有親暱輕柔之意，恰好呼應這款奢華食材的細緻風格。"}},{"en":"Rustica","zh":"田舍風味薄餅","p":"98","tags":["notable"],"xterm":"rustica","options":[],"den":"roasted potato, taleggio cheese, shredded mozzarella, lamb ragout","dzh":"烤薯仔、塔雷吉歐芝士、碎莫扎瑞拉、羊肉醬","explain":{"en":"Rustica (ROOS-tee-kah) is the feminine form of the Italian adjective rustico, meaning \"rustic\" or \"country-style.\" Applied to pizza, it signals hearty, unpretentious toppings — often cured meats, roasted vegetables, or rough-textured ingredients evoking Italian farmhouse cooking.","zh":"Rustica（ROOS-tee-kah）是義大利形容詞rustico的陰性形式，意為「鄉村風格」或「質樸」。用於薄餅命名時，代表配料豐盛實在，常見醃製肉類、烤蔬菜等食材，喚起義大利農家料理的樸實風情。"}},{"en":"Frutti Di Mare","zh":"海鮮薄餅","p":"130","tags":["signature","notable"],"xterm":"frutti-di-mare","options":[],"den":"Andaman catch of the sea: prawn, mussel, squid, crabmeat, scallops, clams, seabass, lobster, mozzarella","dzh":"安達曼海鮮：大蝦、青口、魷魚、蟹肉、帶子、蜆、鱸魚、龍蝦、莫扎瑞拉芝士","explain":{"en":"Italian for \"fruits of the sea,\" this term refers to a mix of seafood — typically including prawns, mussels, clams, squid, and scallops. It appears on menus as a topping for pizza or pasta, or as a standalone seafood platter. The exact selection varies by catch and season.","zh":"義大利文意為「海之果實」，泛指多種混合海鮮，通常包括明蝦、青口、蜆、魷魚和帶子等。可作為薄餅或意粉的配料，也可以作獨立的海鮮拼盤呈現。具體食材因時令漁獲而異。"}}],"id":"sec-3"},{"en":"Main Course","zh":"主菜","note":"","items":[{"en":"Cacciucco – Seafood Stew","zh":"卡丘科海鮮燉湯","p":"188","tags":["signature","notable"],"xterm":"cacciucco","options":[],"den":"oven baked seafood soup with lobster, mussels, clams, scallops, squid","dzh":"焗爐海鮮湯配龍蝦、青口、蜆、帶子、魷魚","explain":{"en":"A rich, thick seafood stew originating from Livorno in Tuscany, Italy. It traditionally contains a wide variety of fish and shellfish cooked in a spiced tomato and red wine broth. It is typically served over slices of toasted garlic bread.","zh":"源自義大利托斯卡納利佛諾市的濃郁海鮮燉湯。傳統做法將多種魚類和貝類以加了香料的番茄紅酒湯底燉煮而成，通常搭配蒜味烤麵包片一同上桌。"}},{"en":"Zuppa di Cozze","zh":"青口番茄湯","p":"79","tags":["notable"],"xterm":"zuppa-di-cozze","options":[],"den":"black mussel in tomato, ciabatta, green oil","dzh":"黑青口配番茄湯、恰巴塔麵包、青草油","explain":{"en":"An Italian mussel soup in which fresh mussels are steamed open in a broth typically made with tomato, garlic, white wine, and herbs. The flavorful broth is a key feature of the dish. It is commonly served with crusty bread for dipping.","zh":"一道義大利青口湯，以新鮮青口在番茄、大蒜、白葡萄酒和香草熬成的湯底中烹煮至開口。湯底本身鮮美濃郁，是此菜的精髓所在。通常搭配脆皮麵包沾湯享用。"}},{"en":"Filletto di Salmone","zh":"香煎鮭魚柳","p":"132","tags":["notable"],"xterm":"filletto-di-salmone","options":[],"den":"pan seared salmon, broccoli, spring onion, chilli, bell pepper pure","dzh":"煎鮭魚柳、西蘭花、蔥、辣椒、甜椒蓉","explain":{"en":"Filletto di Salmone (fee-LET-toh dee sal-MOH-neh) is Italian for \"salmon fillet.\" Filletto (related to the French filet) refers to a boneless cut of fish or meat; salmone is salmon. The dish straightforwardly presents a pan-seared or roasted boneless salmon portion.","zh":"Filletto di Salmone（fee-LET-toh dee sal-MOH-neh）義大利文即「鮭魚柳」。Filletto與法語filet同源，指去骨的魚肉或肉排；salmone即鮭魚。此菜通常以煎或烤方式烹調去骨鮭魚。"}},{"en":"Filletto di Branzino","zh":"烤鱸魚柳","p":"102","tags":["gluten-free","notable"],"xterm":"filletto-di-branzino","options":[],"den":"roasted seabass, fresh tomato sauce, capers, kalamata olives, grilled vegetables","dzh":"烤鱸魚柳、新鮮番茄醬、酸豆、卡拉馬塔橄欖、烤時蔬","explain":{"en":"Branzino (bran-ZEE-noh) is the Italian name for European sea bass (Dicentrarchus labrax), prized in Mediterranean cuisine for its delicate, sweet white flesh. Filletto di Branzino (fee-LET-toh dee bran-ZEE-noh) means a boneless fillet of this fish, typically grilled or roasted.","zh":"Branzino（bran-ZEE-noh）是歐洲鱸魚的義大利名稱，在地中海料理中備受推崇，以其細嫩鮮甜的白肉著稱。Filletto di Branzino（fee-LET-toh dee bran-ZEE-noh）即去骨鱸魚柳，通常以烤或煎方式烹調。"}},{"en":"Galletto al Forno","zh":"烤春雞","p":"97","tags":["gluten-free","notable"],"xterm":"galletto-al-forno","options":[],"den":"spring chicken, seasonal vegetables, potato, chimichurri","dzh":"春雞、時令蔬菜、薯仔、奇米丘里醬","explain":{"en":"An Italian oven-roasted dish featuring galletto, a young small chicken (poussin) typically weighing under 500 g. The bird is seasoned with herbs, garlic, and olive oil before roasting, resulting in tender meat and crispy skin. It is often served whole or halved.","zh":"義大利烤焗料理，主角是「galletto」——一種體重通常不超過500克的幼雞（春雞）。烤前以香草、大蒜和橄欖油醃製，烤出皮脆肉嫩的效果。通常整隻或對半切開上桌。"}},{"en":"Tagliata di Manzo","zh":"切片牛肉沙律","p":"99","tags":["gluten-free","notable"],"xterm":"tagliata-di-manzo","options":[],"den":"pan seared sliced beef flank, rocket salad, cherry tomato, shaved parmesan, balsamic reduction","dzh":"煎牛腩片、火箭菜沙律、車厘茄、刨片帕爾馬芝士、香醋濃縮醬","explain":{"en":"An Italian beef dish in which a steak — typically sirloin or ribeye — is grilled to medium-rare and then sliced against the grain. The slices are arranged over rocket leaves and shaved Parmesan, drizzled with olive oil. The name means \"sliced beef\" in Italian.","zh":"義大利牛肉料理，將西冷或肋眼牛扒烤至五成熟後逆紋切片。肉片鋪放在芝麻菜和帕爾馬芝士薄片上，淋以橄欖油。名稱在義大利文中即為「切片牛肉」之意。"}}],"id":"sec-4"},{"en":"Desserts","zh":"甜點","note":"","items":[{"en":"Tropical Fruits Platter","zh":"熱帶水果拼盤","p":"44","tags":[],"xterm":"","options":[],"den":"selection of our seasonal fruits, 5 types","dzh":"精選五款時令水果"},{"en":"Tiramisu (glass)","zh":"提拉米蘇（杯裝）","p":"48","tags":["signature","notable"],"xterm":"tiramisu","options":[],"den":"layers of mascarpone cream, coffee-soaked lady fingers and a dusting of cocoa powder","dzh":"馬斯卡彭忌廉、咖啡浸手指餅乾層層疊，撒上可可粉","explain":{"en":"A beloved Italian dessert made from layers of espresso-soaked savoiardi (ladyfinger biscuits) and a creamy mixture of mascarpone cheese, eggs, and sugar, dusted with cocoa powder. Its name means \"pick me up\" in Italian, a nod to its coffee content. It is often set and served in a glass for individual portions.","zh":"深受喜愛的義大利甜點，由浸泡了濃縮咖啡的手指餅乾與馬斯卡彭芝士、雞蛋和糖製成的忌廉層層疊放，表面撒上可可粉。名稱在義大利文中意為「提振精神」，呼應其咖啡成分。杯裝版本方便個人享用。"}},{"en":"Cannoli","zh":"卡諾里","p":"45","tags":["notable"],"xterm":"cannoli","options":[],"den":"crisp and flaky cannoli shell, lusciously creamy, sweet ricotta cheese and mascarpone with decadent dark chocolate chips","dzh":"酥脆卡諾里外殼，配甜瑞可塔芝士及馬斯卡彭忌廉，加黑朱古力碎","explain":{"en":"A traditional Sicilian pastry consisting of tube-shaped fried pastry shells filled with a sweet, creamy ricotta filling, often mixed with chocolate chips, candied fruit, or pistachios. The shells are crispy while the filling is rich and smooth. The singular form is \"cannolo.\"","zh":"源自西西里島的傳統義式甜點，以炸脆的圓筒形薄酥皮為外殼，內填以瑞可達芝士為基底的甜忌廉，常混入朱古力碎、蜜餞水果或開心果。外皮香脆，餡料濃郁滑順。單數形式為「cannolo」。"}},{"en":"Almond Semifreddo","zh":"杏仁雪糕蛋糕","p":"45","tags":["contains-nuts","notable"],"xterm":"almond-semifreddo","options":[],"den":"creamy almond semifreddo, warm apple compote","dzh":"香滑杏仁半凍甜品，配溫熱蘋果醬","explain":{"en":"Semifreddo (seh-mee-FRED-doh) is Italian for 'half-cold' — a partially frozen dessert with a mousse-like texture, lighter than ice cream because air is folded in before freezing. This version is flavoured with almonds, a nut widely used in Italian sweets. It is typically sliced like a cake, hence the translation '雪糕蛋糕'.","zh":"Semifreddo（seh-mee-FRED-doh）在義大利文中意為「半冷」，是一種半冷凍甜品，因冷凍前充分打入空氣，口感如慕斯，比冰淇淋更輕盈。這個版本以杏仁調味，杏仁在義大利甜點中極為常見。通常切片享用，外形似蛋糕，故中文譯為「雪糕蛋糕」。"}},{"en":"Vanilla Panna Cotta","zh":"雲呢拿意式奶凍","p":"48","tags":["notable"],"xterm":"vanilla-panna-cotta","options":[],"den":"creamy cooked cream, mixed berries compote","dzh":"香滑煮忌廉奶凍，配雜莓醬","explain":{"en":"Panna Cotta (PAN-na KOT-ta) literally means 'cooked cream' in Italian — a silky, set dessert from Piedmont made by simmering cream with sugar and gelatin. Vanilla adds the fragrant flavour of the tropical orchid pod that has been the world's favourite dessert spice for centuries. It is one of Italy's most internationally recognised desserts.","zh":"Panna Cotta（PAN-na KOT-ta）在義大利文中字面意思為「煮熟的鮮奶油」，是源自皮埃蒙特地區的滑嫩凍甜品，以鮮奶油、糖和吉利丁煮製而成。雲呢拿（香草）來自一種熱帶蘭花的豆莢，數百年來都是全球最受歡迎的甜點香料。這也是義大利最具國際知名度的甜品之一。"}}],"id":"sec-5"},{"en":"Signature Cocktail's","zh":"招牌雞尾酒","note":"RM 50 per glass","items":[{"en":"Dannatini","zh":"丹娜提尼","p":"50","tags":["notable"],"xterm":"dannatini","options":[],"den":"white rum, espresso, cinnamon syrup","dzh":"白朗姆酒、濃縮咖啡、肉桂糖漿","explain":{"en":"Dannatini appears to be a house-original cocktail name styled after the classic '-tini' suffix, which derives from the Martini and signals a spirit-forward cocktail served in a stemmed V-shaped glass. The prefix 'Danna' is likely a proprietary or venue-specific name. Expect a chilled, elegant cocktail in the Martini family.","zh":"Dannatini 似乎是以經典「-tini」字尾命名的自創雞尾酒，這個字尾源自馬丁尼（Martini），代表以烈酒為基底、盛於V形高腳杯的精緻雞尾酒。前綴「Danna」可能是品牌或場地專屬名稱。預期是一款冰涼優雅、馬丁尼風格的調酒。"}},{"en":"Terrace Spritz","zh":"露台氣泡雞尾酒","p":"50","tags":["notable"],"xterm":"terrace-spritz","options":[],"den":"homemade limoncello, prosecco, soda water","dzh":"自製檸檬甜酒、普羅賽克氣泡酒、梳打水","explain":{"en":"A Spritz (SHPRITS) is a light, bubbly Italian aperitif traditionally made with Prosecco, a bitter liqueur (commonly Aperol or Campari), and a splash of soda. The name comes from the German/Austrian 'spritzen', meaning to splash, reflecting its Venetian-Austrian roots. 'Terrace' here is a venue descriptor, evoking outdoor, leisurely sipping.","zh":"Spritz（SHPRITS）是一款清爽起泡的義大利餐前酒，傳統上以普羅塞克氣泡酒、苦味利口酒（常見如Aperol或Campari）加少量蘇打水調製。名稱源自德語/奧地利語「spritzen」，意為「噴濺」，反映其威尼斯與奧地利的文化根源。「Terrace（露台）」為場地描述，帶出戶外悠閒飲酒的意境。"}}],"id":"sec-6"},{"en":"Signature Mocktail's","zh":"招牌無酒精特飲","note":"RM 40 per glass","items":[{"en":"Danna Ice Tea","zh":"丹娜冰茶","p":"40","tags":[],"xterm":"","options":[],"den":"coconut syrup, orgeat syrup, passion fruit syrup, black tea","dzh":"椰子糖漿、杏仁糖漿、百香果糖漿、紅茶"},{"en":"Peach Spritz","zh":"蜜桃氣泡飲","p":"40","tags":[],"xterm":"","options":[],"den":"peach puree, grenadine syrup, lime, soda water","dzh":"蜜桃蓉、石榴糖漿、青檸、梳打水"}],"id":"sec-7"},{"en":"Sparkling Wine Cocktail / 氣泡酒雞尾酒","zh":"氣泡酒雞尾酒","note":"45 RM per glass","items":[{"en":"French 75","zh":"法式75號","p":"45","tags":["notable"],"xterm":"french-75","options":[],"den":"Gin, lemon juice, sparkling wine","dzh":"琴酒、檸檬汁、氣泡酒","explain":{"en":"The French 75 is a cocktail of gin (or cognac), lemon juice, sugar, and champagne. It was named after the French 75mm field gun used in World War I — the drink's kick was said to feel like being hit by that artillery. It was popularised at Harry's New York Bar in Paris around 1915.","zh":"法式75號是以琴酒（或干邑）、檸檬汁、糖及香檳調製的雞尾酒，以一戰時法軍使用的75毫米野戰炮命名——據說此酒的後勁有如被炮擊中一般。約於1915年在巴黎的Harry's New York Bar廣為流傳。"}},{"en":"Bellini","zh":"貝里尼","p":"45","tags":["notable"],"xterm":"bellini","options":[],"den":"Peach purée, prosecco","dzh":"水蜜桃果泥、普羅賽克氣泡酒","explain":{"en":"The Bellini (bel-LEE-nee) is a cocktail of white peach purée and prosecco, created around 1948 by Giuseppe Cipriani at Harry's Bar in Venice. He named it after the Venetian Renaissance painter Giovanni Bellini, whose artwork inspired the drink's delicate pink-gold hue.","zh":"貝里尼（bel-LEE-nee）以白桃果泥與prosecco氣泡酒調製，約於1948年由威尼斯Harry's Bar的Giuseppe Cipriani創作。他以文藝復興時期威尼斯畫家喬凡尼·貝里尼命名，因畫作色調令他聯想到這款酒的淡粉金色澤。"}},{"en":"Mimosa","zh":"含羞草","p":"45","tags":[],"xterm":"","options":[],"den":"Fresh orange juice, prosecco","dzh":"新鮮橙汁、普羅賽克氣泡酒"},{"en":"Kir Royal","zh":"皇家基爾","p":"45","tags":["notable"],"xterm":"kir-royal","options":[],"den":"Crème de cassis, prosecco","dzh":"黑醋栗利口酒、普羅賽克氣泡酒","explain":{"en":"A classic French aperitif made by combining crème de cassis (blackcurrant liqueur) with Champagne. It is a more prestigious variation of the original Kir, which uses still white wine instead. The drink is pale pink to deep red in colour with a fruity, slightly sweet taste.","zh":"經典法式開胃酒，以黑加侖子甜酒（crème de cassis）加入香檳調製而成。此酒是原版Kir（以靜白葡萄酒代替香檳）的升級版。色澤呈淡粉紅至深紅色，口感果香帶微甜。"}}],"id":"sec-8"},{"en":"Martini's / 馬丁尼","zh":"馬丁尼","note":"45 RM per glass","items":[{"en":"Cosmopolitan","zh":"柯夢波丹","p":"45","tags":["notable"],"xterm":"cosmopolitan","options":[],"den":"Vodka, triple sec, cranberry juice, lime juice","dzh":"伏特加、橙皮酒、蔓越莓汁、青檸汁","explain":{"en":"The Cosmopolitan is a sleek American cocktail popularised in the 1990s, made with vodka, triple sec, cranberry juice, and fresh lime. Its name evokes a sophisticated, worldly style — 'cosmopolitan' meaning 'citizen of the world'. It became a cultural icon largely through the TV series 'Sex and the City'.","zh":"柯夢波丹是一款精緻的美式雞尾酒，於1990年代廣泛流行，以伏特加、橙味利口酒、蔓越莓汁及新鮮萊姆調製而成。其名稱意指「世界公民」，帶有時髦、國際化的風格聯想。這款酒因美劇《慾望城市》而成為流行文化符號。"}},{"en":"Manhattan","zh":"曼哈頓","p":"45","tags":["notable"],"xterm":"manhattan","options":[],"den":"Canadian Club, sweet vermouth, Angostura bitters","dzh":"加拿大俱樂部威士忌、甜苦艾酒、安格仕苦精","explain":{"en":"The Manhattan is a stately American classic made with rye or bourbon whiskey, sweet vermouth, and Angostura bitters, garnished with a cherry. It is named after Manhattan, New York, where it is said to have been created in the 1870s. One of the original 'cocktail' recipes, it set the template for stirred, spirit-forward drinks.","zh":"曼哈頓是一款莊重的美式經典雞尾酒，以黑麥或波本威士忌、甜苦艾酒及安格仕苦精調製，以一顆櫻桃點綴。相傳於1870年代誕生於紐約曼哈頓，是最早期的「雞尾酒」之一，奠定了攪拌型烈酒調酒的基礎。"}},{"en":"Espresso Martini","zh":"濃縮咖啡馬丁尼","p":"45","tags":["notable"],"xterm":"espresso-martini","options":[],"den":"Vodka, Kahlúa, espresso, sugar syrup","dzh":"伏特加、卡魯哇咖啡酒、濃縮咖啡、糖漿","explain":{"en":"Created by London bartender Dick Bradsell in 1983, the Espresso Martini combines freshly pulled espresso, vodka, coffee liqueur (usually Kahlúa), and sugar syrup — shaken hard to produce its signature dense foam. Despite the name, it contains no gin and is technically a cocktail, not a martini.","zh":"濃縮咖啡馬天尼由倫敦調酒師Dick Bradsell於1983年創作，以新鮮濃縮咖啡、伏特加、咖啡利口酒（通常為Kahlúa）及糖漿用力搖盪，形成招牌細密泡沫。儘管名為馬天尼，實際不含琴酒，嚴格來說是一款雞尾酒。"}},{"en":"Dry Martini","zh":"乾馬丁尼","p":"45","tags":["notable"],"xterm":"dry-martini","options":[],"den":"Gin, dry vermouth","dzh":"琴酒、乾苦艾酒","explain":{"en":"A Dry Martini is a gin-and-vermouth cocktail where 'dry' means very little dry vermouth is used, resulting in a sharper, more spirit-forward drink. Served ice-cold in a stemmed glass with an olive or lemon twist, it is perhaps the most iconic of all cocktails. Its exact origins are debated, but it rose to prominence in the late 19th-century United States.","zh":"乾馬丁尼是以琴酒為基底的調酒，「乾（dry）」指只加入極少量乾苦艾酒，成品口感更為強烈純粹。以冰鎮V形高腳杯盛裝，搭配橄欖或檸檬皮，是最具代表性的雞尾酒之一。其起源眾說紛紜，但在19世紀末的美國廣為流行。"}}],"id":"sec-9"},{"en":"Classic Cocktail / 經典雞尾酒","zh":"經典雞尾酒","note":"45 RM per glass","items":[{"en":"Orange Spritzz","zh":"橙味氣泡雞尾酒","p":"45","tags":[],"xterm":"","options":[],"den":"Le Favori, prosecco, soda water","dzh":"Le Favori橙酒、普羅賽克氣泡酒、梳打水"},{"en":"Daiquiri","zh":"黛克瑞","p":"45","tags":["notable"],"xterm":"daiquiri","options":[],"den":"Light rum, triple sec, lime juice, simple syrup","dzh":"淡蘭姆酒、橙皮酒、青檸汁、糖漿","explain":{"en":"Daiquiri (DAK-uh-ree) is a Cuban cocktail of white rum, fresh lime juice, and sugar — simple, bright, and refreshing. It takes its name from Daiquirí, a small mining town in eastern Cuba near Santiago, where American engineers reportedly mixed local rum with lime around 1900.","zh":"Daiquiri（DAK-uh-ree）是古巴雞尾酒，以白蘭姆酒、新鮮青檸汁及糖調製，清爽簡潔。名稱來自古巴東部聖地牙哥附近的小礦業小鎮Daiquirí，據說美國工程師約於1900年在當地以蘭姆酒和青檸調製而成。"}},{"en":"Whiskey Sour","zh":"威士忌酸酒","p":"45","tags":[],"xterm":"","options":[],"den":"Whiskey, lime juice, simple syrup","dzh":"威士忌、青檸汁、糖漿"},{"en":"Old Fashion","zh":"古典雞尾酒","p":"45","tags":["notable"],"xterm":"old-fashioned","options":[],"den":"Whiskey, brown sugar, Angostura bitters","dzh":"威士忌、黃砂糖、安格仕苦精","explain":{"en":"One of the oldest and most iconic cocktails, made by muddling a sugar cube with aromatic bitters, then adding whiskey (typically bourbon or rye) and a large ice cube. It is garnished with an orange peel and sometimes a cherry. It is spirit-forward, strong, and subtly sweet.","zh":"最古老、最具代表性的雞尾酒之一，將方糖與芳香苦精搗勻，加入威士忌（通常為波本或黑麥威士忌）和大冰塊調製而成。以橙皮裝飾，有時加入車厘子。酒味突出，酒體強勁，帶微甜。"}},{"en":"Piña Colada","zh":"鳳梨可樂達","p":"45","tags":["notable"],"xterm":"pina-colada","options":[],"den":"White rum, Malibu, coconut cream, pineapple juice","dzh":"白蘭姆酒、馬利寶椰子酒、椰漿、鳳梨汁","explain":{"en":"Piña Colada (PEEN-yah koh-LAH-dah) means \"strained pineapple\" in Spanish. This Puerto Rican cocktail blends white rum, coconut cream, and pineapple juice; it was declared Puerto Rico's national drink in 1978. The Caribe Hilton in San Juan claims its 1954 invention.","zh":"Piña Colada（PEEN-yah koh-LAH-dah）西班牙語意為「過濾的鳳梨」。這款波多黎各雞尾酒以白蘭姆酒、椰漿及鳳梨汁調製，於1978年被列為波多黎各國家飲品。聖胡安的加勒比希爾頓酒店宣稱於1954年發明此酒。"}},{"en":"Margarita","zh":"瑪格麗特","p":"45","tags":["notable"],"xterm":"margarita","options":[],"den":"Tequila, triple sec, lime juice, simple syrup","dzh":"龍舌蘭、橙皮酒、青檸汁、糖漿","explain":{"en":"The Margarita is Mexico's most famous cocktail export — tequila, triple sec, and fresh lime juice, served in a salt-rimmed glass. 'Margarita' is the Spanish word for daisy, and the cocktail belongs to a family of 'Daisy' sours that were popular in the early 20th century. Its origin stories are numerous and colourful, all set along the US–Mexico border.","zh":"瑪格麗特是墨西哥最具代表性的出口雞尾酒，以龍舌蘭、橙味利口酒及新鮮萊姆汁調製，盛於鹽口杯中。「Margarita」在西班牙文中意為「雛菊」，屬於20世紀初流行的「Daisy」酸味雞尾酒家族。關於其起源有多個傳說，故事背景皆位於美墨邊境一帶。"}},{"en":"Negroni","zh":"尼格羅尼","p":"45","tags":["notable"],"xterm":"negroni","options":[],"den":"Gin, Campari, sweet vermouth","dzh":"琴酒、金巴利、甜苦艾酒","explain":{"en":"A classic Italian cocktail made in equal parts of gin, sweet vermouth, and Campari, stirred over ice and garnished with an orange slice or peel. It is bittersweet, aromatic, and spirit-forward. It was reportedly invented in Florence in 1919.","zh":"經典義大利雞尾酒，以等份琴酒、甜苦艾酒和金巴利攪拌加冰調製，以橙片或橙皮裝飾。口感甘苦交融，香氣馥郁，酒味鮮明。據說源於1919年的佛羅倫斯。"}},{"en":"Mojito","zh":"莫希托","p":"45","tags":["notable"],"xterm":"mojito","options":[],"den":"Light rum, brown sugar, mint leaf, soda water","dzh":"淡蘭姆酒、黃砂糖、薄荷葉、梳打水","explain":{"en":"A Mojito is a classic Cuban cocktail made with white rum, fresh lime juice, sugar, mint leaves, and soda water. The ingredients are muddled and mixed to create a refreshing, sweet-sour drink with a bright minty aroma. Non-alcoholic (mocktail) versions are also widely available.","zh":"莫吉托是古巴經典雞尾酒，以白冧酒、鮮青檸汁、砂糖、新鮮薄荷葉及梳打水調製而成。各種材料混合搗勻後，呈現清新的甜酸口感及濃郁薄荷香氣。無酒精版本（mocktail）同樣十分普遍。"}}],"id":"sec-10"},{"en":"Mocktails / 無酒精飲品","zh":"無酒精飲品","note":"35 RM per glass","items":[{"en":"Mango Lassi","zh":"芒果拉西","p":"35","tags":["notable"],"xterm":"mango-lassi","options":[],"den":"Yoghurt, mango purée, mango juice","dzh":"乳酪、芒果果泥、芒果汁","explain":{"en":"A popular South Asian chilled drink blending yogurt with mango pulp, sugar, and sometimes cardamom or rose water. It is thick, creamy, and refreshing, often enjoyed as a cooling counterpart to spicy food. Lassi is the general term for the yogurt-based drink category.","zh":"廣受歡迎的南亞冷飲，以乳酪與芒果果肉、糖調勻而成，有時加入荳蔻或玫瑰水。口感濃稠滑順、清爽怡人，常作為辛辣菜餚的清口飲品。「拉西」泛指此類以乳酪為基底的飲品。"}},{"en":"Fruit Mocktail","zh":"水果莫克泰","p":"35","tags":[],"xterm":"","options":[],"den":"Orange juice, grapefruit juice, banana purée, pineapple juice, lime juice","dzh":"橙汁、葡萄柚汁、香蕉果泥、鳳梨汁、青檸汁"},{"en":"Virgin Piña Colada","zh":"無酒精鳳梨可樂達","p":"35","tags":[],"xterm":"","options":[],"den":"Pineapple juice, coconut cream","dzh":"鳳梨汁、椰漿"},{"en":"Fruit Punch","zh":"水果賓治","p":"35","tags":[],"xterm":"","options":[],"den":"Mango juice, pineapple juice, orange juice, lime juice, grenadine syrup","dzh":"芒果汁、鳳梨汁、橙汁、青檸汁、石榴糖漿"},{"en":"Summer Delight","zh":"夏日清爽","p":"35","tags":[],"xterm":"","options":[],"den":"Orange juice, mango juice, strawberry purée, lime juice, Sprite","dzh":"橙汁、芒果汁、草莓果泥、青檸汁、雪碧"},{"en":"Virgin Mojito","zh":"無酒精莫希托","p":"35","tags":[],"xterm":"","options":[],"den":"Mint leaf, lime juice, brown sugar, soda water","dzh":"薄荷葉、青檸汁、黃砂糖、梳打水"}],"id":"sec-11"},{"en":"Draught / 生啤","zh":"生啤","note":"","items":[{"en":"Carlsberg 330 ml","zh":"嘉士伯生啤 330毫升","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carlsberg 500 ml","zh":"嘉士伯生啤 500毫升","p":"40","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-12"},{"en":"Beer of the World / 世界啤酒","zh":"世界啤酒","note":"","items":[{"en":"Carlsberg | Denmark","zh":"嘉士伯｜丹麥","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Tiger | Singapore","zh":"虎牌啤酒｜新加坡","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Heineken | Netherland","zh":"喜力啤酒｜荷蘭","p":"32","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Singha | Thailand","zh":"勝獅啤酒｜泰國","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-13"},{"en":"Aperitif / 餐前酒","zh":"餐前酒","note":"33 RM per glass","items":[{"en":"Campari","zh":"金巴利","p":"33","tags":["notable"],"xterm":"campari","options":[],"den":"","dzh":"","explain":{"en":"Campari (kam-PAH-ree) is a vivid crimson Italian bitter liqueur made from a secret blend of herbs, spices, and fruit peels, invented by Gaspare Campari in Milan in 1860. Its striking colour and bittersweet flavour make it a cornerstone of Italian aperitivo culture, famously used in the Negroni and Spritz. The exact recipe remains a closely guarded secret.","zh":"金巴利（kam-PAH-ree）是一款色澤鮮紅的義大利苦味利口酒，由Gaspare Campari於1860年在米蘭以秘密草本、香料及果皮配方創製。其鮮豔色彩與苦甜風味是義大利餐前酒文化的核心，亦是Negroni和Spritz的靈魂材料。至今確切配方仍是嚴密保守的商業機密。"}},{"en":"Pimm's No.1","zh":"品氏一號","p":"33","tags":["notable"],"xterm":"pimms","options":[],"den":"","dzh":"","explain":{"en":"Pimm's No.1 is a British gin-based fruit liqueur invented by London oyster bar owner James Pimm in the 1840s as a digestif. It is quintessentially served as 'Pimm's Cup' — lengthened with lemonade or ginger ale and loaded with cucumber, strawberries, and mint. It is inseparably linked to English summer events like Wimbledon and garden parties.","zh":"品氏一號是以琴酒為基底的英國果味利口酒，由倫敦牡蠣吧老闆James Pimm於1840年代作為餐後酒創製。最經典的喝法是「Pimm's Cup」——加入檸檬水或薑汁汽水，並放入黃瓜、草莓及薄荷。這款酒與溫布頓網球賽、英式花園派對等夏日活動密不可分。"}},{"en":"Martini Dry","zh":"乾馬丁尼苦艾酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Martini Bianco","zh":"白馬丁尼苦艾酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Martini Rosso","zh":"紅馬丁尼苦艾酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Pernod","zh":"保樂茴香酒","p":"33","tags":["notable"],"xterm":"pernod","options":[],"den":"","dzh":"","explain":{"en":"Pernod (pair-NOH) is a French anise-flavoured liqueur, a direct descendant of the original absinthe tradition, reformulated without wormwood after absinthe bans in the early 20th century. It turns cloudy white when water is added — a phenomenon called the 'louche' effect. Pernod is the cornerstone of classic French café culture in the south of France.","zh":"保樂（pair-NOH）是法國茴香風味利口酒，直接傳承自苦艾酒（absinthe）的製作傳統，在20世紀初苦艾酒被禁後去除了苦艾成分重新配製。加水時會變成乳白色，此現象稱為「louche（乳化）效應」。保樂是法國南部經典咖啡館文化不可或缺的一部分。"}}],"id":"sec-14"},{"en":"Vodka / 伏特加","zh":"伏特加","note":"","items":[{"en":"Stolichnaya","zh":"蘇托力伏特加","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Smirnoff","zh":"皇冠伏特加","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Absolut","zh":"絕對伏特加","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Russian Standard","zh":"俄羅斯標準伏特加","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Grey Goose","zh":"灰雁伏特加","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Belvedere","zh":"貝爾維德伏特加","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-15"},{"en":"Gin / 琴酒","zh":"琴酒","note":"","items":[{"en":"Gordon's","zh":"Gordon's 琴酒","p":"","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Beefeater","zh":"Beefeater 琴酒","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bombay Sapphire","zh":"Bombay Sapphire 琴酒","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Tanqueray 10","zh":"Tanqueray 10 琴酒","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Hendrick's","zh":"Hendrick's 琴酒","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Monkey 47","zh":"Monkey 47 琴酒","p":"45","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-16"},{"en":"Rum / 冧酒","zh":"冧酒","note":"","items":[{"en":"Cachaca","zh":"Cachaca 甘蔗酒","p":"","tags":["notable"],"xterm":"cachaca","options":[],"den":"","dzh":"","explain":{"en":"Cachaça (ka-SHA-sa) is Brazil's national spirit, distilled directly from fresh sugarcane juice rather than molasses, giving it a grassy, funky freshness that sets it apart from rum. It is the essential base of the Caipirinha cocktail. Most cachaça is unaged and bottled clear, though barrel-aged expressions develop richer, woodier notes.","zh":"卡夏莎（ka-SHA-sa）是巴西的國民烈酒，直接以新鮮甘蔗汁蒸餾而成，而非以糖蜜為原料，因此帶有清新的草本與發酵香氣，風味有別於蘭姆酒。它是經典調酒卡比利亞（Caipirinha）不可或缺的基酒。多數卡夏莎未經桶陳，呈透明清澈，但經橡木桶熟成的款式則帶有更豐富的木質層次。"}},{"en":"Bacardi Light","zh":"Bacardi 白冧酒","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bacardi Gold","zh":"Bacardi 金冧酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Captain Morgan Black Label","zh":"Captain Morgan 黑標冧酒","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Captain Morgan Spice","zh":"Captain Morgan 香料冧酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Myers's","zh":"Myers's 冧酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Malibu","zh":"Malibu 椰子冧酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-17"},{"en":"Tequila / 龍舌蘭","zh":"龍舌蘭","note":"","items":[{"en":"Camino","zh":"Camino 龍舌蘭","p":"","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Jose Cuervo Gold","zh":"Jose Cuervo 金龍舌蘭","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Patron Silver","zh":"Patron 銀龍舌蘭","p":"44","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Patron Añejo","zh":"Patron 陳年龍舌蘭","p":"44","tags":["notable"],"xterm":"patron-anejo","options":[],"den":"","dzh":"","explain":{"en":"Patrón is a premium Mexican tequila brand, and Añejo (ahn-YEH-hoh) is Spanish for 'aged' — by law, Añejo tequila must be barrel-aged for a minimum of one year, which gives it a smoother, richer, more complex flavour than younger expressions. Made from 100% blue agave plants, Patrón Añejo is often sipped neat like a fine whisky.","zh":"Patrón 是墨西哥高端龍舌蘭品牌，Añejo（ahn-YEH-hoh）在西班牙文中意為「陳年」——依法規，Añejo 龍舌蘭需在橡木桶中陳放至少一年，賦予其比年輕版本更柔順、豐富而複雜的風味。Patrón Añejo以100%藍色龍舌蘭草製成，常像優質威士忌般純飲品鑑。"}}],"id":"sec-18"},{"en":"Whiskey Collections / 威士忌系列","zh":"威士忌系列","note":"","items":[{"en":"Glenfiddich 12 yr","zh":"格蘭菲迪 12年單一麥芽威士忌","p":"33","tags":["notable"],"xterm":"glenfiddich","options":[],"den":"Single Malt","dzh":"單一麥芽","explain":{"en":"Glenfiddich (glen-FID-ikh) is Gaelic for 'Valley of the Deer', reflecting its home in Speyside, Scotland. As the world's best-selling single malt Scotch whisky, it pioneered the category globally. The 12-year expression is matured in American oak and European sherry casks, offering a fruity, light, approachable style that introduced millions to single malt.","zh":"格蘭菲迪（glen-FID-ikh）在蓋爾語中意為「鹿的山谷」，呼應其位於蘇格蘭斯佩賽德的產地。作為全球最暢銷的單一麥芽蘇格蘭威士忌，它開創了這一品類的國際知名度。12年款在美國橡木桶與歐洲雪利桶中熟成，風格果香清新、平易近人，是許多人接觸單一麥芽威士忌的入門之選。"}},{"en":"Glenfiddich 18 yr","zh":"格蘭菲迪 18年單一麥芽威士忌","p":"56","tags":["notable"],"xterm":"glenfiddich","options":[],"den":"Single Malt","dzh":"單一麥芽","explain":{"en":"Glenfiddich (glen-FID-ikh) is Gaelic for 'Valley of the Deer', reflecting its home in Speyside, Scotland. As the world's best-selling single malt Scotch whisky, it pioneered the category globally. The 12-year expression is matured in American oak and European sherry casks, offering a fruity, light, approachable style that introduced millions to single malt.","zh":"格蘭菲迪（glen-FID-ikh）在蓋爾語中意為「鹿的山谷」，呼應其位於蘇格蘭斯佩賽德的產地。作為全球最暢銷的單一麥芽蘇格蘭威士忌，它開創了這一品類的國際知名度。12年款在美國橡木桶與歐洲雪利桶中熟成，風格果香清新、平易近人，是許多人接觸單一麥芽威士忌的入門之選。"}},{"en":"Glenlivet 12 yr","zh":"格蘭利威 12年單一麥芽威士忌","p":"33","tags":["notable"],"xterm":"glenlivet","options":[],"den":"Single Malt","dzh":"單一麥芽","explain":{"en":"The Glenlivet (glen-LIV-et) takes its name from the Livet river valley in Speyside, Scotland. Founded in 1824, it was the first distillery to be legally licensed under the Scotch Whisky Excise Act, ending illicit distilling in the Highlands. The 12-year is known for its smooth, floral, and honeyed character — a benchmark Speyside style.","zh":"格蘭利威（glen-LIV-et）以蘇格蘭斯佩賽德的利威河谷命名。創建於1824年，是依據《蘇格蘭威士忌消費稅法》首家合法取得執照的蒸餾廠，終結了高地的私釀時代。12年款以柔順、花香及蜂蜜風味著稱，是斯佩賽德風格的標竿之作。"}},{"en":"Glenlivet 15 yr","zh":"格蘭利威 15年單一麥芽威士忌","p":"45","tags":["notable"],"xterm":"glenlivet","options":[],"den":"Single Malt","dzh":"單一麥芽","explain":{"en":"The Glenlivet (glen-LIV-et) takes its name from the Livet river valley in Speyside, Scotland. Founded in 1824, it was the first distillery to be legally licensed under the Scotch Whisky Excise Act, ending illicit distilling in the Highlands. The 12-year is known for its smooth, floral, and honeyed character — a benchmark Speyside style.","zh":"格蘭利威（glen-LIV-et）以蘇格蘭斯佩賽德的利威河谷命名。創建於1824年，是依據《蘇格蘭威士忌消費稅法》首家合法取得執照的蒸餾廠，終結了高地的私釀時代。12年款以柔順、花香及蜂蜜風味著稱，是斯佩賽德風格的標竿之作。"}},{"en":"The Dalmore Cigar Malt","zh":"大摩雪茄麥芽威士忌","p":"64","tags":["notable"],"xterm":"dalmore-cigar-malt","options":[],"den":"Single Malt","dzh":"單一麥芽","explain":{"en":"The Dalmore (dal-MORE) is a Highland single malt Scotch whisky from the Cromarty Firth in northern Scotland, known for using rare sherry casks. The 'Cigar Malt' expression was specifically crafted to complement a fine cigar — rich, sweet, and robust with notes of dark chocolate and orange, making it a pairing partner rather than just a drink.","zh":"大摩（dal-MORE）是來自蘇格蘭北部克羅馬蒂灣的高地單一麥芽威士忌，以使用珍稀雪利桶著稱。「雪茄麥芽」這款專為搭配上等雪茄而調配——口感濃郁甜潤，帶有黑巧克力與橙香，設計定位是「雪茄伴侶」，而非單純飲品。"}},{"en":"Suntory Special Blend","zh":"三得利特調威士忌","p":"37","tags":["notable"],"xterm":"suntory","options":[],"den":"Japanese","dzh":"日本威士忌","explain":{"en":"Suntory (sun-TOH-ree) is Japan's pioneering whisky company, founded by Shinjiro Torii in 1899. Its Special Blend is a blend of Japanese grain and malt whiskies, designed to be approachable and versatile — especially enjoyable as a highball (whisky and soda). Japanese whisky follows Scotch techniques but expresses a distinctly lighter, more delicate Japanese character.","zh":"三得利（sun-TOH-ree）是日本開創性的威士忌公司，由鳥井信治郎於1899年創立。其特調威士忌是日本穀物威士忌與麥芽威士忌的調和款，設計上平易近人且用途廣泛，尤其適合以「Highball」（威士忌加蘇打水）方式享用。日本威士忌師承蘇格蘭技術，卻呈現出獨特的清雅細緻日式風格。"}},{"en":"Canadian Cl 芽威士忌的調和款，設計上平易近人且用途廣泛，尤其適合以「Highball」（威士忌加蘇打水）方式享用。日本威士忌師承蘇格蘭技術，卻呈現出獨特的清雅細緻日式風格。"}}],"id":"sec-24"},{"en":"Canadian / 加拿大威士忌","zh":"加拿大威士忌","note":"","items":[{"en":"Canadian Club 10 yr","zh":"加拿大會所10年","p":"33","tags":["notable"],"xterm":"canadian-club","options":[],"den":"","dzh":"","explain":{"en":"Canadian Club is one of Canada's most iconic whisky brands, distilled since 1858 in Windsor, Ontario. Canadian whisky is typically blended and known for being lighter and smoother than Scotch or American styles, often made with a high proportion of corn and rye. The 10-year expression is aged for a decade, adding depth and a gentle spiciness.","zh":"加拿大會所是加拿大最具代表性的威士忌品牌之一，自1858年起在安大略省溫莎市蒸餾生產。加拿大威士忌通常為調和款，以比蘇格蘭或美國風格更清淡柔順著稱，多以高比例玉米及黑麥製成。10年款經過十年陳放，增添了層次感與溫和的辛香。"}}],"id":"sec-25"},{"en":"Single Malt / 單一麥芽威士忌","zh":"單一麥芽威士忌","note":"","items":[{"en":"Glenfiddich 12 yr","zh":"格蘭菲迪12年","p":"33","tags":["notable"],"xterm":"glenfiddich","options":[],"den":"","dzh":"","explain":{"en":"Glenfiddich (glen-FID-ikh) is Gaelic for 'Valley of the Deer', reflecting its home in Speyside, Scotland. As the world's best-selling single malt Scotch whisky, it pioneered the category globally. The 12-year expression is matured in American oak and European sherry casks, offering a fruity, light, approachable style that introduced millions to single malt.","zh":"格蘭菲迪（glen-FID-ikh）在蓋爾語中意為「鹿的山谷」，呼應其位於蘇格蘭斯佩賽德的產地。作為全球最暢銷的單一麥芽蘇格蘭威士忌，它開創了這一品類的國際知名度。12年款在美國橡木桶與歐洲雪利桶中熟成，風格果香清新、平易近人，是許多人接觸單一麥芽威士忌的入門之選。"}},{"en":"Glenfiddich 18 yr","zh":"格蘭菲迪18年","p":"56","tags":["notable"],"xterm":"glenfiddich","options":[],"den":"","dzh":"","explain":{"en":"Glenfiddich (glen-FID-ikh) is Gaelic for 'Valley of the Deer', reflecting its home in Speyside, Scotland. As the world's best-selling single malt Scotch whisky, it pioneered the category globally. The 12-year expression is matured in American oak and European sherry casks, offering a fruity, light, approachable style that introduced millions to single malt.","zh":"格蘭菲迪（glen-FID-ikh）在蓋爾語中意為「鹿的山谷」，呼應其位於蘇格蘭斯佩賽德的產地。作為全球最暢銷的單一麥芽蘇格蘭威士忌，它開創了這一品類的國際知名度。12年款在美國橡木桶與歐洲雪利桶中熟成，風格果香清新、平易近人，是許多人接觸單一麥芽威士忌的入門之選。"}},{"en":"Glenlivet 12 yr","zh":"格蘭利威12年","p":"33","tags":["notable"],"xterm":"glenlivet","options":[],"den":"","dzh":"","explain":{"en":"The Glenlivet (glen-LIV-et) takes its name from the Livet river valley in Speyside, Scotland. Founded in 1824, it was the first distillery to be legally licensed under the Scotch Whisky Excise Act, ending illicit distilling in the Highlands. The 12-year is known for its smooth, floral, and honeyed character — a benchmark Speyside style.","zh":"格蘭利威（glen-LIV-et）以蘇格蘭斯佩賽德的利威河谷命名。創建於1824年，是依據《蘇格蘭威士忌消費稅法》首家合法取得執照的蒸餾廠，終結了高地的私釀時代。12年款以柔順、花香及蜂蜜風味著稱，是斯佩賽德風格的標竿之作。"}},{"en":"Glenlivet 15 yr","zh":"格蘭利威15年","p":"45","tags":["notable"],"xterm":"glenlivet","options":[],"den":"","dzh":"","explain":{"en":"The Glenlivet (glen-LIV-et) takes its name from the Livet river valley in Speyside, Scotland. Founded in 1824, it was the first distillery to be legally licensed under the Scotch Whisky Excise Act, ending illicit distilling in the Highlands. The 12-year is known for its smooth, floral, and honeyed character — a benchmark Speyside style.","zh":"格蘭利威（glen-LIV-et）以蘇格蘭斯佩賽德的利威河谷命名。創建於1824年，是依據《蘇格蘭威士忌消費稅法》首家合法取得執照的蒸餾廠，終結了高地的私釀時代。12年款以柔順、花香及蜂蜜風味著稱，是斯佩賽德風格的標竿之作。"}},{"en":"The Dalmore Cigar Malt","zh":"大摩雪茄麥芽","p":"64","tags":["notable"],"xterm":"dalmore-cigar-malt","options":[],"den":"","dzh":"","explain":{"en":"The Dalmore (dal-MORE) is a Highland single malt Scotch whisky from the Cromarty Firth in northern Scotland, known for using rare sherry casks. The 'Cigar Malt' expression was specifically crafted to complement a fine cigar — rich, sweet, and robust with notes of dark chocolate and orange, making it a pairing partner rather than just a drink.","zh":"大摩（dal-MORE）是來自蘇格蘭北部克羅馬蒂灣的高地單一麥芽威士忌，以使用珍稀雪利桶著稱。「雪茄麥芽」這款專為搭配上等雪茄而調配——口感濃郁甜潤，帶有黑巧克力與橙香，設計定位是「雪茄伴侶」，而非單純飲品。"}}],"id":"sec-26"},{"en":"Cognac / 干邑白蘭地","zh":"干邑白蘭地","note":"","items":[{"en":"Remy Martin VSOP","zh":"人頭馬VSOP","p":"33","tags":["notable"],"xterm":"cognac","options":[],"den":"","dzh":"","explain":{"en":"Cognac (KON-yak) is a protected French brandy from the Cognac region, double-distilled in copper pot stills and aged in French oak. VSOP stands for 'Very Superior Old Pale', a classification requiring a minimum of four years' ageing. Rémy Martin is notable for using only grapes from the two finest sub-regions: Grande and Petite Champagne.","zh":"干邑（KON-yak）是法國干邑地區受法定保護的白蘭地，需以銅製蒸餾器雙重蒸餾後在法國橡木桶中陳放。VSOP代表「Very Superior Old Pale（特優老淡色）」，法定陳放年份最少四年。人頭馬的特色在於只採用最頂級的兩個子產區——大香檳區與小香檳區的葡萄。"}},{"en":"Remy Martin XO","zh":"人頭馬XO","p":"56","tags":["notable"],"xterm":"cognac","options":[],"den":"","dzh":"","explain":{"en":"Cognac (KON-yak) is a protected French brandy from the Cognac region, double-distilled in copper pot stills and aged in French oak. VSOP stands for 'Very Superior Old Pale', a classification requiring a minimum of four years' ageing. Rémy Martin is notable for using only grapes from the two finest sub-regions: Grande and Petite Champagne.","zh":"干邑（KON-yak）是法國干邑地區受法定保護的白蘭地，需以銅製蒸餾器雙重蒸餾後在法國橡木桶中陳放。VSOP代表「Very Superior Old Pale（特優老淡色）」，法定陳放年份最少四年。人頭馬的特色在於只採用最頂級的兩個子產區——大香檳區與小香檳區的葡萄。"}},{"en":"Hennessy VSOP","zh":"軒尼詩VSOP","p":"45","tags":["notable"],"xterm":"cognac","options":[],"den":"","dzh":"","explain":{"en":"Cognac (KON-yak) is a protected French brandy from the Cognac region, double-distilled in copper pot stills and aged in French oak. VSOP stands for 'Very Superior Old Pale', a classification requiring a minimum of four years' ageing. Rémy Martin is notable for using only grapes from the two finest sub-regions: Grande and Petite Champagne.","zh":"干邑（KON-yak）是法國干邑地區受法定保護的白蘭地，需以銅製蒸餾器雙重蒸餾後在法國橡木桶中陳放。VSOP代表「Very Superior Old Pale（特優老淡色）」，法定陳放年份最少四年。人頭馬的特色在於只採用最頂級的兩個子產區——大香檳區與小香檳區的葡萄。"}},{"en":"Hennessey XO","zh":"軒尼詩XO","p":"114","tags":["notable"],"xterm":"cognac","options":[],"den":"","dzh":"","explain":{"en":"Cognac (KON-yak) is a protected French brandy from the Cognac region, double-distilled in copper pot stills and aged in French oak. VSOP stands for 'Very Superior Old Pale', a classification requiring a minimum of four years' ageing. Rémy Martin is notable for using only grapes from the two finest sub-regions: Grande and Petite Champagne.","zh":"干邑（KON-yak）是法國干邑地區受法定保護的白蘭地，需以銅製蒸餾器雙重蒸餾後在法國橡木桶中陳放。VSOP代表「Very Superior Old Pale（特優老淡色）」，法定陳放年份最少四年。人頭馬的特色在於只採用最頂級的兩個子產區——大香檳區與小香檳區的葡萄。"}}],"id":"sec-27"},{"en":"Armagnac / 雅文邑白蘭地","zh":"雅文邑白蘭地","note":"","items":[{"en":"Chabot VSOP","zh":"夏堡VSOP","p":"33","tags":["notable"],"xterm":"armagnac","options":[],"den":"","dzh":"","explain":{"en":"Armagnac (ar-man-YAK) is France's oldest grape brandy, produced in the Gascony region of southwest France — predating Cognac by at least a century. Unlike Cognac, it is traditionally distilled only once in a column still, producing a more robust, rustic character. VSOP (Very Superior Old Pale) indicates the youngest brandy in the blend has aged at least four years in oak. Chabot is one of the historic Armagnac houses.","zh":"雅馬邑（ar-man-YAK）是法國最古老的葡萄白蘭地，產自法國西南部的加斯科涅（Gascony）地區，歷史比干邑早至少一個世紀。與干邑不同，雅馬邑傳統上僅以單式蒸餾柱進行一次蒸餾，風味因此更為強勁粗獷。VSOP（Very Superior Old Pale）代表調配中最年輕的酒液至少在橡木桶中陳釀四年。夏博（Chabot）是歷史悠久的雅馬邑酒莊之一。"}},{"en":"Chabot XO","zh":"夏堡XO","p":"68","tags":["notable"],"xterm":"armagnac","options":[],"den":"","dzh":"","explain":{"en":"Armagnac (ar-man-YAK) is France's oldest grape brandy, produced in the Gascony region of southwest France — predating Cognac by at least a century. Unlike Cognac, it is traditionally distilled only once in a column still, producing a more robust, rustic character. VSOP (Very Superior Old Pale) indicates the youngest brandy in the blend has aged at least four years in oak. Chabot is one of the historic Armagnac houses.","zh":"雅馬邑（ar-man-YAK）是法國最古老的葡萄白蘭地，產自法國西南部的加斯科涅（Gascony）地區，歷史比干邑早至少一個世紀。與干邑不同，雅馬邑傳統上僅以單式蒸餾柱進行一次蒸餾，風味因此更為強勁粗獷。VSOP（Very Superior Old Pale）代表調配中最年輕的酒液至少在橡木桶中陳釀四年。夏博（Chabot）是歷史悠久的雅馬邑酒莊之一。"}}],"id":"sec-28"},{"en":"Sherry and Port / 雪莉酒與波特酒","zh":"雪莉酒與波特酒","note":"","items":[{"en":"Harvey Bristol","zh":"哈維布里斯托","p":"31","tags":["notable"],"xterm":"sherry","options":[],"den":"","dzh":"","explain":{"en":"Sherry is a fortified wine from Jerez, southern Spain — 'sherry' is the English corruption of 'Jerez'. Harvey's Bristol Cream is a sweet, blended cream sherry named after the British city of Bristol, where Harvey's wine merchants famously blended and bottled it. 'Cream' denotes the richest, sweetest style, best served chilled over ice.","zh":"雪莉酒是來自西班牙南部赫雷斯的強化葡萄酒，「sherry」是英語對「Jerez」的音變借詞。哈維布里斯托忌廉雪莉以英國城市布里斯托命名，因哈維酒商在當地著名地進行調配與裝瓶。「Cream（忌廉）」代表最濃郁甜潤的風格，最宜加冰飲用。"}},{"en":"Dow's Fine Tawny Port","zh":"道氏精選棕色波特","p":"","tags":["notable"],"xterm":"tawny-port","options":[],"den":"","dzh":"","explain":{"en":"Port is a sweet Portuguese fortified wine from the Douro Valley, and 'Tawny' refers to the amber-brown colour that develops from extended oak ageing, during which the wine slowly oxidises and gains nutty, dried-fruit flavours. 'Tawny' (TAW-nee) comes from the Old French for tan/brown. Dow's is one of the oldest and most respected Port houses, founded in 1798.","zh":"波特酒是來自葡萄牙杜羅河谷的甜型強化葡萄酒，「Tawny（TAW-nee）」指在橡木桶長期陳放後因緩慢氧化而呈現的琥珀棕色，並帶出堅果與乾果風味。道氏（Dow's）是歷史最悠久、最受推崇的波特酒廠之一，創立於1798年。"}}],"id":"sec-29"},{"en":"Digestive / 消化酒","zh":"消化酒","note":"","items":[{"en":"Fernet Branca","zh":"芬奈特·布蘭卡","p":"35","tags":["notable"],"xterm":"fernet-branca","options":[],"den":"","dzh":"","explain":{"en":"Fernet-Branca (fer-NET BRAN-kah) is a bitter Italian amaro (herbal liqueur) made in Milan since 1845 by the Branca family from a secret recipe of 27 herbs, roots, and spices including myrrh, rhubarb, and saffron. Intensely bitter and medicinal, it is traditionally served as a digestivo.","zh":"Fernet-Branca（fer-NET BRAN-kah）是自1845年起由米蘭Branca家族釀製的苦味義大利藥草利口酒（amaro），以包含沒藥、大黃和番紅花在內的27種藥草香料秘方製成。口味極苦帶藥草氣息，傳統上作為餐後助消化酒飲用。"}},{"en":"Kirsch","zh":"櫻桃白蘭地","p":"36","tags":["notable"],"xterm":"kirsch","options":[],"den":"","dzh":"","explain":{"en":"Kirsch (KEERSH), short for Kirschwasser (KEERSH-vas-er), is German for \"cherry water\" — a clear, dry brandy distilled from fermented whole sour cherries, pits included, which lend a subtle almond-like bitterness. Originating in the Black Forest region of Germany and Alsace, France, it is a key flavouring in Black Forest cake and Swiss fondue. Unlike sweet cherry liqueurs, Kirsch is unsweetened and distinctly spirit-forward.","zh":"Kirsch（KEERSH）是 Kirschwasser（KEERSH-vas-er）的縮寫，德文意為「櫻桃水」，是一種以整顆酸櫻桃（含果核）發酵後蒸餾而成的清澈不甜白蘭地，果核賦予其淡淡的杏仁苦香。它源自德國黑森林地區與法國阿爾薩斯，是黑森林蛋糕與瑞士起司火鍋的經典調味用酒。與甜味櫻桃利口酒不同，Kirsch 不含糖，酒味鮮明純粹。"}},{"en":"Poire Williams","zh":"威廉梨白蘭地","p":"38","tags":["notable"],"xterm":"poire-williams","options":[],"den":"","dzh":"","explain":{"en":"Poire Williams (pwahr wil-YAMZ) is a clear fruit brandy (eau-de-vie) distilled from Williams pears — known in English as Bartlett pears. Produced mainly in Switzerland, France, and Alsace, it captures the fresh, floral fragrance of ripe pear with no added sugar.","zh":"Poire Williams（pwahr wil-YAMZ）是以威廉梨（英文稱Bartlett pear）蒸餾而成的透明果香白蘭地（eau-de-vie），主要產於瑞士、法國及阿爾薩斯地區，不添加糖分，完整保留熟梨的清新花香。"}}],"id":"sec-30"},{"en":"Grappa / 葡萄渣白蘭地","zh":"葡萄渣白蘭地","note":"","items":[{"en":"Pilzer Chardonnay","zh":"皮爾澤霞多麗葡萄渣白蘭地","p":"38","tags":["notable"],"xterm":"grappa","options":[],"den":"","dzh":"","explain":{"en":"An Italian pomace brandy distilled from the grape skins, seeds, and stems left after winemaking. It is typically strong (35–60% ABV) with a robust, fiery character, and is traditionally served as a digestif after meals. Single-variety grappas, such as those made from Chardonnay grapes, carry the aromatic profile of that grape.","zh":"義大利的葡萄渣白蘭地，以釀酒後剩餘的葡萄皮、籽和梗蒸餾而成。酒精度通常較高（35–60%），口感強勁辛烈，傳統上作為餐後助消化酒飲用。以單一品種葡萄（如夏多內）製作的格拉帕，會帶有該葡萄品種的香氣特質。"}},{"en":"Pilzer Moscato Giallo","zh":"皮爾澤黃麝香葡萄渣白蘭地","p":"","tags":["notable"],"xterm":"grappa","options":[],"den":"","dzh":"","explain":{"en":"An Italian pomace brandy distilled from the grape skins, seeds, and stems left after winemaking. It is typically strong (35–60% ABV) with a robust, fiery character, and is traditionally served as a digestif after meals. Single-variety grappas, such as those made from Chardonnay grapes, carry the aromatic profile of that grape.","zh":"義大利的葡萄渣白蘭地，以釀酒後剩餘的葡萄皮、籽和梗蒸餾而成。酒精度通常較高（35–60%），口感強勁辛烈，傳統上作為餐後助消化酒飲用。以單一品種葡萄（如夏多內）製作的格拉帕，會帶有該葡萄品種的香氣特質。"}}],"id":"sec-31"},{"en":"Liquers / 利口酒","zh":"利口酒","note":"","items":[{"en":"Tia Maria","zh":"提亞瑪麗亞利口酒","p":"33","tags":["notable"],"xterm":"tia-maria","options":[],"den":"","dzh":"","explain":{"en":"Tia Maria (TEE-a ma-REE-a) is a Jamaican coffee liqueur made with cold-brew Arabica coffee, Jamaican rum, vanilla, and cane sugar. 'Tia' is Spanish for 'aunt', and the brand carries a romantic legend of a Spanish noblewoman fleeing Jamaica during colonial upheaval. It is a key ingredient in cocktails like the Espresso Martini.","zh":"提亞瑪麗亞（TEE-a ma-REE-a）是牙買加咖啡利口酒，以冷萃阿拉比卡咖啡、牙買加蘭姆酒、香草及蔗糖製成。「Tia」在西班牙文中意為「姑媽/阿姨」，品牌背後流傳著一段西班牙貴族女子於殖民動亂時期出走牙買加的浪漫傳說。它也是咖啡馬丁尼等經典調酒的重要材料。"}},{"en":"Kahlúa","zh":"卡魯哇咖啡利口酒","p":"33","tags":["notable"],"xterm":"kahlua","options":[],"den":"","dzh":"","explain":{"en":"Kahlúa (ka-LOO-a) is a Mexican coffee liqueur made from Arabica coffee grown in Veracruz, rum, and sugar. The name is believed to derive from a word meaning 'House of the Acolhua people' in the pre-Hispanic Nahuatl language. It is one of the world's most recognisable coffee liqueurs, essential in cocktails like the White Russian and Black Russian.","zh":"卡魯哇（ka-LOO-a）是墨西哥咖啡利口酒，以韋拉克魯斯州出產的阿拉比卡咖啡豆、蘭姆酒及糖製成。其名稱據信源自前哥倫布時代納瓦特爾語，意指「阿科爾瓦人的居所」。它是全球最知名的咖啡利口酒之一，是白色俄羅斯與黑色俄羅斯等經典調酒不可或缺的材料。"}},{"en":"Bailey's","zh":"百利甜酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Amaretto","zh":"杏仁利口酒","p":"33","tags":["notable"],"xterm":"amaretto","options":[],"den":"","dzh":"","explain":{"en":"Amaretto (ah-mah-RET-toh) is a sweet Italian liqueur whose name means \"a little bitter\" — from amaro (bitter). Despite its almond flavour, it is traditionally made from apricot kernels or a blend of almonds and stone-fruit pits. It originates from Saronno in northern Italy; Disaronno is the best-known brand.","zh":"Amaretto（ah-mah-RET-toh）是義大利甜味利口酒，名稱源自amaro（苦），意為「略帶苦味」。雖然帶有杏仁香氣，傳統上以杏桃核仁或杏仁與核果仁混合製成。起源於義大利北部薩羅諾，Disaronno是最知名的品牌。"}},{"en":"Crème De Banana","zh":"香蕉鮮奶油利口酒","p":"33","tags":["notable"],"xterm":"creme-de-banana","options":[],"den":"","dzh":"","explain":{"en":"Crème de Banane (krem duh ba-NAN) is a sweet French-style liqueur with an intense banana flavour, made by macerating bananas in neutral spirit with sugar. Despite the word 'crème', it contains no cream — in French liqueur terminology 'crème de' simply means a thick, sweet liqueur with a dominant single flavour. It is used in cocktails for tropical sweetness and golden colour.","zh":"香蕉鮮奶油利口酒（krem duh ba-NAN）是法式風格的甜味利口酒，以香蕉浸泡於中性烈酒中加糖製成，香蕉風味濃郁。儘管名稱含有「crème（奶油）」，實際上並不含奶油——在法式利口酒術語中，「crème de」單純指濃甜、以單一風味為主的利口酒。常用於調酒中，帶出熱帶甜香與金黃色澤。"}},{"en":"Blue Curacao","zh":"藍柑橘利口酒","p":"33","tags":["notable"],"xterm":"blue-curacao","options":[],"den":"","dzh":"","explain":{"en":"Curaçao (KYOOR-a-sow) is an orange-flavoured liqueur originally made from the dried peel of the bitter 'laraha' orange grown on the Caribbean island of Curaçao. Blue Curaçao is the same liqueur dyed a vivid blue, used primarily for its striking colour in cocktails like the Blue Lagoon. The flavour is sweet orange regardless of colour.","zh":"柑橘利口酒（KYOOR-a-sow）是以加勒比海庫拉索島上所產的苦橙「laraha」乾皮製成的橙味利口酒。藍柑橘利口酒是同款酒品加入鮮豔藍色食用染料，主要用於為調酒增添視覺衝擊，如「藍色礁湖」。無論顏色如何，風味始終是甜橙香。"}},{"en":"Cherry Brandy","zh":"櫻桃白蘭地","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sambuca","zh":"桑布卡茴香利口酒","p":"33","tags":["notable"],"xterm":"sambuca","options":[],"den":"","dzh":"","explain":{"en":"Sambuca (sam-BOO-kah) is an Italian anise-flavoured liqueur, sweet and strongly aromatic. The name likely derives from sambuco (elderberry) in Italian, though modern Sambuca is flavoured with star anise or green anise, not elderberry. It is often served con la mosca — \"with the fly\" — meaning three coffee beans floated on top for luck.","zh":"Sambuca（sam-BOO-kah）是義大利的茴香甜味利口酒，香氣濃郁。名稱可能源自義大利語sambuco（接骨木），但現代配方以八角或綠茴香調味，並不含接骨木。常見喝法是con la mosca（「帶著蒼蠅」），即在酒杯中放入三粒咖啡豆以象徵好運。"}},{"en":"D.O.M Benedictine","zh":"班尼迪克丁草本利口酒","p":"33","tags":["notable"],"xterm":"benedictine","options":[],"den":"","dzh":"","explain":{"en":"Bénédictine (ben-eh-dik-TEEN) is a French herbal liqueur made from 27 plants and spices, first produced in Fécamp, Normandy, in 1863. The label 'D.O.M.' stands for 'Deo Optimo Maximo' (Latin: 'To God, most good, most great'), a Benedictine monk motto that the brand invokes to suggest monastic origins — though the recipe is a 19th-century creation. Its warm, honeyed, herbal character makes it a revered sipping liqueur.","zh":"班尼迪克丁（ben-eh-dik-TEEN）是法國草本利口酒，以27種植物及香料製成，1863年首次在諾曼第菲康生產。瓶標上的「D.O.M.」代表拉丁文「Deo Optimo Maximo」（意為「獻給至善至大的上帝」），是本篤會修道院格言，品牌以此暗示修道院起源——儘管現有配方實為19世紀的創作。其溫潤蜂蜜草本風味使其成為備受推崇的純飲利口酒。"}},{"en":"Cointreau","zh":"君度橙酒","p":"33","tags":["notable"],"xterm":"cointreau","options":[],"den":"","dzh":"","explain":{"en":"Cointreau (KWON-troh) is a premium French triple-sec — a clear, dry orange liqueur made from a blend of sweet and bitter orange peels from around the world, distilled in copper pot stills. Created by Édouard Cointreau in 1875 in Angers, France, it remains the gold standard for orange liqueur in cocktails, from Margaritas to Sidecars.","zh":"君度（KWON-troh）是頂級法國Triple Sec——以全球多地甜橙及苦橙皮混合，經銅製蒸餾器蒸餾而成的清透乾型橙味利口酒。由Édouard Cointreau於1875年在法國昂熱創製，至今仍是調酒用橙味利口酒的黃金標準，從瑪格麗特到Sidecar皆少不了它。"}}],"id":"sec-32"},{"en":"Mineral Water / 礦泉水","zh":"礦泉水","note":"","items":[{"en":"Acqua Panna 75cl (Natural)","zh":"天然礦泉水 Acqua Panna 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Still mineral water","dzh":"天然靜止礦泉水"},{"en":"San Pellegrino 75cl (Sparkling)","zh":"氣泡礦泉水 San Pellegrino 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Sparkling mineral water","dzh":"氣泡礦泉水"}],"id":"sec-33"},{"en":"Soda / 汽水","zh":"汽水","note":"","items":[{"en":"Coke","zh":"可口可樂","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Coke Zero","zh":"零糖可口可樂","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sprite","zh":"雪碧","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-34"},{"en":"Freshly Squeezed Juice / 鮮榨果汁","zh":"鮮榨果汁","note":"","items":[{"en":"Orange","zh":"鮮榨橙汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Pineapple","zh":"鮮榨菠蘿汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Watermelon","zh":"鮮榨西瓜汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carrot","zh":"鮮榨紅蘿蔔汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Apple","zh":"鮮榨蘋果汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-35"},{"en":"Fresh Coconut / 新鮮椰子","zh":"新鮮椰子","note":"","items":[{"en":"Pandan Coconut","zh":"香蘭椰子","p":"30","tags":["notable"],"xterm":"pandan-coconut","options":[],"den":"","dzh":"","explain":{"en":"Pandan (PAR-dan) is a fragrant tropical leaf native to Southeast Asia, prized for its sweet, grassy aroma often described as 'the vanilla of Asia'. When paired with coconut, the combination is a classic flavour profile across Thai, Malaysian, Indonesian, and Singaporean cuisines — found in drinks, cakes, and rice dishes alike.","zh":"香蘭（PAR-dan）是東南亞原產的芳香熱帶葉片，以其甜美的青草香氣著稱，常被稱為「亞洲的香草」。香蘭與椰子的搭配是泰國、馬來西亞、印尼及新加坡料理中的經典風味組合，廣泛應用於飲品、糕點與米飯料理中。"}}],"id":"sec-36"},{"en":"Local Tea and Coffee / 本地茶與咖啡","zh":"本地茶與咖啡","note":"","items":[{"en":"Teh Tarik","zh":"拉茶","p":"18","tags":["notable"],"xterm":"teh-tarik","options":[],"den":"Black tea with condensed milk","dzh":"紅茶加煉奶","explain":{"en":"A popular Malaysian and Singaporean hot milk tea made with strong black tea blended with sweetened condensed milk. Its name means \"pulled tea\" in Malay, referring to the technique of pouring the drink between two vessels from a height to create a frothy top and cool it slightly. It is a staple at kopitiams (traditional coffee shops).","zh":"一種在馬來西亞和新加坡廣受歡迎的熱奶茶，以濃烈紅茶加入甜煉乳調製而成。其名稱在馬來語中意為「拉茶」，源於調製時將茶在兩個容器之間從高處來回傾倒，以製造綿密奶泡並略為降溫的技法。拉茶是傳統咖啡店（Kopitiam）的必備飲品。"}},{"en":"Kopi Kedah","zh":"吉打咖啡","p":"18","tags":["notable"],"xterm":"kopi-kedah","options":[],"den":"Black local coffee with condensed milk","dzh":"本地黑咖啡加煉奶","explain":{"en":"Kopi Kedah is a traditional Malaysian coffee style associated with the Kedah region in northern Malaysia. It is brewed using robusta coffee beans roasted with sugar and sometimes butter or margarine, then filtered through a cloth sock. The result is a strong, sweet, and slightly syrupy cup, typically served with condensed milk.","zh":"吉打咖啡是馬來西亞北部吉打州的傳統咖啡，使用以糖及牛油或人造牛油烘焙的羅布斯塔咖啡豆，經布袋過濾沖泡而成。咖啡口感濃郁、香甜且略帶黏稠感，通常加入煉乳一同飲用。"}}],"id":"sec-37"},{"en":"Freshly Brewed Coffee / 現煮咖啡","zh":"現煮咖啡","note":"","items":[{"en":"Americano","zh":"美式咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Café Latte","zh":"拿鐵咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cappuccino","zh":"卡布奇諾","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Espresso","zh":"濃縮咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Decaffeinated","zh":"低咖啡因咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-38"},{"en":"1837 TWG Tea Selections / 1837 TWG茶葉精選","zh":"1837 TWG茶葉精選","note":"","items":[{"en":"English Breakfast Tea","zh":"英式早餐茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"English Earl Grey","zh":"英式伯爵茶","p":"21","tags":["notable"],"xterm":"earl-grey","options":[],"den":"","dzh":"","explain":{"en":"Earl Grey is a black tea blended with the essential oil of bergamot — a fragrant citrus fruit grown mainly in Calabria, Italy. It is named after Charles Grey, the 2nd Earl Grey and British Prime Minister in the 1830s, though the exact origin story is disputed. The 'English' descriptor typically signals a classic, full-bodied black tea base rather than a green or white tea variation.","zh":"伯爵茶是以佛手柑精油調製的調味紅茶，佛手柑是一種主要產於義大利卡拉布里亞的芳香柑橘類水果。其名稱源自英國1830年代首相、第二代格雷伯爵查爾斯·格雷，但確切起源眾說紛紜。「英式」字樣通常表示採用傳統醇厚的紅茶茶底，有別於綠茶或白茶版本。"}},{"en":"Jasmine Queen Tea","zh":"茉莉皇后茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Rose Boudoir Tea","zh":"玫瑰閨房茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Chamomile Tea","zh":"洋甘菊茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Marrakech Tea","zh":"馬拉喀什茶","p":"21","tags":["notable"],"xterm":"marrakech-tea","options":[],"den":"","dzh":"","explain":{"en":"Marrakech (ma-ra-KESH) is the ancient imperial city of Morocco, and 'Marrakech Tea' evokes the iconic Moroccan mint tea — a blend of gunpowder green tea steeped with fresh spearmint and sweetened generously with sugar, poured from a height to create a froth. It is central to Moroccan hospitality culture, traditionally served three times as a sign of welcome.","zh":"馬拉喀什（ma-ra-KESH）是摩洛哥古老的皇城，「馬拉喀什茶」喚起經典摩洛哥薄荷茶的意象——以火藥綠茶為基底，加入新鮮薄荷葉並大量加糖，從高處倒入杯中以形成細膩泡沫。這款茶是摩洛哥待客文化的核心，傳統上連斟三杯以表達歡迎之意。"}}],"id":"sec-39"}];
const TAGS = [{"id":"notable","en":"Notable","zh":"特色","icon":"💡","group":"highlight"},{"id":"signature","en":"Highlight","zh":"招牌推薦","icon":"⭐","group":"highlight"},{"id":"gluten-free","en":"Gluten Free","zh":"無麩質","icon":"🌾","group":"diet"},{"id":"contains-nuts","en":"Contains Nuts","zh":"含堅果","icon":"🥜","group":"allergen"},{"id":"vegetarian","en":"Vegetarian","zh":"素食","icon":"🌱","group":"diet"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.filter(t => t !== "notable").map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const pic = it.img ? `<img class="dish" src="${esc(it.img)}" loading="lazy" alt="">` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${pic}${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
