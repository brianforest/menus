  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; }

  .optg-label { font-weight: 700; font-size: 15px; }
  .opt-hint { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 6px; }

  #toTop { position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 40;
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--ink);

<script>
const MENU = [{"en":"Appetisers","zh":"開胃菜","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Parmigiana Di Melanzane","zh":"帕馬森茄子","p":"61","tags":["vegetarian","notable"],"xterm":"parmigiana-di-melanzane","options":[],"den":"sweet eggplant, tomato, mozzarella, parmesan","dzh":"甜茄子、番茄、莫札瑞拉起司、帕馬森起司","explain":{"en":"A southern Italian baked casserole of layered fried eggplant (melanzane, meh-lan-ZAH-neh), tomato sauce, and Parmesan or mozzarella cheese. Despite the name, 'Parmigiana' likely refers to a style of layering rather than the city of Parma — its roots are fiercely claimed by both Sicily and Naples. The dish is rich, saucy, and deeply savory.","zh":"南義大利經典烤焗料理，將炸過的茄子（melanzane，meh-lan-ZAH-neh）與番茄醬、帕瑪森或莫札瑞拉起司層層疊起烘烤。儘管名字裡有「Parmigiana」，多數學者認為這指的是一種疊層做法，而非帕爾瑪城，西西里和那不勒斯都爭稱是發源地。口感濃郁、醬汁豐厚，滋味鮮美。"}},{"en":"Truffle Bruschetta","zh":"松露布魯斯凱塔","p":"94","tags":["vegetarian","notable"],"xterm":"truffle-bruschetta","options":[],"den":"buffalo mozzarella, truffle paste, shaved parmesan","dzh":"水牛莫札瑞拉起司、松露醬、刨片帕馬森起司","explain":{"en":"Bruschetta (broo-SKET-ta) is a central-Italian appetizer of grilled bread rubbed with garlic and drizzled with olive oil — the name comes from the Roman dialect word 'bruscare,' meaning to toast over coals. Here it is topped with truffle, the prized underground fungus with an intensely earthy, aromatic flavour. A simple vehicle elevated by luxury.","zh":"布魯斯凱塔（Bruschetta，broo-SKET-ta）是義大利中部的經典前菜，將麵包烤過後抹上大蒜、淋上橄欖油，名稱源自羅馬方言「bruscare」，意指在炭火上烘烤。此版本搭配松露——一種生長於地下、氣味濃郁迷人的珍貴菌類。簡單的載體因頂級食材而昇華。"}},{"en":"Salmon Tartare","zh":"鮭魚韃靼","p":"90","tags":["signature","gluten-free","notable"],"xterm":"salmon-tartare","options":[],"den":"salmon roe, capers, gherkin, shallot, mustard cream","dzh":"鮭魚卵、酸豆、小黃瓜、紅蔥頭、芥末鮮奶油","explain":{"en":"Tartare (tar-TAR) refers to finely hand-chopped raw protein dressed with seasonings — a technique named after the Tatars, whose horseback lifestyle was historically (if apocryphally) linked to eating raw meat. Applied to sushi-grade salmon, the result is a delicate, cool appetizer often finished with capers, shallots, or citrus.","zh":"韃靼（Tartare，tar-TAR）指將生鮮食材細切後以調味料拌勻的烹調手法，名稱源自韃靼人——民間相傳他們騎馬時習慣吃生肉（此說法帶有傳奇色彩）。用於刺身等級的鮭魚時，成品是一道清爽細緻的前菜，常佐以酸豆、紅蔥頭或柑橘提味。"}}],"id":"sec-0"},{"en":"Salads","zh":"沙拉","note":"","items":[{"en":"Salade Nicoise","zh":"尼斯沙拉","p":"79","tags":["gluten-free","notable"],"xterm":"salade-nicoise","options":[],"den":"pan seared tuna, mixed lettuce, green bean, olive, cherry tomato, hard-boiled egg, capers dressing","dzh":"煎鮪魚、綜合生菜、四季豆、橄欖、小番茄、水煮蛋、酸豆醬汁","explain":{"en":"Niçoise (nee-SWAZ) means 'in the style of Nice,' the French Riviera city. The classic version combines tuna, hard-boiled eggs, olives, green beans, and tomatoes — ingredients that reflect the sun-drenched produce of Provence. It is one of France's most internationally recognised salads.","zh":"Niçoise（nee-SWAZ）意指「尼斯風格」，尼斯是法國里維耶拉的著名城市。經典版本以鮪魚、水煮蛋、橄欖、四季豆和番茄組成，完整呈現普羅旺斯陽光產地的風味食材，是法國最具國際知名度的沙拉之一。"}},{"en":"The Terrace Caesar Salad","zh":"露台凱薩沙拉","p":"79","tags":["vegetarian","gluten-free"],"xterm":"","options":[],"den":"young baby romaine lettuce, grilled chicken, speck crisp, grated parmesan, Caesar dressing","dzh":"嫩蘿蔓生菜、烤雞肉、義式燻肉片、磨碎帕馬森起司、凱薩醬"},{"en":"Insalata Mista","zh":"綜合蔬菜沙拉","p":"42","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-mista","options":[],"den":"seasonal green salad, olives, tomato, sundried tomato, artichoke, grilled vegetables","dzh":"時令綠色沙拉、橄欖、番茄、日曬番茄、朝鮮薊、烤蔬菜","explain":{"en":"Italian for 'mixed salad' (insalata, een-sa-LAH-ta; mista, MEE-sta), this is the unfussy Italian trattoria staple — a seasonal mix of lettuces and raw vegetables dressed simply with olive oil and wine vinegar. Straightforward but a testament to the Italian philosophy of letting fresh ingredients speak.","zh":"義大利文直譯為「綜合沙拉」（insalata，een-sa-LAH-ta；mista，MEE-sta），是義大利小館的日常定番——以當季生菜和蔬菜混合，簡單淋上橄欖油與紅酒醋。毫不花俏，卻體現了義大利讓新鮮食材自然發聲的飲食哲學。"}},{"en":"Grilled Octopus Salad","zh":"烤章魚沙拉","p":"90","tags":["gluten-free"],"xterm":"","options":[],"den":"octopus, tomato confit, potato, lemon dressing","dzh":"章魚、番茄油封、馬鈴薯、檸檬醬汁"},{"en":"Insalata Caprese","zh":"卡布里沙拉","p":"108","tags":["vegetarian","gluten-free","notable"],"xterm":"insalata-caprese","options":[],"den":"tomato confit & balsamic caramel","dzh":"油封番茄與巴薩米克焦糖","explain":{"en":"Caprese (ka-PREH-zeh) means 'of Capri,' the island off the Amalfi Coast. The dish is a simple arrangement of fresh mozzarella, tomato, and basil — its red, white, and green colours intentionally mirror the Italian flag. It is one of the most iconic expressions of Italian simplicity.","zh":"Caprese（ka-PREH-zeh）意指「卡布里島風格」，卡布里是阿瑪菲海岸外的美麗島嶼。料理以新鮮莫札瑞拉、番茄和羅勒簡單排列，紅、白、綠三色恰好呼應義大利國旗，是義大利飲食簡約美學最具代表性的詮釋之一。"}},{"en":"Buffalo Mozzarella","zh":"水牛莫札瑞拉沙拉","p":"108","tags":["gluten-free","signature","notable"],"xterm":"buffalo-mozzarella","options":[],"den":"mango and bell pepper, beef speck","dzh":"芒果與甜椒、牛肉燻火腿","explain":{"en":"Mozzarella (mot-tsa-REL-la) is a fresh, stretched-curd Italian cheese; the name comes from 'mozzare,' meaning to cut or tear. The buffalo version — made from Italian water buffalo milk in Campania — is richer, creamier, and more tangy than the common cow's-milk variety. It carries a DOP protected-origin designation.","zh":"莫札瑞拉（Mozzarella，mot-tsa-REL-la）是義大利的新鮮拉絲起司，名稱源自「mozzare」，意為切斷或撕開。水牛版以義大利坎帕尼亞地區的水牛乳製成，比一般牛乳版更濃郁、更滑嫩，並帶有明顯的酸香，擁有義大利DOP原產地保護認證。"}}],"id":"sec-1"},{"en":"Pasta and Risotto","zh":"義大利麵與燉飯","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Spaghetti Bolognese","zh":"波隆那肉醬義大利麵","p":"95","tags":["notable"],"xterm":"spaghetti-bolognese","options":[],"den":"long pasta in tomato braised beef ragout","dzh":"長麵條佐番茄燉牛肉醬","explain":{"en":"Bolognese (bo-lo-NYEH-zeh) refers to the slow-cooked meat ragù from Bologna, Italy, traditionally served over tagliatelle rather than spaghetti — the spaghetti pairing is a worldwide adaptation. The sauce is built on a soffritto base, minced meat, wine, and a touch of milk or cream for richness.","zh":"波隆那肉醬（Bolognese，bo-lo-NYEH-zeh）源自義大利波隆那城，是以蔬菜底料、絞肉、紅酒和少許牛乳或鮮奶油慢燉而成的肉醬。道地吃法其實搭配寬麵（tagliatelle），與義大利細麵（spaghetti）的組合是流傳全球的版本。"}},{"en":"Fettuccine Lamb Ragout","zh":"羊肉醬寬扁麵","p":"86","tags":["notable"],"xterm":"fettuccine-lamb-ragout","options":[],"den":"flat long pasta in braised minced lamb, thyme","dzh":"寬扁麵佐燉碎羊肉、百里香","explain":{"en":"Fettuccine (fet-too-CHEE-neh) are long, flat egg-pasta ribbons — the name means 'little ribbons' in Italian — popular in Roman cuisine. Ragout (ra-GOO) is the French term for a slow-braised meat sauce, closely related to the Italian ragù. Lamb ragout brings a distinctly gamey, herbaceous depth that pairs well with the thick pasta.","zh":"費圖奇尼（Fettuccine，fet-too-CHEE-neh）是義大利文「小緞帶」之意，指長條扁平的蛋黃麵，是羅馬料理的代表麵款。Ragout（ra-GOO）為法文，指慢燉肉醬，與義大利文ragù系出同源。羊肉醬帶有獨特的羶香與草本氣息，與厚實的寬扁麵相當契合。"}},{"en":"Linguine Al Pesto","zh":"青醬細扁麵","p":"64","tags":["vegetarian","gluten-free","contains-nuts","notable"],"xterm":"linguine-al-pesto","options":[],"den":"long pasta in basil and pine nut sauce","dzh":"細扁麵佐羅勒松子醬","explain":{"en":"Linguine (lin-GWEE-neh) means 'little tongues' in Italian — flat, narrow pasta slightly wider than spaghetti. Pesto (PES-toh) comes from the Genoese word 'pestare,' to pound, and the classic Pesto alla Genovese is made by pounding basil, pine nuts, garlic, Parmesan, and olive oil in a mortar. The combination is a hallmark of Ligurian cuisine.","zh":"細扁麵（Linguine，lin-GWEE-neh）在義大利文意為「小舌頭」，是比義大利細麵略寬的扁平麵條。青醬（Pesto，PES-toh）名稱源自熱那亞方言「pestare」（搗碎），傳統做法以研缽將羅勒、松子、大蒜、帕瑪森起司和橄欖油搗製而成，是利古里亞料理的經典代表。"}},{"en":"Beetroot Gnocchi","zh":"甜菜根麵疙瘩","p":"78","tags":["vegetarian","notable"],"xterm":"beetroot-gnocchi","options":[],"den":"pan-seared beetroot and potato dumpling, taleggio cream and walnut","dzh":"煎甜菜根馬鈴薯麵疙瘩、塔雷吉歐起司鮮奶油與核桃","explain":{"en":"Gnocchi (NYOH-kee) are soft Italian dumplings, classically made from potato and flour — the name is thought to derive from 'nocchio,' a knot in wood. Adding beetroot turns them a vivid magenta and lends an earthy sweetness. They are typically sauced with butter and sage or a cream-based sauce.","zh":"麵疙瘩（Gnocchi，NYOH-kee）是義大利軟嫩的小麵糰，傳統以馬鈴薯和麵粉製成，名稱據說源於「nocchio」（木節）。加入甜菜根後呈現鮮豔的桃紅色，並帶有甘甜的土香。通常搭配奶油鼠尾草醬或奶油醬汁享用。"}},{"en":"Andaman Prawn Aglio Olio","zh":"安達曼蝦蒜香橄欖油義大利麵","p":"90","tags":["gluten-free","notable"],"xterm":"andaman-prawn-aglio-olio","options":[],"den":"pasta in garlic and olive oil, and Andaman prawn","dzh":"蒜香橄欖油義大利麵佐安達曼海鮮蝦","explain":{"en":"The Andaman Sea, between Thailand and the Andaman Islands, is famed for its large, sweet prawns. Aglio e Olio (AH-lyoh eh OH-lyoh) is Italian for 'garlic and oil' — a minimalist Roman pasta tossed with sliced garlic, olive oil, chilli, and parsley. The dish showcases how great seafood can elevate the simplest of sauces.","zh":"安達曼海位於泰國與安達曼群島之間，以產大型甜蝦聞名。蒜香橄欖油義大利麵（Aglio e Olio，AH-lyoh eh OH-lyoh）義大利文直譯為「大蒜與油」，是羅馬極簡風格的義大利麵，以切片大蒜、橄欖油、辣椒和巴西利拌炒而成。此道料理展現了優質海鮮如何讓最簡單的醬汁大放異彩。"}},{"en":"Truffle and Porcini Mushroom Risotto","zh":"松露牛肝菌燉飯","p":"72","tags":["vegetarian","gluten-free","notable"],"xterm":"truffle-and-porcini-mushroom-risotto","options":[],"den":"carnaroli rice, porcini mushroom stock, sautéed forest mushroom, truffle oil","dzh":"卡納羅利米、牛肝菌高湯、炒野菇、松露油","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian technique of slowly stirring short-grain rice — typically Arborio or Carnaroli — with hot stock until creamy. Porcini (por-CHEE-nee, meaning 'little pigs' in Italian) are prized wild mushrooms with a meaty, nutty flavour. Combined with truffle, the result is an intensely earthy, luxurious dish.","zh":"燉飯（Risotto，ree-ZOT-toh）是北義大利的經典料理，以短粒米（通常為Arborio或Carnaroli）加高湯慢慢翻炒至濃稠滑順。牛肝菌（Porcini，por-CHEE-nee，義大利文意為「小豬」）是廣受珍視的野生菇類，肉質厚實、帶有堅果香氣。搭配松露後，土香深邃、奢華濃郁。"}},{"en":"Cheese and Prawn Risotto","zh":"起司鮮蝦燉飯","p":"98","tags":["notable"],"xterm":"cheese-and-prawn-risotto","options":[],"den":"carnaroli rice in crustacean bisque, Andaman prawn, mozzarella cheese","dzh":"卡納羅利米佐甲殼類濃湯、安達曼蝦、莫札瑞拉起司","explain":{"en":"Risotto (ree-ZOT-toh) is a northern Italian slow-stirred creamy rice dish finished with butter and Parmesan — a technique called 'mantecatura' that gives it its signature silky texture. Adding prawns and cheese creates a delicate surf-and-dairy balance common in Venetian-influenced coastal cooking.","zh":"燉飯（Risotto，ree-ZOT-toh）是北義大利料理，將短粒米以高湯慢炒，最後拌入奶油與帕瑪森起司，此收尾動作稱為「mantecatura」，是燉飯絲滑質地的關鍵。加入鮮蝦與起司形成海鮮與乳香的微妙平衡，常見於受威尼斯影響的沿海料理風格。"}}],"id":"sec-2"},{"en":"Pizza","zh":"披薩","note":"","items":[{"en":"Bufalina","zh":"水牛莫札瑞拉披薩","p":"70","tags":["vegetarian","notable"],"xterm":"bufalina","options":[],"den":"tomato, mozzarella di bufala, basil","dzh":"番茄、水牛莫札瑞拉起司、羅勒","explain":{"en":"Bufalina (boo-fa-LEE-na) is an Italian diminutive of 'bufala' (water buffalo), signalling that this pizza is centred on buffalo mozzarella. Made from Italian water buffalo milk, buffalo mozzarella is creamier and more tangy than cow's-milk mozzarella, and it is typically added after baking to preserve its fresh character.","zh":"Bufalina（boo-fa-LEE-na）是義大利文「bufala」（水牛）的暱稱形式，代表這款披薩以水牛莫札瑞拉為主角。水牛乳製成的莫札瑞拉比一般牛乳版更濃郁、更帶乳酸香，通常在披薩出爐後才擺上，以保留其新鮮風味。"}},{"en":"Latteria","zh":"六種起司披薩","p":"98","tags":["vegetarian","notable"],"xterm":"latteria","options":[],"den":"6 cheeses; parmesen, gorgonzola, shredded mozzarella, buffalo mozzarella, smoked provolone, taleggio","dzh":"六種起司：帕馬森、戈爾根朱拉、絲狀莫札瑞拉、水牛莫札瑞拉、煙燻波羅伏洛、塔雷吉歐","explain":{"en":"Latteria (lat-teh-REE-ah) is Italian for 'dairy shop' or 'creamery,' signalling a pizza that foregrounds a medley of cheeses. Typically featuring a blend of four to six Italian cheeses such as mozzarella, Gorgonzola, Taleggio, and Parmesan, it is a celebration of Italy's remarkable cheesemaking heritage.","zh":"Latteria（lat-teh-REE-ah）義大利文意為「乳製品店」或「製乳場」，代表這款披薩以多種起司為核心。通常混合四至六種義大利起司，如莫札瑞拉、戈岡左拉、塔雷吉歐和帕瑪森，是對義大利豐富起司製作傳統的完美致敬。"}},{"en":"Botanica","zh":"蔬菜香草披薩","p":"80","tags":["vegetarian","notable"],"xterm":"botanica","options":[],"den":"mozzarella, grilled seasonal vegetables, fresh garden herbs","dzh":"莫札瑞拉起司、烤時令蔬菜、新鮮香草","explain":{"en":"Botanica (bo-TAH-nee-ka) derives from the Latin 'botanica,' relating to plants, signalling a pizza built around seasonal vegetables and fresh herbs. The name evokes a garden-to-table philosophy, typically featuring ingredients like zucchini, artichokes, cherry tomatoes, and aromatic herbs on a mozzarella base.","zh":"Botanica（bo-TAH-nee-ka）源自拉丁文，與植物相關，代表這款披薩以當季蔬菜和新鮮香草為主角。名稱呼應從花園到餐桌的飲食理念，常見食材包括節瓜、朝鮮薊、聖女番茄和各式香草，鋪在莫札瑞拉起司底上。"}},{"en":"Tartufina","zh":"松露牛肉燻火腿披薩","p":"110","tags":["notable"],"xterm":"tartufina","options":[],"den":"beef speck, shredded mozzarella, buffalo mozzarella, black truffle paste, truffle oil","dzh":"牛肉燻火腿、絲狀莫札瑞拉、水牛莫札瑞拉、黑松露醬、松露油","explain":{"en":"Tartufina (tar-too-FEE-na) is an Italian diminutive of 'tartufo' (truffle), meaning 'little truffle' and directly announcing truffle as the star. Pizzas with this name commonly combine truffle oil or shaved truffle with cured meats such as bresaola or speck, and beef or prosciutto, delivering an earthy, luxurious flavour profile.","zh":"Tartufina（tar-too-FEE-na）是義大利文「tartufo」（松露）的暱稱形式，意為「小松露」，直接點明松露是主角。此類披薩通常結合松露油或刨絲松露，搭配風乾牛肉（bresaola）或燻火腿等醃製肉品，帶來濃郁深邃的奢華口感。"}},{"en":"Rustica","zh":"鄉村風味披薩","p":"98","tags":["notable"],"xterm":"rustica","options":[],"den":"roasted potato, taleggio cheese, shredded mozzarella, lamb ragout","dzh":"烤馬鈴薯、塔雷吉歐起司、絲狀莫札瑞拉、燉羊肉醬","explain":{"en":"Rustica (ROO-stee-ka) is Italian for 'rustic' or 'country-style,' evoking hearty, unfussy peasant cooking. As a pizza name it suggests robust, earthy toppings — often combinations of sausage, roasted vegetables, olives, or caramelised onions — inspired by the cucina povera tradition of making satisfying food from simple ingredients.","zh":"Rustica（ROO-stee-ka）義大利文意為「質樸」或「鄉村風格」，喚起豐盛、不拘一格的農家料理意象。作為披薩名稱，通常代表帶有厚實風味的配料，如香腸、烤蔬菜、橄欖或焦糖洋蔥，靈感源自義大利「cucina povera」（窮人廚藝）傳統——用簡單食材做出令人滿足的料理。"}},{"en":"Frutti Di Mare","zh":"海鮮披薩","p":"130","tags":["signature","notable"],"xterm":"frutti-di-mare","options":[],"den":"Andaman catch of the sea: prawn, mussel, squid, crabmeat, scallops, clams, seabass, lobster, Mozzarella","dzh":"安達曼海鮮：蝦、淡菜、魷魚、蟹肉、干貝、蛤蜊、海鱸、龍蝦、莫札瑞拉起司","explain":{"en":"Frutti di mare (FROOT-tee dee MAH-reh) is Italian for 'fruits of the sea' — a poetic term for a mixed seafood selection, typically clams, mussels, squid, and prawns. On a pizza, it is almost always prepared without mozzarella in the Italian tradition, letting the briny, oceanic flavours of the seafood take centre stage.","zh":"Frutti di mare（FROOT-tee dee MAH-reh）義大利文意為「海洋的果實」，是海鮮總匯的詩意說法，通常包含蛤蜊、淡菜、魷魚和鮮蝦。在義大利傳統中，這款披薩幾乎不加莫札瑞拉，讓海鮮的鮮鹹海洋氣息成為絕對主角。"}}],"id":"sec-3"},{"en":"Main Course","zh":"主菜","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Cacciucco – Seafood Stew","zh":"卡丘可海鮮燉湯","p":"188","tags":["signature","notable"],"xterm":"cacciucco","options":[],"den":"oven baked seafood soup with lobster, mussels, clams, scallops, squid","dzh":"烤箱燉煮海鮮湯，含龍蝦、淡菜、蛤蜊、干貝、魷魚","explain":{"en":"Cacciucco (kah-CHOO-koh) is a robust Tuscan seafood stew from the port city of Livorno, traditionally made with at least five types of fish and shellfish slow-cooked in a spiced tomato-wine broth. The name likely derives from the Turkish 'küçük' meaning 'small,' reflecting Livorno's historic trading ties with the Ottoman world. It is served over thick slices of garlic-rubbed toast.","zh":"卡丘可（kah-CHOO-koh）是義大利托斯卡尼港市里窩那（Livorno）的經典海鮮燉湯，傳統上至少使用五種魚類與貝類，以番茄、白酒和香料慢燉而成。其名稱可能源自土耳其語「küçük」（小），反映里窩那昔日與鄂圖曼帝國的貿易往來。上桌時通常搭配厚片蒜香烤麵包。"}},{"en":"Zuppa di Cozze","zh":"淡菜番茄湯","p":"79","tags":["notable"],"xterm":"zuppa-di-cozze","options":[],"den":"black mussel in tomato, ciabatta, green oil","dzh":"黑淡菜佐番茄、巧巴達麵包、香草油","explain":{"en":"Zuppa (DZOOP-pah) means 'soup' in Italian, and cozze (KOHTS-eh) means 'mussels.' Together, this classic Southern Italian dish is a brothy mussel stew typically cooked with tomatoes, garlic, white wine, and chili, served with crusty bread to soak up the fragrant broth.","zh":"Zuppa（DZOOP-pah）在義大利文中意為「湯」，cozze（KOHTS-eh）則指「淡菜（貽貝）」。這道義大利南部經典料理將淡菜以番茄、大蒜、白酒與辣椒燉煮成濃郁湯汁，通常搭配脆皮麵包一起上桌，用來吸附鮮美湯汁。"}},{"en":"Filletto di Salmone","zh":"煎鮭魚菲力","p":"132","tags":["notable"],"xterm":"filletto-di-salmone","options":[],"den":"pan seared salmon, broccoli, spring onion, chilli, bell pepper pure","dzh":"煎鮭魚、花椰菜、青蔥、辣椒、甜椒泥","explain":{"en":"Filetto (fee-LET-toh) is the Italian word for 'fillet' — a boneless cut of fish or meat — and salmone (sal-MOH-neh) means 'salmon.' The term 'fillet' entered Italian from French 'filet,' both tracing back to Latin for 'thread' or 'strip.' On menus, filetto signals a clean, boneless prime cut.","zh":"Filetto（fee-LET-toh）是義大利文的「菲力／魚排」，指去骨的魚肉或肉類切塊；salmone（sal-MOH-neh）即「鮭魚」。「菲力」一詞源自法文 filet，均追溯至拉丁文「細帶、條狀物」之意。在菜單上看到 filetto，即代表無骨的優質切塊。"}},{"en":"Filletto di Branzino","zh":"烤海鱸魚菲力","p":"102","tags":["gluten-free","notable"],"xterm":"filletto-di-branzino","options":[],"den":"roasted seabass, fresh tomato sauce, capers, kalamata olives, grilled vegetables","dzh":"烤海鱸魚、新鮮番茄醬、酸豆、卡拉馬塔橄欖、烤蔬菜","explain":{"en":"Branzino (bran-DZEE-noh) is the Northern Italian name for European sea bass (Dicentrarchus labrax), a prized white-fleshed fish found throughout the Mediterranean. It is also called 'spigola' in Southern Italy. The fish is beloved for its delicate, mildly sweet flavor and is a staple of Italian coastal cuisine.","zh":"Branzino（bran-DZEE-noh）是義大利北部對歐洲海鱸（Dicentrarchus labrax）的稱呼，在南義則稱為 spigola，是地中海沿岸最受推崇的白肉魚之一。其肉質細緻、帶有淡淡甜味，是義大利沿海料理的經典食材。"}},{"en":"Galletto al Forno","zh":"爐烤春雞","p":"97","tags":["gluten-free","notable"],"xterm":"galletto-al-forno","options":[],"den":"spring chicken, seasonal vegetables, potato, chimichurri","dzh":"春雞、時令蔬菜、馬鈴薯、奇米丘里醬","explain":{"en":"Galletto (gal-LET-toh) is Italian for a young, small chicken — sometimes called 'poussin' in French or 'spring chicken' in English — weighing around 400–600 g, prized for its tender meat. Al forno (al FOR-noh) simply means 'baked in the oven.' The result is a whole roasted young bird with crisp skin and juicy flesh.","zh":"Galletto（gal-LET-toh）在義大利文中指幼嫩的小雞，相當於法文的 poussin 或中文的「春雞」，重約400至600克，肉質特別嫩滑。Al forno（al FOR-noh）意為「以烤箱烘烤」。這道菜呈現整隻烤至外皮酥脆、內裡多汁的小雞。"}},{"en":"Tagliata di Manzo","zh":"切片牛排沙拉","p":"99","tags":["gluten-free","notable"],"xterm":"tagliata-di-manzo","options":[],"den":"pan seared sliced beef flank, rocket salad, cherry tomato, shaved parmesan, balsamic reduction","dzh":"煎切片牛側腹肉、芝麻葉沙拉、小番茄、刨片帕馬森起司、巴薩米克濃縮醬","explain":{"en":"Tagliata (tal-YAH-tah) comes from the Italian verb 'tagliare,' meaning 'to cut' — the dish is a grilled beef steak sliced on the diagonal and fanned out, typically over rocket, shaved Parmigiano, and a drizzle of olive oil. Manzo (MAN-dzoh) means 'beef.' This Tuscan classic showcases quality meat without heavy saucing.","zh":"Tagliata（tal-YAH-tah）源自義大利文動詞 tagliare（切割），指將烤好的牛排斜切成薄片、展開擺盤，通常佐以芝麻葉、帕馬森起司薄片與橄欖油。Manzo（MAN-dzoh）意為「牛肉」。這道托斯卡尼經典料理以簡單手法呈現優質牛肉的原味。"}}],"id":"sec-4"},{"en":"Desserts","zh":"甜點","note":"All prices quoted are inclusive of prevailing taxes.","items":[{"en":"Tropical Fruits Platter","zh":"熱帶水果拼盤","p":"44","tags":[],"xterm":"","options":[],"den":"selection of our seasonal fruits, 5 types","dzh":"精選時令水果五種"},{"en":"Tiramisu (glass)","zh":"提拉米蘇（玻璃杯）","p":"48","tags":["signature","notable"],"xterm":"tiramisu","options":[],"den":"layers of mascarpone cream, coffee-soaked lady fingers and a dusting of cocoa powder","dzh":"馬斯卡彭鮮奶油、咖啡浸泡手指餅乾層層疊放，撒上可可粉","explain":{"en":"Tiramisù (tee-rah-mee-SOO) literally means 'lift me up' or 'pick me up' in Italian — tirare (pull) + mi (me) + su (up) — likely a nod to its energizing ingredients: espresso and mascarpone. The dessert was created in the Veneto region in the 1960s–70s, layering espresso-soaked savoiardi biscuits with a whipped mascarpone cream and a dusting of cocoa.","zh":"提拉米蘇（tee-rah-mee-SOO）在義大利文中字面意思是「把我提起來」——tirare（拉）+ mi（我）+ su（上）——或許正呼應了其提神的材料：濃縮咖啡與馬斯卡彭起司。這道甜點誕生於1960至70年代義大利威尼托大區，以浸泡濃縮咖啡的手指餅乾交疊馬斯卡彭奶霜，最後撒上可可粉而成。"}},{"en":"Cannoli","zh":"卡諾里捲","p":"45","tags":["notable"],"xterm":"cannoli","options":[],"den":"crisp and flaky cannoli shell, lusciously creamy, sweet ricotta cheese and mascarpone with decadent dark chocolate chips","dzh":"酥脆薄片卡諾里殼，填入香甜瑞可塔起司與馬斯卡彭鮮奶油，佐濃郁黑巧克力碎片","explain":{"en":"Cannoli (kah-NOH-lee) are crisp, tube-shaped pastry shells from Sicily, filled with sweetened ricotta cream — often studded with chocolate chips or candied fruit. The singular is 'cannolo,' and the name means 'little tube' in Sicilian dialect. They are one of the most iconic symbols of Sicilian pastry tradition.","zh":"卡諾里（kah-NOH-lee）是西西里島的經典脆皮管狀甜點，內填加糖的瑞可塔起司奶霜，常點綴巧克力碎片或蜜餞水果。單數為 cannolo，名稱在西西里方言中意為「小管子」，是西西里甜點文化最具代表性的象徵之一。"}},{"en":"Almond Semifreddo","zh":"杏仁半凍冰淇淋","p":"45","tags":["notable"],"xterm":"almond-semifreddo","options":[],"den":"creamy almond semifreddo, warm apple compote","dzh":"濃郁杏仁半凍甜點、溫熱蘋果泥","explain":{"en":"Semifreddo (seh-mee-FRED-doh) means 'half cold' in Italian — semi (half) + freddo (cold) — describing a partially frozen dessert that is softer and creamier than ice cream because it is made with whipped cream or meringue folded in before freezing. The almond version is a popular Italian variation, offering a nougat-like richness.","zh":"Semifreddo（seh-mee-FRED-doh）在義大利文中意為「半冷」——semi（半）+ freddo（冷）——是一種半凍甜點，因製作時加入打發鮮奶油或蛋白霜，口感比冰淇淋更柔軟綿密。杏仁口味是義大利常見變化款，帶有類似牛軋糖的濃郁香氣。"}},{"en":"Vanilla Panna Cotta","zh":"香草奶酪","p":"48","tags":["notable"],"xterm":"panna-cotta","options":[],"den":"creamy cooked cream, mixed berries compote","dzh":"濃郁義式奶凍、綜合莓果醬","explain":{"en":"Panna cotta (PAN-nah KOT-tah) means 'cooked cream' in Italian — panna (cream) + cotta (cooked). It is a silky, set dessert from the Piedmont region of Northern Italy, made by gently heating cream with sugar and gelatin, then chilling it until just firm enough to hold its shape. Vanilla is the classic flavoring.","zh":"奶酪（PAN-nah KOT-tah）在義大利文中意為「煮過的鮮奶油」——panna（鮮奶油）+ cotta（煮過）。這是一款源自義大利北部皮埃蒙特大區的絲滑甜點，以鮮奶油加糖與吉利丁加熱後冷藏定型而成，口感嫩滑，香草是最經典的調味。"}}],"id":"sec-5"},{"en":"Signature Cocktail's","zh":"招牌雞尾酒","note":"RM (Glass) 50. All our prices are nett and in Malaysia ringgit.","items":[{"en":"Dannatini","zh":"達納提尼","p":"50","tags":["notable"],"xterm":"dannatini","options":[],"den":"white rum, espresso, cinnamon syrup","dzh":"白蘭姆酒、濃縮咖啡、肉桂糖漿","explain":{"en":"Dannatini appears to be a proprietary house cocktail name — 'dannato' means 'damned' in Italian, and the '-ini' suffix echoes the martini family of drinks. Without a published recipe, specifics vary by bar. Expect a spirit-forward martini-style cocktail with an Italian-influenced twist.","zh":"Dannatini 看似是一款以義大利文 dannato（「該死的」、「受詛咒的」）命名的招牌調酒，字尾 -ini 呼應馬丁尼（Martini）系列飲品。由於無公開固定配方，各酒吧詮釋不同，通常為烈酒主導、帶有義式風情的馬丁尼風格雞尾酒。"}},{"en":"Terrace Spritz","zh":"露台氣泡雞尾酒","p":"50","tags":["notable"],"xterm":"spritz","options":[],"den":"homemade limoncello, prosecco, soda water","dzh":"自製檸檬甜酒、普羅賽克氣泡酒、蘇打水","explain":{"en":"The Spritz (SHPRITS) originated in 19th-century Veneto when Austrian soldiers stationed in Italy diluted local wine with a 'spritz' (German/Austrian for 'spray') of water. The modern Aperol or Campari Spritz — prosecco, bitter liqueur, and a splash of soda — became Venice's signature aperitivo and a global icon of Italian aperitivo culture.","zh":"Spritz（SHPRITS）起源於19世紀義大利威尼托，當時駐紮當地的奧地利士兵習慣在葡萄酒中加水「噴一下」（德語 spritzen）。現代版以 Aperol 或 Campari 加上普羅賽克氣泡酒與蘇打水調製，成為威尼斯餐前酒的代名詞，也是義大利 aperitivo 文化的全球象徵。"}}],"id":"sec-6"},{"en":"Signature Mocktail's","zh":"招牌無酒精調酒","note":"RM (Glass) 40.","items":[{"en":"Danna Ice Tea","zh":"達納冰茶","p":"40","tags":[],"xterm":"","options":[],"den":"coconut syrup, orgeat syrup, passion fruit syrup, black tea","dzh":"椰子糖漿、杏仁糖漿、百香果糖漿、紅茶"},{"en":"Peach Spritz","zh":"蜜桃氣泡飲","p":"40","tags":[],"xterm":"","options":[],"den":"peach puree, grenadine syrup, lime, soda water","dzh":"水蜜桃泥、石榴糖漿、萊姆、蘇打水"}],"id":"sec-7"},{"en":"Sparkling Wine Cocktail","zh":"氣泡酒雞尾酒","note":"RM (Glass) 45.","items":[{"en":"French 75","zh":"法式75","p":"45","tags":["notable"],"xterm":"french-75","options":[],"den":"gin, lemon juice, sparkling wine","dzh":"琴酒、檸檬汁、氣泡酒","explain":{"en":"The French 75 is a classic cocktail of gin (or cognac), lemon juice, sugar, and Champagne. It was named after the French 75 mm field gun used in World War I — the drink was said to hit with the same kick. It was popularized at Harry's New York Bar in Paris in the 1920s.","zh":"法式75是以琴酒（或干邑白蘭地）、檸檬汁、糖與香檳調製的經典雞尾酒。其名稱源自一戰時法軍使用的75毫米野戰炮——據說這款酒的後勁與炮擊一樣猛烈。1920年代由巴黎哈利紐約酒吧（Harry's New York Bar）推廣而廣為人知。"}},{"en":"Bellini","zh":"貝里尼","p":"45","tags":["notable"],"xterm":"bellini","options":[],"den":"peach purée, prosecco","dzh":"水蜜桃泥、普羅賽克氣泡酒","explain":{"en":"The Bellini (bel-LEE-nee) was invented around 1948 by Giuseppe Cipriani at Harry's Bar in Venice, blending white peach purée with Prosecco. It was named after the Venetian Renaissance painter Giovanni Bellini, whose works inspired the cocktail's distinctive peachy-pink hue. It remains the signature drink of Harry's Bar.","zh":"貝里尼（bel-LEE-nee）約於1948年由威尼斯哈利酒吧（Harry's Bar）的 Giuseppe Cipriani 發明，以白桃果泥與普羅賽克氣泡酒調製而成。其名稱來自威尼斯文藝復興畫家喬凡尼·貝里尼（Giovanni Bellini），因其畫作中特有的粉桃色調而得名，至今仍是哈利酒吧的招牌飲品。"}},{"en":"Mimosa","zh":"含羞草","p":"45","tags":["notable"],"xterm":"mimosa","options":[],"den":"fresh orange juice, prosecco","dzh":"新鮮柳橙汁、普羅賽克氣泡酒","explain":{"en":"The Mimosa is equal parts chilled Champagne (or sparkling wine) and fresh orange juice, served in a flute. It was invented at the Ritz Hotel in Paris around 1925 and named after the mimosa plant (Acacia dealbata) for its matching bright yellow color. A staple of brunch culture worldwide.","zh":"含羞草雞尾酒以等比例的冰鎮香檳（或氣泡酒）與新鮮柳橙汁調製，盛於高腳杯中。約1925年發明於巴黎麗茲酒店，因其鮮黃色澤與含羞草植物（Acacia dealbata）的花色相近而得名。如今是全球早午餐（brunch）文化的經典飲品。"}},{"en":"Kir Royal","zh":"皇家基爾","p":"45","tags":["notable"],"xterm":"kir-royal","options":[],"den":"crème de cassis, prosecco","dzh":"黑醋栗香甜酒、普羅賽克氣泡酒","explain":{"en":"Kir Royal (keer rwah-YAL) is a French aperitif of Champagne topped with a splash of crème de cassis (blackcurrant liqueur). It is the glamorous upgrade of the original Kir — white Burgundy wine with cassis — named after Félix Kir, a WWII Resistance hero and mayor of Dijon who popularized the drink in the 1950s. 'Royal' denotes the substitution of still wine with Champagne.","zh":"皇家基爾（keer rwah-YAL）是以香檳加少量黑醋栗香甜酒（crème de cassis）調製的法式餐前酒，是原版「基爾」——白酒加黑醋栗酒——的升級版。原版以二戰抵抗軍英雄、第戎市長 Félix Kir 命名，他於1950年代大力推廣此酒。「Royal（皇家）」即指以香檳取代一般靜態白酒。"}}],"id":"sec-8"},{"en":"Martini's","zh":"馬丁尼系列","note":"RM (Glass) 45.","items":[{"en":"Cosmopolitan","zh":"柯夢波丹","p":"45","tags":["notable"],"xterm":"cosmopolitan","options":[],"den":"vodka, triple sec, cranberry juice, lime juice","dzh":"伏特加、橙皮利口酒、蔓越莓汁、萊姆汁","explain":{"en":"The Cosmopolitan — vodka, triple sec, cranberry juice, and fresh lime — rose to fame in 1990s New York, popularized by the TV series 'Sex and the City.' It belongs to the family of citrus-forward, pink-hued cocktails served in a martini glass. The name evokes a sophisticated, worldly ('cosmopolitan') urbanite lifestyle.","zh":"柯夢波丹由伏特加、橙皮酒、蔓越莓汁與新鮮萊姆汁調製，盛於馬丁尼杯中，於1990年代紐約走紅，並因美劇《慾望城市》而名揚全球。其名稱「cosmopolitan」意指見多識廣的都會型人，呼應了這款雞尾酒所象徵的時髦都市生活風格。"}},{"en":"Manhattan","zh":"曼哈頓","p":"45","tags":["notable"],"xterm":"manhattan","options":[],"den":"canadian club, sweet vermouth, angostura bitters","dzh":"加拿大俱樂部威士忌、甜苦艾酒、安格斯特拉苦酒","explain":{"en":"The Manhattan is one of the great classic cocktails: rye or bourbon whiskey, sweet vermouth, and Angostura bitters, stirred and served with a maraschino cherry. It dates to 1870s New York and is named after Manhattan Island. It helped define the 'stirred, spirit-forward' cocktail category and is the template for countless modern variations.","zh":"曼哈頓是最重要的經典雞尾酒之一，以裸麥威士忌或波本威士忌、甜苦艾酒與安格斯圖拉苦精攪拌調製，佐以馬拉斯奇諾酸櫻桃。此酒誕生於1870年代紐約，以曼哈頓島命名，是「攪拌型烈酒主導雞尾酒」的典範，也是無數現代創作的靈感原型。"}},{"en":"Espresso Martini","zh":"濃縮咖啡馬丁尼","p":"45","tags":["notable"],"xterm":"espresso-martini","options":[],"den":"vodka, kahlua, espresso, sugar syrup","dzh":"伏特加、卡魯哇咖啡酒、濃縮咖啡、糖漿","explain":{"en":"The Espresso Martini was created in 1983 by London bartender Dick Bradsell, combining vodka, freshly pulled espresso, coffee liqueur (typically Kahlúa), and sugar syrup. Shaken hard to produce its signature frothy crema top, it is served in a martini glass with three coffee beans. Despite its name, it contains no vermouth and is not a true martini.","zh":"濃縮咖啡馬丁尼由倫敦調酒師 Dick Bradsell 於1983年創作，以伏特加、現拉濃縮咖啡、咖啡香甜酒（通常為 Kahlúa）與糖漿大力搖盪而成，頂部形成標誌性的細密奶泡，盛於馬丁尼杯並以三顆咖啡豆點綴。儘管名為「馬丁尼」，實際上不含苦艾酒，並非嚴格意義上的馬丁尼。"}},{"en":"Dry Martini","zh":"乾馬丁尼","p":"45","tags":["notable"],"xterm":"dry-martini","options":[],"den":"gin, dry vermouth","dzh":"琴酒、不甜苦艾酒","explain":{"en":"The Dry Martini is gin and dry vermouth, stirred with ice and strained into a chilled martini glass, garnished with an olive or lemon twist. 'Dry' refers to the use of dry (rather than sweet) vermouth, and over decades bartenders have reduced vermouth to ever-smaller proportions, making 'extra dry' versions nearly pure gin. It is arguably the most debated cocktail in history.","zh":"乾馬丁尼以琴酒與不甜苦艾酒（dry vermouth）攪拌後濾入冰鎮馬丁尼杯，佐以橄欖或檸檬皮捲。「乾（Dry）」指使用不甜苦艾酒而非甜苦艾酒；數十年來調酒師不斷縮減苦艾酒比例，「超乾」版本幾近純琴酒。它大概是史上爭議最多、最具討論性的雞尾酒。"}}],"id":"sec-9"},{"en":"Classic Cocktail","zh":"經典雞尾酒","note":"RM (Glass) 45.","items":[{"en":"Orange Spritzz","zh":"柳橙氣泡調酒","p":"45","tags":["notable"],"xterm":"spritz","options":[],"den":"le favori, prosecco, soda water","dzh":"法式茴香酒、普羅賽克氣泡酒、蘇打水","explain":{"en":"The Spritz (SHPRITS) originated in 19th-century Veneto when Austrian soldiers stationed in Italy diluted local wine with a 'spritz' (German/Austrian for 'spray') of water. The modern Aperol or Campari Spritz — prosecco, bitter liqueur, and a splash of soda — became Venice's signature aperitivo and a global icon of Italian aperitivo culture.","zh":"Spritz（SHPRITS）起源於19世紀義大利威尼托，當時駐紮當地的奧地利士兵習慣在葡萄酒中加水「噴一下」（德語 spritzen）。現代版以 Aperol 或 Campari 加上普羅賽克氣泡酒與蘇打水調製，成為威尼斯餐前酒的代名詞，也是義大利 aperitivo 文化的全球象徵。"}},{"en":"Daiquiri","zh":"黛克瑞","p":"45","tags":["notable"],"xterm":"daiquiri","options":[],"den":"light rum, triple sec, lime juice, simple syrup","dzh":"淡蘭姆酒、橙皮利口酒、萊姆汁、糖漿","explain":{"en":"Daiquiri (DAK-uh-ree) is a Cuban cocktail of white rum, lime juice, and sugar — named after a beach and iron-mining town near Santiago de Cuba. American engineer Jennings Cox is credited with popularizing it in the late 1890s. Simple, bright, and endlessly riffed on with fruit variations.","zh":"黛克瑞（DAK-uh-ree）是古巴經典雞尾酒，以白蘭姆酒、萊姆汁與糖調製而成，名稱源自古巴聖地牙哥附近的採礦小鎮。美國工程師 Jennings Cox 於19世紀末將此酒推廣開來。口感清爽酸甜，常見各種水果變化版本。"}},{"en":"Whskey Sour","zh":"威士忌酸酒","p":"45","tags":["notable"],"xterm":"whiskey-sour","options":[],"den":"whiskey, lime juice, simple syrup","dzh":"威士忌、萊姆汁、糖漿","explain":{"en":"A \"sour\" is a classic cocktail family built on spirit, citrus juice, and a sweetener — the sour refers to the tart lemon or lime component. Whiskey Sour uses bourbon or rye whiskey as its base. Many versions add egg white for a silky foam.","zh":"「Sour（酸酒）」是一個經典雞尾酒家族，以烈酒、柑橘汁與甜味劑調製，「酸」指的是檸檬或萊姆帶來的酸爽感。威士忌酸酒以波本或裸麥威士忌為基底，不少版本會加入蛋白，帶來綿密泡沫口感。"}},{"en":"Old fashion","zh":"古典雞尾酒","p":"45","tags":["notable"],"xterm":"old-fashioned","options":[],"den":"whiskey, brown sugar, angostura bitters","dzh":"威士忌、黃糖、安格斯特拉苦酒","explain":{"en":"One of the oldest recognized cocktail forms: whiskey (typically bourbon or rye), sugar, Angostura bitters, and a twist of orange peel. The name came about in the late 1800s when drinkers asked bartenders to make their drink \"the old-fashioned way\" — before elaborate mixology took over. Stirred, never shaken.","zh":"古典雞尾酒是最古老的雞尾酒形式之一，以波本或裸麥威士忌搭配方糖、安格仕苦精與橙皮調製。19世紀末，客人要求調酒師「用老方法做」（the old-fashioned way），由此得名。此酒必須攪拌，絕不搖盪。"}},{"en":"Piña Colada","zh":"鳳梨可樂達","p":"45","tags":["notable"],"xterm":"pina-colada","options":[],"den":"white rum, malibu, coconut cream, pineapple juice","dzh":"白蘭姆酒、馬利寶椰子酒、椰奶、鳳梨汁","explain":{"en":"Piña Colada (PEEN-ya koh-LAH-da) means \"strained pineapple\" in Spanish — piña is pineapple, colada means strained or sieved. A Puerto Rican creation blending white rum, coconut cream, and pineapple juice, it became the island's official cocktail in 1978. Rich, tropical, and famously associated with beach vacations.","zh":"Piña Colada（PEEN-ya koh-LAH-da）在西班牙語意為「過濾的鳳梨」，piña 是鳳梨，colada 意指過濾。這款波多黎各名飲以白蘭姆酒、椰奶與鳳梨汁調製，1978年正式成為波多黎各的國家雞尾酒，風味濃郁熱帶，是度假海灘的代名詞。"}},{"en":"Margarita","zh":"瑪格麗特","p":"45","tags":["notable"],"xterm":"margarita","options":[],"den":"tequila, triple sec, lime juice, simple syrup","dzh":"龍舌蘭、橙皮利口酒、萊姆汁、糖漿","explain":{"en":"Margarita (mar-gah-REE-tah) means \"daisy\" in Spanish — it belongs to the \"daisy\" cocktail family (spirit, citrus, and orange liqueur). Made with tequila, lime juice, and triple sec or Cointreau, served in a salt-rimmed glass. Its exact origin is disputed, with several Mexican bartenders and American socialites claiming credit from the 1930s–40s.","zh":"Margarita（mar-gah-REE-tah）在西班牙語意為「雛菊」，屬於「daisy（雛菊）」雞尾酒家族，以烈酒、柑橘汁與橙酒調製。本酒以龍舌蘭酒、萊姆汁和君度橙酒搭配，盛於鹽口杯中。起源眾說紛紜，多位墨西哥調酒師與美國社交名流都宣稱在1930至40年代發明了它。"}},{"en":"Negroni","zh":"內格羅尼","p":"45","tags":["notable"],"xterm":"negroni","options":[],"den":"gin, campari, sweet vermouth","dzh":"琴酒、金巴利、甜苦艾酒","explain":{"en":"Negroni (neh-GROH-nee) is an Italian aperitivo cocktail of equal parts gin, sweet vermouth, and Campari, garnished with an orange peel. Legend credits Count Camillo Negroni in Florence, 1919, who asked his bartender to strengthen an Americano cocktail by swapping soda water for gin. Bitter, complex, and beloved by cocktail enthusiasts worldwide.","zh":"Negroni（neh-GROH-nee）是義大利經典開胃雞尾酒，以等量琴酒、甜苦艾酒與金巴利調製，以橙皮裝飾。相傳1919年佛羅倫斯的卡米洛·內格羅尼伯爵要求調酒師將美國佬（Americano）中的蘇打水換成琴酒，由此誕生。口感苦甜複雜，深受全球雞尾酒愛好者青睞。"}},{"en":"Mojito","zh":"莫希托","p":"45","tags":["notable"],"xterm":"mojito","options":[],"den":"light rum, brown sugar, mint leaf, soda water","dzh":"淡蘭姆酒、黃糖、薄荷葉、蘇打水","explain":{"en":"Mojito (moh-HEE-toh) is a Cuban cocktail of white rum, lime juice, sugar, mint, and soda water — Havana's most iconic drink. A 'Nojito' (or 'Virgin Mojito') keeps all the bright, refreshing flavours but omits the rum, making it alcohol-free. The name 'mojito' likely derives from the African word 'mojo', meaning a small charm or magic spell.","zh":"莫希托（moh-HEE-toh）是古巴雞尾酒，以白蘭姆酒、萊姆汁、糖、薄荷和蘇打水調製，是哈瓦那最具代表性的飲品。「無酒精莫希托」（Nojito）保留所有清新爽口的風味，僅去除蘭姆酒，適合不飲酒者享用。「mojito」這個名稱可能源自非洲詞語「mojo」，意指小護身符或魔法。"}}],"id":"sec-10"},{"en":"Mocktails","zh":"無酒精調酒","note":"RM (Glass) 35.","items":[{"en":"Mango Lassi","zh":"芒果拉西","p":"35","tags":["notable"],"xterm":"mango-lassi","options":[],"den":"yoghurt, mango purée, mango juice","dzh":"優格、芒果泥、芒果汁","explain":{"en":"Lassi (LAH-see) is a traditional yogurt-based drink from the Punjab region of South Asia, blended smooth and consumed for centuries. The mango version blends ripe mango pulp with yogurt, milk, and sometimes sugar or cardamom. Cooling and rich, it is a staple at Indian restaurants and a natural antidote to spicy food.","zh":"Lassi（LAH-see）是源自南亞旁遮普地區的傳統優格飲料，數百年來廣受飲用。芒果拉西將熟芒果果肉與優格、牛奶調製而成，有時加入糖或荳蔻。口感清涼濃郁，是印度餐廳的必備飲品，也是辣食後的最佳解辣良方。"}},{"en":"Fruit Mocktail","zh":"水果無酒精調酒","p":"35","tags":[],"xterm":"","options":[],"den":"orange juice, grapefruit juice, banana purée, pineapple juice, lime juice","dzh":"柳橙汁、葡萄柚汁、香蕉泥、鳳梨汁、萊姆汁"},{"en":"Virgin Piña Colada","zh":"無酒精鳳梨可樂達","p":"35","tags":[],"xterm":"","options":[],"den":"pineapple juice, coconut cream","dzh":"鳳梨汁、椰奶"},{"en":"Fruit Punch","zh":"水果賓治","p":"35","tags":[],"xterm":"","options":[],"den":"mango juice, pineapple juice, orange juice, lime juice, grenadine syrup","dzh":"芒果汁、鳳梨汁、柳橙汁、萊姆汁、石榴糖漿"},{"en":"Summer Delight","zh":"夏日清爽","p":"35","tags":[],"xterm":"","options":[],"den":"orange juice, mango juice, strawberry purée, lime juice, sprite","dzh":"柳橙汁、芒果汁、草莓泥、萊姆汁、雪碧"},{"en":"Virgin Mojito","zh":"無酒精莫希托","p":"35","tags":[],"xterm":"","options":[],"den":"mint leaf, lime juice, brown sugar, soda water","dzh":"薄荷葉、萊姆汁、黃糖、蘇打水"}],"id":"sec-11"},{"en":"Draught","zh":"生啤酒","note":"All our prices are nett and in Malaysia ringgit.","items":[{"en":"Carlsberg 330 ml","zh":"嘉士伯 330 毫升","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carlsberg 500 ml","zh":"嘉士伯 500 毫升","p":"40","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-12"},{"en":"Beer of the World","zh":"世界精選啤酒","note":"","items":[{"en":"Carlsberg | Denmark","zh":"嘉士伯｜丹麥","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Tiger | Singapore","zh":"虎牌｜新加坡","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Heineken | Netherland","zh":"海尼根｜荷蘭","p":"32","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Singha | Thailand","zh":"勝獅｜泰國","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-13"},{"en":"Aperitif","zh":"餐前酒","note":"RM (Glass) 33.","items":[{"en":"Campari","zh":"金巴利","p":"33","tags":["notable"],"xterm":"campari","options":[],"den":"","dzh":"","explain":{"en":"Campari (kam-PAH-ree) is an Italian bitter liqueur invented by Gaspare Campari in Milan around 1860, infused with herbs, spices, and fruit peel — its exact recipe remains a secret. Its vivid red color and pronounced bitterness make it a cornerstone ingredient in cocktails like the Negroni and Aperol Spritz's bitter cousin. Served as an aperitivo over ice or mixed.","zh":"Campari（kam-PAH-ree）是義大利苦味利口酒，約於1860年由蓋斯帕雷·坎帕里在米蘭創製，以香草、香料與果皮浸製，確切配方至今保密。鮮豔的紅色外觀與強烈苦味使其成為內格羅尼等雞尾酒的核心材料，可作為餐前開胃酒加冰直飲或調製雞尾酒。"}},{"en":"Pimm's No.1","zh":"皮姆一號","p":"33","tags":["notable"],"xterm":"pimms","options":[],"den":"","dzh":"","explain":{"en":"Pimm's No.1 is a British gin-based fruit liqueur created by oyster bar owner James Pimm in London around 1840, originally served as a digestive aid. The \"No.1\" refers to gin as its base spirit — the brand once made six numbered variants with different bases. Mixed with lemonade, fresh fruit, cucumber, and mint, a Pimm's Cup is synonymous with British summer and events like Wimbledon.","zh":"皮姆一號是英國琴酒基底水果利口酒，約於1840年由倫敦牡蠣吧老闆詹姆斯·皮姆創製，最初作為助消化飲品。「一號」代表琴酒基底——該品牌曾推出以不同基酒命名的六款版本。與氣泡檸檬水、新鮮水果、黃瓜及薄荷混調，皮姆杯（Pimm's Cup）是英國夏天與溫布頓網球賽的代表飲品。"}},{"en":"Martini Dry, Martini Bianco, Martini Rosso","zh":"馬丁尼不甜、馬丁尼白、馬丁尼紅","p":"33","tags":["notable"],"xterm":"vermouth","options":[],"den":"","dzh":"","explain":{"en":"Vermouth (VER-muth) is a fortified, aromatized wine infused with botanicals — the name comes from the German Wermut (wormwood), a key traditional herb. Dry (Dry Martini) is pale and crisp; Bianco is sweeter and vanilla-scented; Rosso (red) is the sweetest, infused with caramel and spice. Essential in countless cocktails, the Martini brand here is an Italian producer, unrelated to the gin cocktail.","zh":"Vermouth（VER-muth）是加烈植物浸漬葡萄酒，名稱源自德語 Wermut（苦艾），即傳統配方中的關鍵草本。Dry（不甜）口感清爽淡雅；Bianco（白）較甜帶香草香氣；Rosso（紅）最甜，帶焦糖與香料風味。此處「馬丁尼」為義大利苦艾酒品牌名，與琴酒調製的馬丁尼雞尾酒是兩回事。"}},{"en":"Pernod","zh":"保樂茴香酒","p":"33","tags":["notable"],"xterm":"pernod","options":[],"den":"","dzh":"","explain":{"en":"Pernod (pair-NOH) is a French anise-flavored liqueur, a descendant of the absinthe tradition — the Pernod Fils company was founded in 1805 and was once the world's largest absinthe producer. After absinthe was banned across Europe in the early 1900s, Pernod reformulated as an anise spirit without wormwood. It turns milky white when water is added, a phenomenon called the louche (loosh) effect.","zh":"Pernod（pair-NOH）是法國茴香風味利口酒，承繼苦艾酒（absinthe）傳統——Pernod Fils 公司創立於1805年，曾是全球最大苦艾酒生產商。20世紀初苦艾酒在歐洲遭禁後，保樂改製為不含苦艾的茴香烈酒。加水後酒液會變成乳白色，此現象稱為「louche（loosh）效應」。"}}],"id":"sec-14"},{"en":"Vodka","zh":"伏特加","note":"","items":[{"en":"Stolichnaya","zh":"蘇托力","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Smirnoff","zh":"斯米諾","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Absolut","zh":"絕對伏特加","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Russian standard","zh":"俄羅斯標準","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Grey Goose","zh":"灰雁","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Belvedere","zh":"貝爾維德","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-15"},{"en":"Gin","zh":"琴酒","note":"","items":[{"en":"Gordon's","zh":"哥頓","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Beefeater","zh":"英人牌","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bombay Sapphire","zh":"孟買藍寶石","p":"28","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Tanqueray 10","zh":"坦奎瑞10號","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Hendrick's","zh":"亨利爵士","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Monkey 47","zh":"猴子47號","p":"45","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-16"},{"en":"Rum","zh":"蘭姆酒","note":"","items":[{"en":"Cachaca","zh":"卡莎夏","p":"28","tags":["notable"],"xterm":"cachaca","options":[],"den":"","dzh":"","explain":{"en":"Cachaça (ka-SHA-sa) is Brazil's most popular distilled spirit — unlike rum, which is made from molasses, cachaça is distilled directly from fresh sugarcane juice, giving it a grassy, funky character. It is the base of the Caipirinha (kai-pee-REEN-ya), Brazil's national cocktail. Brazil produces over a billion liters annually, though most is consumed domestically.","zh":"Cachaça（ka-SHA-sa）是巴西最受歡迎的蒸餾烈酒。與蘭姆酒以糖蜜釀造不同，卡夏薩直接以新鮮甘蔗汁蒸餾而成，帶有清新的草本與發酵風味。它是巴西國民雞尾酒卡琵莉亞（Caipirinha，kai-pee-REEN-ya）的基底。巴西年產量逾十億公升，大多在國內消費。"}},{"en":"Bacardi Light","zh":"百加得淡蘭姆","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bacardi Gold","zh":"百加得金蘭姆","p":"31","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Captain Morgan Black Label","zh":"摩根船長黑標","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Captain Morgan Spice","zh":"摩根船長香料蘭姆","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Myers's","zh":"邁爾斯蘭姆","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Malibu","zh":"馬利寶","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-17"},{"en":"Tequila","zh":"龍舌蘭酒","note":"","items":[{"en":"Camino","zh":"卡 m":"","options":[],"den":"","dzh":""}],"id":"sec-24"},{"en":"Whiskey Collections – Single Malt","zh":"威士忌精選 – 單一麥芽","note":"","items":[{"en":"Glenfiddich 12 yr","zh":"格蘭菲迪12年","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Glenfiddich 18 yr","zh":"格蘭菲迪18年","p":"56","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Glenlivet 12 yr","zh":"格蘭利威12年","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Glenlivet 15 yr","zh":"格蘭利威15年","p":"45","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"The Dalmore Cigar Malt","zh":"大摩雪茄麥芽","p":"64","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-25"},{"en":"Cognac","zh":"干邑白蘭地","note":"RM (Glass).","items":[{"en":"Remy martin VSOP","zh":"人頭馬VSOP","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Remy martin XO","zh":"人頭馬XO","p":"56","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Hennessy VSOP","zh":"軒尼詩VSOP","p":"45","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Hennessey XO","zh":"軒尼詩XO","p":"114","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-26"},{"en":"Armagnac","zh":"雅馬邑白蘭地","note":"","items":[{"en":"Chabot VSOP","zh":"夏博VSOP","p":"33","tags":["notable"],"xterm":"armagnac","options":[],"den":"","dzh":"","explain":{"en":"Armagnac (AR-man-yak) is a French brandy from the Gascony region of southwestern France — older than Cognac by about a century, with records dating to the 1400s. Unlike Cognac, which is typically double-distilled in pot stills, Armagnac is usually single-distilled in a continuous column still, producing a richer, more rustic spirit. VSOP indicates it has been aged at least four years in oak.","zh":"Armagnac（AR-man-yak）是法國西南部加斯科涅地區出產的白蘭地，歷史比干邑（Cognac）早約一個世紀，文獻記載可追溯至1400年代。干邑通常以壺式蒸餾器進行兩次蒸餾，而雅馬邑多採連續式單次蒸餾，風味更為濃郁粗獷。VSOP 代表在橡木桶中陳釀至少四年。"}},{"en":"Chabot XO","zh":"夏博XO","p":"68","tags":["notable"],"xterm":"armagnac","options":[],"den":"","dzh":"","explain":{"en":"Armagnac (AR-man-yak) is a French brandy from the Gascony region of southwestern France — older than Cognac by about a century, with records dating to the 1400s. Unlike Cognac, which is typically double-distilled in pot stills, Armagnac is usually single-distilled in a continuous column still, producing a richer, more rustic spirit. VSOP indicates it has been aged at least four years in oak.","zh":"Armagnac（AR-man-yak）是法國西南部加斯科涅地區出產的白蘭地，歷史比干邑（Cognac）早約一個世紀，文獻記載可追溯至1400年代。干邑通常以壺式蒸餾器進行兩次蒸餾，而雅馬邑多採連續式單次蒸餾，風味更為濃郁粗獷。VSOP 代表在橡木桶中陳釀至少四年。"}}],"id":"sec-27"},{"en":"Sherry and Port","zh":"雪莉酒與波特酒","note":"RM (Glass) 31.","items":[{"en":"Harvey Bristol","zh":"哈維布里斯托雪莉","p":"31","tags":["notable"],"xterm":"sherry","options":[],"den":"","dzh":"","explain":{"en":"Sherry is a fortified wine produced exclusively in the \"Sherry Triangle\" around Jerez de la Frontera in southern Spain — the English name \"Sherry\" is an anglicization of \"Jerez\" (heh-RESS). Harvey's Bristol Cream is a classic blended pale cream sherry, sweeter and softer in style. Styles range from bone-dry Fino to rich, sweet Pedro Ximénez.","zh":"雪莉酒是僅產自西班牙南部赫雷斯（Jerez，heh-RESS）三角地帶的加烈葡萄酒，英文名「Sherry」即為「Jerez」的英語化。哈維布里斯托（Harvey's Bristol Cream）是經典調配淡奶油雪莉，風格甜潤柔和。雪莉酒風格多元，從極干的 Fino 到甜美濃郁的 Pedro Ximénez 均有。"}},{"en":"Dow's Fine Tawny Port","zh":"道氏淡褐波特酒","p":"31","tags":["notable"],"xterm":"tawny-port","options":[],"den":"","dzh":"","explain":{"en":"Port is a fortified wine from the Douro Valley in northern Portugal, where grape fermentation is stopped early by adding neutral grape spirit, preserving natural sweetness. \"Tawny\" refers to the amber-brown color that develops after extended aging in small oak barrels — oxidation gradually shifts the wine from ruby red to a warm tawny hue. Dow's is one of the historic British-founded port shippers based in Vila Nova de Gaia.","zh":"波特酒（Port）是葡萄牙北部杜羅河谷出產的加烈酒，在發酵中途加入葡萄烈酒以停止發酵，保留天然甜度。「Tawny（淡褐）」指酒液在小型橡木桶中長期陳釀後，因氧化作用由深紅逐漸轉為琥珀棕色的色澤。道氏（Dow's）是歷史悠久的英資波特酒商之一，總部設於維拉諾瓦蓋亞。"}}],"id":"sec-28"},{"en":"Digestive","zh":"餐後消化酒","note":"","items":[{"en":"Fernet Branca","zh":"菲奈特布蘭卡","p":"35","tags":["notable"],"xterm":"fernet-branca","options":[],"den":"","dzh":"","explain":{"en":"Fernet-Branca (fer-NET BRAN-ka) is an Italian amaro — a bitter herbal liqueur — produced in Milan since 1845 by the Branca family. It is made from a secret blend of 27 herbs, roots, and spices including myrrh, chamomile, and saffron, aged in oak barrels. Famous for its intensely bitter, medicinal taste, it is traditionally sipped as a digestivo after meals and is wildly popular in Argentina.","zh":"Fernet-Branca（fer-NET BRAN-ka）是義大利苦味草本利口酒（amaro），自1845年起由米蘭布蘭卡家族釀製。以沒藥、洋甘菊、番紅花等27種草本、根莖與香料秘製，並於橡木桶中陳釀。以強烈苦澀的草藥風味著稱，傳統上作為餐後消化酒飲用，在阿根廷尤其風靡。"}},{"en":"Kirsch","zh":"櫻桃白蘭地","p":"36","tags":["notable"],"xterm":"kirsch","options":[],"den":"","dzh":"","explain":{"en":"Kirsch (KEERSH) — also called Kirschwasser (KEERSH-vah-ser), meaning \"cherry water\" in German — is a clear, dry brandy distilled from whole fermented cherries, including the pits, which impart a subtle almond-like note. Originating in the Black Forest region straddling Germany and Alsace, it is a key flavoring in Black Forest cake and Swiss fondue.","zh":"Kirsch（KEERSH），又稱 Kirschwasser（KEERSH-vah-ser），德語意為「櫻桃水」，是以整顆發酵甜櫻桃（含果核）蒸餾而成的無色干性白蘭地，果核賦予其淡雅的杏仁香氣。發源於德國與阿爾薩斯交界的黑森林地區，是黑森林蛋糕與瑞士起司鍋的重要香料。"}},{"en":"Poire Williams","zh":"威廉梨白蘭地","p":"38","tags":["notable"],"xterm":"poire-williams","options":[],"den":"","dzh":"","explain":{"en":"Poire Williams (PWAHR wil-YAMZ) is a clear fruit brandy (eau-de-vie) distilled from Williams pears — known in North America as Bartlett pears — produced mainly in Switzerland, Alsace, and the Savoy region of France. \"Poire\" (PWAHR) simply means \"pear\" in French. Delicate, fresh, and intensely pear-scented, it is sometimes bottled with a whole pear inside, grown directly in the bottle.","zh":"Poire Williams（PWAHR wil-YAMZ）是以威廉梨（即北美稱為 Bartlett 的品種）蒸餾而成的無色水果白蘭地（eau-de-vie），主要產於瑞士、阿爾薩斯及法國薩瓦地區。「Poire」（PWAHR）在法語中即「梨子」之意。香氣細膩清新，梨香濃郁，部分酒款瓶中附有一顆完整梨子，是直接在瓶內套袋栽培而成。"}}],"id":"sec-29"},{"en":"Grappa","zh":"義式渣釀白蘭地","note":"RM (Glass) 38.","items":[{"en":"Pilzer Chardonnay","zh":"皮爾澤夏多內渣釀白蘭地","p":"38","tags":["notable"],"xterm":"grappa","options":[],"den":"","dzh":"","explain":{"en":"Grappa (GRAP-pa) is an Italian spirit distilled from pomace — the grape skins, seeds, and stems left over after winemaking. \"Grappa\" is a protected designation of origin: it must be made in Italy from Italian pomace. Pilzer is a renowned Trentino producer; a Chardonnay grappa uses only Chardonnay grape pomace, giving the spirit a varietal character. Once considered rustic firewater, quality grappa is now a refined after-dinner drink.","zh":"Grappa（GRAP-pa）是義大利以葡萄渣（釀酒後剩餘的果皮、果籽與莖梗）蒸餾而成的烈酒，為受保護的原產地名稱，必須在義大利以義大利葡萄渣製作。Pilzer 是特倫提諾地區知名酒莊；夏多內（Chardonnay）渣釀白蘭地僅以夏多內葡萄渣蒸餾，帶有該品種特有的香氣。曾被視為粗獷廉價酒，優質渣釀白蘭地如今已是精緻的餐後酒。"}},{"en":"Pilzer Moscato Giallo","zh":"皮爾澤黃蜜思嘉渣釀白蘭地","p":"38","tags":["notable"],"xterm":"grappa","options":[],"den":"","dzh":"","explain":{"en":"Grappa (GRAP-pa) is an Italian spirit distilled from pomace — the grape skins, seeds, and stems left over after winemaking. \"Grappa\" is a protected designation of origin: it must be made in Italy from Italian pomace. Pilzer is a renowned Trentino producer; a Chardonnay grappa uses only Chardonnay grape pomace, giving the spirit a varietal character. Once considered rustic firewater, quality grappa is now a refined after-dinner drink.","zh":"Grappa（GRAP-pa）是義大利以葡萄渣（釀酒後剩餘的果皮、果籽與莖梗）蒸餾而成的烈酒，為受保護的原產地名稱，必須在義大利以義大利葡萄渣製作。Pilzer 是特倫提諾地區知名酒莊；夏多內（Chardonnay）渣釀白蘭地僅以夏多內葡萄渣蒸餾，帶有該品種特有的香氣。曾被視為粗獷廉價酒，優質渣釀白蘭地如今已是精緻的餐後酒。"}}],"id":"sec-30"},{"en":"Liquers","zh":"利口酒","note":"RM (Glass) 33.","items":[{"en":"Tia Maria","zh":"提亞瑪莉亞咖啡酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Kahlúa","zh":"卡魯哇咖啡酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Bailey's","zh":"百利甜酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Amaretto","zh":"杏仁香甜酒","p":"33","tags":["notable"],"xterm":"amaretto","options":[],"den":"","dzh":"","explain":{"en":"Amaretto (am-ah-RET-toh) means \"a little bitter\" in Italian, from amaro (bitter) — despite its sweet, marzipan-like taste. It is flavored with bitter almonds or apricot kernels, both of which share a similar aromatic compound. Originating in Saronno, Italy, the best-known brand is Disaronno. Used in cocktails like the Amaretto Sour and as a dessert ingredient.","zh":"Amaretto（am-ah-RET-toh）在義大利語意為「微苦」，源自 amaro（苦），但實際口感卻香甜如杏仁糖膏。其風味來自苦杏仁或杏桃核仁，兩者含有相似的芳香化合物。起源於義大利薩隆諾，最知名品牌為 Disaronno，常用於調製杏仁酸酒（Amaretto Sour）或入甜點。"}},{"en":"Crème De Banana","zh":"香蕉利口酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Blue Curacao","zh":"藍色庫拉索橙酒","p":"33","tags":["notable"],"xterm":"blue-curacao","options":[],"den":"","dzh":"","explain":{"en":"Curaçao (KYOOR-uh-sow) is a liqueur flavoured with the dried peel of the laraha citrus fruit, native to the Caribbean island of Curaçao. The vivid blue colour is purely artificial dye — the flavour is the same orange-bitter profile as the clear or orange versions. It is a staple in cocktails like the Blue Lagoon and Blue Margarita, prized mainly for its striking colour.","zh":"庫拉索（KYOOR-uh-sow）是一種以加勒比海庫拉索島特產的拉拉哈柑橘果皮製成的香甜酒。鮮豔的藍色完全來自人工色素，風味與透明或橙色版本相同，帶有柑橘與微苦的香氣。常見於藍色拉格尼、藍色瑪格麗特等雞尾酒，主要以亮眼色澤取勝。"}},{"en":"Cherry Brandy","zh":"櫻桃白蘭地利口酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sambuca","zh":"三不加茴香酒","p":"33","tags":["notable"],"xterm":"sambuca","options":[],"den":"","dzh":"","explain":{"en":"Sambuca (sam-BOO-ka) is an Italian anise-flavoured liqueur, clear or occasionally black, with a strong liquorice-like sweetness. The name likely derives from the elderflower (sambuco in Italian), which was historically used in early recipes. It is traditionally served 'con la mosca' — 'with the fly' — meaning three coffee beans floated on top and set alight briefly before drinking.","zh":"森布卡（sam-BOO-ka）是義大利的茴香甜酒，酒色透明或偶爾呈深黑色，帶有濃郁的甘草甜香。名稱可能源自義大利文的接骨木花（sambuco），早期配方曾使用此植物。傳統喝法稱為「con la mosca」，即在酒上放三粒咖啡豆並短暫點火，再一飲而盡。"}},{"en":"D.O.M Benedictine","zh":"班尼迪克丁香草酒","p":"33","tags":["notable"],"xterm":"benedictine","options":[],"den":"","dzh":"","explain":{"en":"Bénédictine (bay-nay-deek-TEEN) is a French herbal liqueur first produced in Fécamp, Normandy, blending 27 plants and spices including angelica, hyssop, and saffron. The label 'D.O.M.' stands for 'Deo Optimo Maximo' (Latin: 'To God, Most Good, Most Great'), a Benedictine monastic motto — the liqueur was reputedly inspired by a 16th-century monk's recipe. Its flavour is warm, honeyed, and gently spiced.","zh":"班尼迪克丁（bay-nay-deek-TEEN）是法國諾曼第費康地區出產的草本香甜酒，融合了當歸、海索草、番紅花等27種植物與香料。瓶身標誌「D.O.M.」為拉丁文「Deo Optimo Maximo」的縮寫，意為「獻給至善至大的上帝」，源自本篤修道院的格言，據說配方靈感來自16世紀修士。風味溫潤，帶有蜂蜜香與淡雅辛香。"}},{"en":"Cointreau","zh":"君度橙酒","p":"33","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-31"},{"en":"Mineral Water","zh":"礦泉水","note":"RM (Glass). All our prices are nett and in Malaysia ringgit.","items":[{"en":"Acqua Panna 75cl","zh":"阿夸帕納礦泉水 75cl（無氣）","p":"40","tags":[],"xterm":"","options":[],"den":"Natural","dzh":"天然無氣"},{"en":"San Pellegrino 75cl","zh":"聖沛黎洛氣泡水 75cl","p":"40","tags":[],"xterm":"","options":[],"den":"Sparkling","dzh":"氣泡"}],"id":"sec-32"},{"en":"Soda","zh":"汽水","note":"RM (Glass) 19.","items":[{"en":"Coke","zh":"可口可樂","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Coke Zero","zh":"可口可樂零卡","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Sprite","zh":"雪碧","p":"19","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-33"},{"en":"Freshly Squeezed Juice","zh":"新鮮現榨果汁","note":"RM (Glass) 34.","items":[{"en":"Orange","zh":"柳橙汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Pineapple","zh":"鳳梨汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Watermelon","zh":"西瓜汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Carrot","zh":"胡蘿蔔汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Apple","zh":"蘋果汁","p":"34","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-34"},{"en":"Fresh Coconut","zh":"新鮮椰子","note":"RM (Glass) 30.","items":[{"en":"Pandan Coconut","zh":"班蘭椰子","p":"30","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-35"},{"en":"Local Tea and Coffee","zh":"本地茶與咖啡","note":"RM (Glass) 18.","items":[{"en":"Teh Tarik","zh":"拉茶","p":"18","tags":["notable"],"xterm":"teh-tarik","options":[],"den":"black tea with condensed milk","dzh":"紅茶加煉乳","explain":{"en":"Teh Tarik (teh tah-REEK) means \"pulled tea\" in Malay — \"teh\" is tea, \"tarik\" is pull. Strong black tea is blended with sweetened condensed milk, then repeatedly poured at height between two vessels to create a thick, frothy top and cool the drink. A beloved ritual in Malaysia and Singapore, often performed theatrically by \"teh tarik masters.\"","zh":"Teh Tarik（teh tah-REEK）在馬來語中意為「拉茶」——「teh」是茶，「tarik」是拉。將濃紅茶與加糖煉乳混合後，在兩個容器之間反覆高空拉倒，形成細密奶泡並降溫。這是馬來西亞與新加坡深受喜愛的飲茶文化，「拉茶師傅」的技藝更是一場視覺表演。"}},{"en":"Kopi Kedah","zh":"吉打咖啡","p":"18","tags":["notable"],"xterm":"kopi-kedah","options":[],"den":"Black local coffee with condensed milk","dzh":"本地黑咖啡加煉乳","explain":{"en":"Kopi (KOH-pee) is the Malay and Hokkien word for coffee, used across Malaysia and Singapore to refer to traditional robusta coffee roasted with sugar and butter. Kedah is a northern Malaysian state bordering Thailand, and this style of kopi reflects that region's particular roasting and brewing tradition — typically darker and sweeter than Western espresso styles.","zh":"Kopi（KOH-pee）是馬來語與福建話中「咖啡」的說法，在馬來西亞和新加坡指傳統以糖和牛油烘焙的羅布斯塔咖啡豆所沖泡的咖啡。吉打（Kedah）是馬來西亞北部靠近泰國邊境的州屬，吉打咖啡承載著該地區獨特的烘焙與沖泡傳統，風味通常比西式濃縮咖啡更深焙、更甜。"}}],"id":"sec-36"},{"en":"Freshly Brewed Coffee","zh":"現煮咖啡","note":"RM (Glass) 21.","items":[{"en":"Americano","zh":"美式咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Café latte","zh":"拿鐵咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Cappuccino","zh":"卡布奇諾","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Espresso","zh":"濃縮咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Decaffeinated","zh":"低咖啡因咖啡","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-37"},{"en":"1837 TWG Tea Selections","zh":"1837 TWG 精選茶品","note":"RM (Glass) 21.","items":[{"en":"English Breakfast Tea","zh":"英式早餐茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"English Earl Grey","zh":"英式伯爵茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Jasmine Queen Tea","zh":"茉莉女王茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Rose Boudoir Tea","zh":"玫瑰閨房茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Chamomile Tea","zh":"洋甘菊茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""},{"en":"Marrakech Tea","zh":"馬拉喀什薄荷茶","p":"21","tags":[],"xterm":"","options":[],"den":"","dzh":""}],"id":"sec-38"}];
const TAGS = [{"id":"notable","en":"Notable","zh":"特色","icon":"💡","group":"highlight"},{"id":"signature","en":"Highlight","zh":"精選推薦","icon":"⭐","group":"highlight"},{"id":"gluten-free","en":"Gluten Free","zh":"無麩質","icon":"🌾","group":"diet"},{"id":"contains-nuts","en":"Contains Nuts","zh":"含堅果","icon":"🥜","group":"allergen"},{"id":"vegetarian","en":"Vegetarian","zh":"適合素食","icon":"🌱","group":"diet"}];
const TAG_BY_ID = Object.fromEntries(TAGS.map(t => [t.id, t]));

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const menuEl = document.getElementById("menu");
const navEl = document.getElementById("nav");
const barEl = document.getElementById("filterbar");

// Render sections + items (items carry data-tags for filtering).
MENU.forEach((sec, i) => {
  const id = sec.id || ("sec-" + i);
  navEl.insertAdjacentHTML("beforeend", `<a href="#${esc(id)}" data-sec="${esc(id)}">${esc(sec.zh || sec.en)}</a>`);

  const items = (sec.items || []).map(it => {
    const ids = it.tags || [];
    const icons = ids.filter(t => t !== "notable").map(t => (TAG_BY_ID[t] && TAG_BY_ID[t].icon) || "").filter(Boolean).join(" ");
    const tags = icons ? `<span class="tags">${icons}</span>` : "";
    const explain = it.explain
      ? `<button class="explain" aria-label="explanation" data-en="${esc(it.explain.en)}" data-zh="${esc(it.explain.zh)}">💡</button>`
      : "";
    const meta = (tags || explain) ? `<div class="meta">${tags}${explain}</div>` : "";
    const pic = it.img ? `<img class="dish" src="${esc(it.img)}" loading="lazy" alt="">` : "";
    const price = it.p ? `<div class="price">${esc(it.p)}</div>` : "";
    const den = it.den ? `<div class="desc">${esc(it.den)}</div>` : "";
    const dzh = it.dzh ? `<div class="desc-zh">${esc(it.dzh)}</div>` : "";
    const opts = (it.options && it.options.length)
      ? `<div class="opts">` + it.options.map(g => {
          const choices = (g.choices || []).map(c => {
            const cp = c.p ? `<span class="opt-price">+${esc(c.p)}</span>` : "";
            return `<li><span class="oen">${esc(c.en)}</span><span class="ozh">${esc(c.zh)}</span>${cp}</li>`;
          }).join("");
          if (!choices) return "";
          const hint = g.kind === "one" ? `<span class="opt-hint">選一 · Choose one</span>`
                     : g.kind === "any" ? `<span class="opt-hint">可加 · Optional</span>` : "";
          return `<div class="optg">
            <div class="optg-label"><span class="oen">${esc(g.en)}</span><span class="ozh">${esc(g.zh)}</span>${hint}</div>
            <ul class="optg-choices">${choices}</ul>
          </div>`;
        }).join("") + `</div>`
      : "";
    return `<div class="item" data-tags="${esc(ids.join(" "))}">
      <div class="row">
        <div>
          <div class="name">${esc(it.en)}</div>
          <div class="name-zh">${esc(it.zh)}</div>
          ${meta}
        </div>${price}
      </div>${pic}${den}${dzh}${opts}
    </div>`;
  }).join("");

  const note = sec.note ? `<p class="sec-note">${esc(sec.note)}</p>` : "";
  menuEl.insertAdjacentHTML("beforeend", `<section id="${esc(id)}">
    <div class="sec-head"><h2>${esc(sec.en)}</h2><span class="zh">${esc(sec.zh)}</span></div>
    ${note}<div class="grid">${items}</div>
  </section>`);
});

// Build the filter bar from the tags actually used by ≥1 item (in TAGS order).
const used = new Set();
MENU.forEach(s => (s.items || []).forEach(it => (it.tags || []).forEach(id => used.add(id))));
const seen = new Set();
const filterTags = [];
TAGS.forEach(t => {
  if (used.has(t.id) && !seen.has(t.id)) { seen.add(t.id); filterTags.push(t); }
});
const active = new Set();

if (filterTags.length) {
  barEl.insertAdjacentHTML("beforeend", `<button class="chip chip-all active" data-id="">全部 All</button>`);
  filterTags.forEach(t => {
    const ic = t.icon ? `<span class="ci">${t.icon}</span>` : "";
    barEl.insertAdjacentHTML("beforeend",
      `<button class="chip" data-id="${esc(t.id)}">${ic}<span class="cen">${esc(t.en)}</span><span class="czh">${esc(t.zh)}</span></button>`);
  });
} else {
  barEl.style.display = "none";
}

// AND filter: an item shows iff its tags include every active id.
function applyFilter() {
  document.querySelectorAll("#menu section").forEach(sec => {
    let visible = 0;
    sec.querySelectorAll(".item").forEach(el => {
      const tags = new Set((el.getAttribute("data-tags") || "").split(" ").filter(Boolean));
      let show = true;
      active.forEach(id => { if (!tags.has(id)) show = false; });
      el.style.display = show ? "" : "none";
      if (show) visible++;
    });
    sec.style.display = visible ? "" : "none";
    const link = navEl.querySelector(`a[data-sec="${CSS.escape(sec.id)}"]`);
    if (link) link.style.display = visible ? "" : "none";
  });
}

barEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const id = btn.dataset.id;
  if (id === "") active.clear();
  else if (active.has(id)) active.delete(id);
  else active.add(id);

  barEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  if (active.size === 0) {
    barEl.querySelector(".chip-all").classList.add("active");
  } else {
    active.forEach(a => {
      const c = barEl.querySelector(`.chip[data-id="${CSS.escape(a)}"]`);
      if (c) c.classList.add("active");
    });
  }
  applyFilter();
});

// Explanation popover: tap 💡 to open near the button; tap elsewhere to close.
const pop = document.getElementById("popover");
menuEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".explain");
  if (!btn) return;
  e.stopPropagation();
  pop.innerHTML = `<span class="pen"></span><span class="pzh"></span>`;
  pop.querySelector(".pen").textContent = btn.getAttribute("data-en") || "";
  pop.querySelector(".pzh").textContent = btn.getAttribute("data-zh") || "";
  pop.hidden = false;
  const r = btn.getBoundingClientRect();
  const maxLeft = scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
  pop.style.top = (scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.max(scrollX + 12, Math.min(scrollX + r.left, maxLeft)) + "px";
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".explain") && !e.target.closest("#popover")) pop.hidden = true;
});

// Language toggle (unchanged behaviour).
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.className = "lang-" + btn.dataset.lang;
  });
});

// Back to top (unchanged behaviour).
const toTop = document.getElementById("toTop");
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 600), { passive: true });
toTop.addEventListener("click", () => scrollTo({ top: 0, behavior: "smooth" }));
</script>
